<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="origin">
    <title>Canela.TV Clone Pro</title>
    <style>
        :root {
            --bg: #0d253f; /* Azul oscuro de tu imagen 1 */
            --accent: #01b4e4; /* Azul claro de tu imagen 1 */
            --green: #90cea1; /* Verde de tu imagen 1 */
            --text: #ffffff;
        }

        body {
            font-family: 'Open Sans', Arial, sans-serif;
            background-color: #050505;
            color: var(--text);
            margin: 0;
            overflow-x: hidden;
        }

        /* --- NAVBAR ESTILO CANELA (Imagen 2) --- */
        header {
            background: rgba(0, 0, 0, 0.9);
            padding: 15px 50px;
            display: flex;
            align-items: center;
            position: fixed;
            top: 0; width: 100%;
            z-index: 1000;
            border-bottom: 1px solid #222;
        }

        .logo {
            font-size: 24px;
            font-weight: 800;
            color: var(--accent);
            margin-right: 40px;
            text-transform: uppercase;
        }

        nav { display: flex; gap: 20px; flex-grow: 1; }

        .nav-link {
            text-decoration: none;
            color: #ccc;
            font-weight: 600;
            font-size: 15px;
            cursor: pointer;
            transition: 0.3s;
        }

        .nav-link:hover, .nav-link.active { color: white; border-bottom: 2px solid var(--accent); }

        /* --- CONTENIDO --- */
        main { padding-top: 100px; }

        .category-row { margin-bottom: 40px; padding: 0 50px; }

        .row-title {
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 15px;
            border-left: 4px solid var(--accent);
            padding-left: 10px;
        }

        .scroll-container {
            display: flex;
            overflow-x: auto;
            gap: 15px;
            padding-bottom: 10px;
            scroll-behavior: smooth;
        }

        .scroll-container::-webkit-scrollbar { height: 5px; }
        .scroll-container::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 10px; }

        .movie-card {
            min-width: 170px;
            transition: 0.3s;
            cursor: pointer;
            border-radius: 5px;
            overflow: hidden;
        }

        .movie-card:hover { transform: scale(1.08); box-shadow: 0 0 20px rgba(1, 180, 228, 0.4); }

        .movie-card img { width: 100%; height: 250px; object-fit: cover; }

        .movie-card p {
            padding: 10px;
            font-size: 13px;
            text-align: center;
            margin: 0;
            background: #111;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* --- REPRODUCTOR (Sin salirse de la web) --- */
        #video-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #000;
            z-index: 2000;
        }

        .close-player {
            position: absolute;
            top: 20px; right: 30px;
            font-size: 40px; color: white;
            cursor: pointer; z-index: 2001;
        }

        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>

    <header>
        <div class="logo">CANELA CLONE</div>
        <nav>
            <div class="nav-link active" onclick="loadContent('all')">Inicio</div>
            <div class="nav-link" onclick="loadContent('movie')">Películas</div>
            <div class="nav-link" onclick="loadContent('tv')">Series</div>
            <div class="nav-link" onclick="loadContent('discover', 28)">Acción</div>
            <div class="nav-link" onclick="loadContent('discover', 35)">Comedia</div>
            <div class="nav-link" onclick="loadContent('discover', 27)">Terror</div>
        </nav>
    </header>

    <main id="app-content">
        </main>

    <div id="video-overlay">
        <span class="close-player" onclick="closeVideo()">×</span>
        <iframe id="player-frame" src="" allowfullscreen referrerpolicy="origin"></iframe>
    </div>

    <script>
        const API_KEY = 'f663f105c4c1626d23e86d2ac19471a9';

        async function loadContent(type, genreId = null) {
            const main = document.getElementById('app-content');
            main.innerHTML = '<p style="padding:50px">Cargando catálogo...</p>';
            
            // Actualizar estado activo del menú
            document.querySelectorAll('.nav-link').forEach(el => el.classList.remove('active'));

            let sections = [];

            if (type === 'all') {
                sections = [
                    { t: "Películas Más Populares", u: `https://api.themoviedb.org/3/movie/popular?api_key=${API_KEY}&language=es-ES` },
                    { t: "Series de Estreno", u: `https://api.themoviedb.org/3/tv/on_the_air?api_key=${API_KEY}&language=es-ES` }
                ];
            } else if (type === 'movie') {
                sections = [{ t: "Todas las Películas", u: `https://api.themoviedb.org/3/discover/movie?api_key=${API_KEY}&language=es-ES&sort_by=popularity.desc` }];
            } else if (type === 'tv') {
                sections = [{ t: "Todas las Series", u: `https://api.themoviedb.org/3/discover/tv?api_key=${API_KEY}&language=es-ES&sort_by=popularity.desc` }];
            } else if (type === 'discover') {
                sections = [{ t: "Resultados por Género", u: `https://api.themoviedb.org/3/discover/movie?api_key=${API_KEY}&with_genres=${genreId}&language=es-ES` }];
            }

            main.innerHTML = '';
            for (const s of sections) {
                const res = await fetch(s.u);
                const data = await res.json();
                renderRow(s.t, data.results, type === 'tv' || s.u.includes('/tv/') ? 'tv' : 'movie');
            }
        }

        function renderRow(title, items, mediaType) {
            const main = document.getElementById('app-content');
            const row = document.createElement('div');
            row.className = 'category-row';
            row.innerHTML = `<div class="row-title">${title}</div>`;
            
            const scroll = document.createElement('div');
            scroll.className = 'scroll-container';

            items.forEach(item => {
                if (!item.poster_path) return;
                const card = document.createElement('div');
                card.className = 'movie-card';
                card.innerHTML = `
                    <img src="https://image.tmdb.org/p/w500${item.poster_path}">
                    <p>${item.title || item.name}</p>
                `;
                card.onclick = () => playVideo(mediaType, item.id);
                scroll.appendChild(card);
            });

            row.appendChild(scroll);
            main.appendChild(row);
        }

        function playVideo(tipo, id) {
            const overlay = document.getElementById('video-overlay');
            const frame = document.getElementById('player-frame');
            // Multiembed para asegurar español/latino
            frame.src = `https://multiembed.mov/?video_id=${id}&tmdb=1`;
            overlay.style.display = 'block';
        }

        function closeVideo() {
            document.getElementById('video-overlay').style.display = 'none';
            document.getElementById('player-frame').src = '';
        }

        // Cargar inicio por defecto
        loadContent('all');
    </script>
</body>
</html>
