<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DYTATUBE - Descargador de YouTube</title>
    <style>
        :root {
            --bg: #000000;
            --card: #0a0a0a;
            --primary: #ff0000;
            --accent: #2ecc71;
            --text-main: #ffffff;
            --text-dim: #a0a0a0;
            --input-bg: #111111;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 800px;
            padding: 80px 20px;
            text-align: center;
        }

        /* Imagen DYTATUBE */
        .logo {
            max-width: 350px;
            margin-bottom: 20px;
        }

        h1 { font-size: 2.5rem; margin-bottom: 10px; font-weight: 800; }
        .subtitle { color: var(--text-dim); margin-bottom: 40px; font-size: 1.1rem; }

        /* Estilo Turboscribe */
        .downloader-card {
            background: var(--card);
            padding: 40px;
            border-radius: 24px;
            border: 1px solid #222;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .input-wrapper {
            position: relative;
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            padding: 20px;
            background: var(--input-bg);
            border: 2px solid #333;
            border-radius: 16px;
            color: white;
            font-size: 1.1rem;
            box-sizing: border-box;
            outline: none;
            transition: border-color 0.3s;
        }

        input:focus { border-color: var(--primary); }

        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }

        .format-select {
            padding: 15px;
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 12px;
            color: white;
            font-weight: 600;
            cursor: pointer;
        }

        .btn-download {
            width: 100%;
            padding: 20px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 16px;
            font-size: 1.2rem;
            font-weight: 800;
            cursor: pointer;
            transition: transform 0.2s, background 0.3s;
        }

        .btn-download:hover {
            background: #cc0000;
            transform: translateY(-2px);
        }

        /* Barra de progreso estilo EXE */
        #progress-section {
            display: none;
            margin-top: 30px;
        }

        .bar-container {
            background: #222;
            height: 8px;
            border-radius: 4px;
            overflow: hidden;
            margin-bottom: 10px;
        }

        #bar-fill {
            width: 0%;
            height: 100%;
            background: var(--accent);
            transition: width 0.3s;
        }

        #status-text {
            font-size: 0.9rem;
            color: var(--text-dim);
        }

        footer {
            margin-top: auto;
            padding: 40px;
            color: #444;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>

    <div class="container">
        <img src="dytatube.png" alt="DYTATUBE" class="logo">
        
        <p class="subtitle">Descarga videos y audios de YouTube de forma instantánea.</p>

        <div class="downloader-card">
            <input type="text" id="video-url" placeholder="Pega el enlace de YouTube aquí...">
            
            <div class="options-grid">
                <select id="format" class="format-select">
                    <option value="mp3">Audio (MP3)</option>
                    <option value="720">Video (MP4 720p)</option>
                    <option value="1080">Video (MP4 1080p)</option>
                </select>
                <select id="lang" class="format-select">
                    <option value="es">Español</option>
                    <option value="en">English</option>
                </select>
            </div>

            <button class="btn-download" onclick="process()">Descargar ahora</button>

            <div id="progress-section">
                <div class="bar-container"><div id="bar-fill"></div></div>
                <div id="status-text">Analizando video...</div>
            </div>
        </div>
    </div>

    <footer>DYTA 2026 • Sin anuncios • Sin límites</footer>

    <script>
        function process() {
            const url = document.getElementById('video-url').value;
            if (!url) return alert("Por favor ingresa un link");

            const idMatch = url.match(/(?:https?:\/\/)?(?:www\.)?(?:youtube\.com\/watch\?v=|youtu\.be\/)([a-zA-Z0-9_-]{11})/);
            if (!idMatch) return alert("Link de YouTube no válido");

            const section = document.getElementById('progress-section');
            const bar = document.getElementById('bar-fill');
            const status = document.getElementById('status-text');
            const format = document.getElementById('format').value;

            section.style.display = 'block';
            let p = 0;

            const interval = setInterval(() => {
                p += Math.random() * 15;
                if (p >= 100) {
                    p = 100;
                    clearInterval(interval);
                    status.innerText = "¡Descarga lista! Revisa tus archivos.";
                    
                    // Método directo estilo SS (SaveFrom) para evitar ventanas
                    let finalUrl = url.replace("youtube.com", "ssyoutube.com").replace("youtu.be/", "ssyoutube.com/watch?v=");
                    window.location.href = finalUrl;
                    
                    setTimeout(() => { section.style.display = 'none'; bar.style.width = '0%'; }, 4000);
                }
                bar.style.width = p + "%";
                status.innerText = `Preparando ${format.toUpperCase()}... ${Math.floor(p)}%`;
            }, 300);
        }
    </script>
</body>
</html>
