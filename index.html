<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DYTATUBE - Descargas Online</title>
    <style>
        :root {
            --primary: #ff0000;
            --bg: #050505;
            --card: #121212;
            --text: #ffffff;
            --accent: #2ecc71;
            --blue: #01b4e4;
        }

        body {
            font-family: 'Open Sans', Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* --- NAVBAR --- */
        header {
            background: rgba(0, 0, 0, 0.95);
            padding: 15px 40px;
            display: flex;
            align-items: center;
            border-bottom: 1px solid #222;
        }

        nav { display: flex; gap: 20px; overflow-x: auto; white-space: nowrap; }
        .nav-link { color: #ccc; text-decoration: none; font-weight: 700; font-size: 14px; }

        /* --- CONTENIDO --- */
        .main-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
        }

        /* ARREGLO DE IMAGEN */
        .header-img {
            max-width: 450px;
            width: 100%;
            height: auto;
            margin-bottom: 20px;
            display: block;
        }

        .download-box {
            width: 100%;
            max-width: 650px;
            background: var(--card);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.8);
            border: 1px solid #333;
            text-align: center;
        }

        input {
            width: 100%;
            padding: 18px;
            border-radius: 12px;
            border: 2px solid #444;
            background: #000;
            color: white;
            font-size: 16px;
            margin-bottom: 20px;
            box-sizing: border-box;
        }

        .btn-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 12px;
        }

        button {
            padding: 18px;
            border: none;
            border-radius: 12px;
            font-weight: 800;
            cursor: pointer;
            color: white;
            text-transform: uppercase;
            font-size: 12px;
        }

        .btn-mp3 { background: var(--accent); }
        .btn-mp4 { background: var(--primary); }
        .btn-movie { background: var(--blue); }

        /* BARRA DE PROGRESO */
        #progress-area {
            display: none;
            margin-top: 25px;
        }

        .bar-bg { background: #222; height: 12px; border-radius: 10px; overflow: hidden; }
        .bar-fill { width: 0%; height: 100%; background: var(--accent); transition: width 0.3s; }
        #status-msg { font-size: 13px; margin-top: 10px; color: #aaa; }

        footer { padding: 25px; text-align: center; font-size: 12px; color: #555; background: #000; }
        
        /* Iframe oculto para forzar descarga sin saltar de página */
        #hidden-downloader { display: none; }
    </style>
</head>
<body>

    <header>
        <nav>
            <div class="nav-link">Inicio</div>
            <div class="nav-link">Guía de TV</div>
            <div class="nav-link">Películas</div>
            <div class="nav-link">Series</div>
            <div class="nav-link">Clásicos</div>
            <div class="nav-link">Deportes</div>
            <div class="nav-link">Música</div>
            <div class="nav-link">Kids</div>
            <div class="nav-link">Noticias</div>
        </nav>
    </header>

    <div class="main-container">
        <img src="./dytatube.png" alt="DYTATUBE" class="header-img">
        
        <div class="download-box">
            <input type="text" id="main-url" placeholder="Pega el link aquí (YouTube, Music o Película)...">
            
            <div class="btn-grid">
                <button class="btn-mp3" onclick="doDownload('mp3')">MP3-Música</button>
                <button class="btn-mp4" onclick="doDownload('mp4')">MP4-Video</button>
                <button class="btn-movie" onclick="doDownload('movie')">Peliculas</button>
            </div>

            <div id="progress-area">
                <div class="bar-bg"><div class="bar-fill" id="bar"></div></div>
                <div id="status-msg"></div>
            </div>
        </div>
    </div>

    <iframe id="hidden-downloader"></iframe>

    <footer>
        DYTA 2026 Todos los derechos reservados
    </footer>

    <script>
        function doDownload(type) {
            const url = document.getElementById('main-url').value;
            if (!url) return alert("¡Pega un enlace!");

            const area = document.getElementById('progress-area');
            const bar = document.getElementById('bar');
            const msg = document.getElementById('status-msg');
            const dlHelper = document.getElementById('hidden-downloader');

            area.style.display = 'block';
            let p = 0;
            
            const timer = setInterval(() => {
                p += Math.random() * 12;
                if (p >= 100) {
                    p = 100;
                    clearInterval(timer);
                    msg.innerText = "¡Descarga iniciada! Revisa tu carpeta de descargas.";
                    setTimeout(() => { area.style.display = 'none'; bar.style.width = '0%'; }, 5000);
                }
                bar.style.width = p + "%";
                msg.innerText = `Descargando ${type.toUpperCase()}... ${Math.floor(p)}%`;
            }, 400);

            // LOGICA DE DESCARGA DIRECTA
            if (type === 'movie') {
                window.open(url, '_blank'); 
            } else {
                const vidId = extractID(url);
                if (vidId) {
                    // Nuevo motor de descarga directa (intenta forzar el archivo)
                    const downloadUrl = type === 'mp3' 
                        ? `https://api.v-mate.net/api/mp3/${vidId}`
                        : `https://api.v-mate.net/api/video/${vidId}`;
                    
                    // Cargamos en el iframe oculto para que no abra pestañas
                    dlHelper.src = downloadUrl;
                } else {
                    dlHelper.src = url;
                }
            }
        }

        function extractID(url) {
            const reg = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
            const match = url.match(reg);
            return (match && match[2].length == 11) ? match[2] : null;
        }
    </script>
</body>
</html>
