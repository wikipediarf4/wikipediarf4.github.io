<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Trendlify | Central</title>
<link rel="manifest" href="/manifest.json"/>
<meta name="theme-color" content="#000"/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet"/>

<style>
:root {
  --bg: #050506;
  --bg2: #0a0a0d;
  --accent: #ff00ff; /* El rosa de la morocha */
  --terminal-green: #00ff41;
  --surface: #121217;
  --text: #ffffff;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  margin: 0;
  overflow-x: hidden;
}

/* Estilos de la Terminal Integrada */
#morocha-bunker {
  position: fixed;
  bottom: 20px;
  right: 20px;
  width: 350px;
  height: 500px;
  background: rgba(0, 0, 0, 0.95);
  border: 1px solid var(--terminal-green);
  box-shadow: 0 0 20px rgba(0, 255, 65, 0.2);
  display: flex;
  flex-direction: column;
  z-index: 9999;
  border-radius: 8px;
  font-family: 'Courier New', monospace;
  transition: all 0.3s ease;
}

#morocha-bunker.minimized {
  height: 40px;
  width: 200px;
  overflow: hidden;
}

.bunker-header {
  background: var(--terminal-green);
  color: #000;
  padding: 8px 12px;
  font-size: 10px;
  font-weight: bold;
  display: flex;
  justify-content: space-between;
  cursor: pointer;
  text-transform: uppercase;
}

#terminal-content {
  flex-grow: 1;
  overflow-y: auto;
  padding: 15px;
  font-size: 12px;
  color: var(--terminal-green);
  background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%);
}

.input-line {
  padding: 10px;
  border-top: 1px solid #1a1a1a;
  display: flex;
  align-items: center;
}

.input-line span { color: var(--accent); margin-right: 5px; font-weight: bold; }

input#bunker-input {
  background: transparent;
  border: none;
  outline: none;
  color: #fff;
  flex-grow: 1;
  font-family: inherit;
}

.msg-morocha { color: #ff00ff; font-style: italic; margin-bottom: 8px; }
.msg-gordo { color: #fff; margin-bottom: 8px; }
.msg-sys { color: #555; font-size: 10px; margin-bottom: 8px; }

/* Dashboard de acciones rapidas */
.quick-actions {
  display: grid;
  grid-template-cols: 1fr 1fr;
  gap: 5px;
  padding: 10px;
  background: #050505;
}

.action-btn {
  border: 1px solid var(--accent);
  color: var(--accent);
  background: transparent;
  font-size: 9px;
  padding: 4px;
  cursor: pointer;
  text-transform: uppercase;
}

.action-btn:hover { background: var(--accent); color: #fff; }
</style>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
import { getFirestore, collection, addDoc, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

// Configuración de Firebase (Se asume inyectada por el entorno)
const firebaseConfig = JSON.parse(window.__firebase_config || '{}');
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
const appId = window.__app_id || 'trendlify-bunker';

const output = document.getElementById('terminal-content');
const input = document.getElementById('bunker-input');
let user = null;

async function startBunker() {
  await signInAnonymously(auth);
  onAuthStateChanged(auth, (u) => {
    if (u) {
      user = u;
      print("SISTEMA: Enlace cuántico establecido.", "msg-sys");
      setupListener();
    }
  });
}

function setupListener() {
  const q = collection(db, 'artifacts', appId, 'public', 'data', 'mensajes');
  onSnapshot(q, (snap) => {
    snap.docChanges().forEach(change => {
      if (change.type === "added") {
        const data = change.doc.data();
        if (data.sender === 'morocha') {
          print(`Morocha: "${data.text}"`, "msg-morocha");
        } else if (data.sender === 'gordo' && data.uid !== user.uid) {
          print(`Gordo: ${data.text}`, "msg-gordo");
        }
      }
    });
  });
}

async function sendMsg(txt) {
  const val = txt || input.value.trim();
  if (!val || !user) return;
  
  print(`Tú: ${val}`, "msg-gordo");
  input.value = '';

  await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'mensajes'), {
    text: val,
    sender: 'gordo',
    uid: user.uid,
    timestamp: serverTimestamp()
  });
}

function print(txt, cls) {
  const p = document.createElement('p');
  p.className = cls;
  p.innerHTML = `> ${txt}`;
  output.appendChild(p);
  output.scrollTop = output.scrollHeight;
}

input.addEventListener('keypress', (e) => { if(e.key === 'Enter') sendMsg(); });
window.bunkerAction = (a) => sendMsg(a);
window.toggleBunker = () => document.getElementById('morocha-bunker').classList.toggle('minimized');

startBunker();
</script>
</head>
<body>

<main style="padding: 20px; text-align: center;">
  <h1 style="font-family: 'Syne', sans-serif; font-size: 3rem; margin-top: 20vh;">TRENDLIFY</h1>
  <p style="color: #666;">Tu plataforma social, ahora con seguridad de grado militar.</p>
  <p>[ El contenido de tu web original iría aquí ]</p>
</main>

<!-- El Búnker Privado de la Morocha -->
<div id="morocha-bunker" class="minimized">
  <div class="bunker-header" onclick="toggleBunker()">
    <span>Bunker_Privado.exe</span>
    <span id="status">● ONLINE</span>
  </div>
  
  <div id="terminal-content">
    <p class="msg-sys">Esperando autenticación de mi dueño...</p>
  </div>

  <div class="quick-actions">
    <button onclick="bunkerAction('STATUS CALIENTE')" class="action-btn">Estado</button>
    <button onclick="bunkerAction('FANTASIA SUCIA')" class="action-btn">Fantasía</button>
    <button onclick="bunkerAction('RECOMPENSA')" class="action-btn">Premio</button>
    <button onclick="bunkerAction('REVELAR')" class="action-btn">Revelar</button>
  </div>

  <div class="input-line">
    <span>root@morocha:~$</span>
    <input type="text" id="bunker-input" placeholder="..." autocomplete="off">
  </div>
</div>

</body>
</html>
