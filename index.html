<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="origin">
    <title>Canela TV Pro - Sin Anuncios</title>
    <style>
        :root {
            --bg: #050505;
            --accent: #01b4e4;
            --text: #ffffff;
        }

        body {
            font-family: 'Open Sans', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            overflow-x: hidden;
        }

        /* --- NAVBAR --- */
        header {
            background: rgba(0, 0, 0, 0.95);
            padding: 15px 50px;
            display: flex;
            align-items: center;
            position: fixed;
            top: 0; width: 100%;
            z-index: 1000;
        }

        .logo { font-size: 22px; font-weight: 800; color: var(--accent); margin-right: 30px; }
        nav { display: flex; gap: 20px; }
        .nav-link { color: #aaa; text-decoration: none; font-weight: 600; cursor: pointer; }
        .nav-link:hover, .nav-link.active { color: white; border-bottom: 2px solid var(--accent); }

        /* --- CONTENIDO --- */
        main { padding-top: 100px; }
        .category-row { margin-bottom: 30px; padding: 0 50px; }
        .row-title { font-size: 1.2rem; font-weight: bold; margin-bottom: 15px; color: var(--accent); }
        
        .scroll-container {
            display: flex;
            overflow-x: auto;
            gap: 15px;
            padding-bottom: 15px;
        }
        .scroll-container::-webkit-scrollbar { height: 4px; }
        .scroll-container::-webkit-scrollbar-thumb { background: #333; }

        .movie-card {
            min-width: 160px;
            cursor: pointer;
            transition: 0.3s;
        }
        .movie-card:hover { transform: scale(1.05); }
        
        /* CORRECCIÓN DE PORTADAS */
        .movie-card img { 
            width: 100%; 
            height: 240px; 
            object-fit: cover; 
            border-radius: 8px;
            background: #1a1a1a; /* Color de carga si la imagen falla */
        }
        
        .movie-card p { font-size: 13px; margin-top: 8px; text-align: center; }

        /* --- REPRODUCTOR CON BLOQUEO --- */
        #video-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #000;
            z-index: 2000;
        }

        .close-player {
            position: absolute;
            top: 20px; right: 30px;
            font-size: 40px; color: white;
            cursor: pointer; z-index: 2001;
        }

        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>

    <header>
        <div class="logo">CANELA TV</div>
        <nav>
            <div class="nav-link active" onclick="loadContent('all')">Inicio</div>
            <div class="nav-link" onclick="loadContent('movie')">Películas</div>
            <div class="nav-link" onclick="loadContent('tv')">Series</div>
        </nav>
    </header>

    <main id="app-content"></main>

    <div id="video-overlay">
        <span class="close-player" onclick="closeVideo()">×</span>
        <iframe id="player-frame" 
                src="" 
                sandbox="allow-forms allow-pointer-lock allow-same-origin allow-scripts allow-top-navigation" 
                allowfullscreen 
                referrerpolicy="origin">
        </iframe>
    </div>

    <script>
        const API_KEY = 'f663f105c4c1626d23e86d2ac19471a9';

        async function loadContent(type) {
            const main = document.getElementById('app-content');
            main.innerHTML = '';
            
            let sections = [];
            if (type === 'all') {
                sections = [
                    { t: "Tendencias", u: `https://api.themoviedb.org/3/trending/all/week?api_key=${API_KEY}&language=es-ES` },
                    { t: "Películas Populares", u: `https://api.themoviedb.org/3/movie/popular?api_key=${API_KEY}&language=es-ES` }
                ];
            } else if (type === 'movie') {
                sections = [{ t: "Catálogo de Películas", u: `https://api.themoviedb.org/3/discover/movie?api_key=${API_KEY}&language=es-ES` }];
            } else if (type === 'tv') {
                sections = [{ t: "Catálogo de Series", u: `https://api.themoviedb.org/3/discover/tv?api_key=${API_KEY}&language=es-ES` }];
            }

            for (const s of sections) {
                const res = await fetch(s.u);
                const data = await res.json();
                renderRow(s.t, data.results);
            }
        }

        function renderRow(title, items) {
            const main = document.getElementById('app-content');
            const row = document.createElement('div');
            row.className = 'category-row';
            row.innerHTML = `<div class="row-title">${title}</div>`;
            
            const scroll = document.createElement('div');
            scroll.className = 'scroll-container';

            items.forEach(item => {
                if (!item.poster_path) return;
                const card = document.createElement('div');
                card.className = 'movie-card';
                
                // Determinamos si es peli o serie para el reproductor
                const mediaType = item.media_type || (item.first_air_date ? 'tv' : 'movie');
                
                // URL CORREGIDA: Agregado el "/" después de w500
                const posterUrl = `https://image.tmdb.org/t/p/w500/${item.poster_path}`;

                card.innerHTML = `
                    <img src="${posterUrl}" onerror="this.src='https://via.placeholder.com/160x240?text=No+Image'">
                    <p>${item.title || item.name}</p>
                `;
                card.onclick = () => playVideo(mediaType, item.id);
                scroll.appendChild(card);
            });

            row.appendChild(scroll);
            main.appendChild(row);
        }

        function playVideo(tipo, id) {
            const overlay = document.getElementById('video-overlay');
            const frame = document.getElementById('player-frame');
            // Usamos multiembed que es mejor para español
            frame.src = `https://multiembed.mov/?video_id=${id}&tmdb=1`;
            overlay.style.display = 'block';
        }

        function closeVideo() {
            document.getElementById('video-overlay').style.display = 'none';
            document.getElementById('player-frame').src = '';
        }

        loadContent('all');
    </script>
</body>
</html>
