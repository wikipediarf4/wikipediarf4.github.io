<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nebula ULTRA</title>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getDatabase, ref, push, onValue, update } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyA9oat9dd0S9vlxkg1osH4dW3XhRDGiOiw",
  authDomain: "charlasrf4.firebaseapp.com",
  databaseURL: "https://charlasrf4-default-rtdb.firebaseio.com",
  projectId: "charlasrf4",
  storageBucket: "charlasrf4.firebasestorage.app",
  messagingSenderId: "345019626508",
  appId: "1:345019626508:web:d099ca499acb29eac12a29"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getDatabase(app);
const provider = new GoogleAuthProvider();

let currentUser = null;

window.loginGoogle = async () => {
  await signInWithPopup(auth, provider);
};

onAuthStateChanged(auth, (user) => {
  if (user) {
    currentUser = user;
    login.style.display = 'none';
    appDiv.style.display = 'flex';
    userName.innerText = user.displayName;
    userPhoto.src = user.photoURL;
    userAvatar.src = user.photoURL;
    loadFeed();
    loadTrends();
  }
});

// CLOUDINARY
const cloudName = "ds4ejt5sp";
const uploadPreset = "VIDEOS";

async function uploadFile(){
  const file = filePost.files[0];
  if(!file) return "";

  const formData = new FormData();
  formData.append('file', file);
  formData.append('upload_preset', uploadPreset);

  const res = await fetch(`https://api.cloudinary.com/v1_1/${cloudName}/auto/upload`,{
    method:'POST',
    body:formData
  });

  const data = await res.json();
  return data.secure_url;
}

// PUBLICAR
window.publish = async () => {
  const text = postText.value;
  const file = await uploadFile();

  push(ref(db, 'posts'), {
    user: currentUser.displayName,
    photo: currentUser.photoURL,
    text,
    file,
    likes: 0,
    comments: {},
    views: 0,
    time: Date.now()
  });

  postText.value = "";
  preview.innerHTML = "";
};

// PREVIEW
window.previewFile = () => {
  const file = filePost.files[0];
  if(!file) return;

  const url = URL.createObjectURL(file);

  if(file.type.includes("video")){
    preview.innerHTML = `<video src="${url}" controls></video>`;
  } else {
    preview.innerHTML = `<img src="${url}">`;
  }
};

// FEED
function loadFeed(){
  onValue(ref(db, 'posts'), snapshot => {
    feed.innerHTML = '';

    let arr=[];
    snapshot.forEach(c=>arr.push({id:c.key,...c.val()}));
    arr.sort((a,b)=>b.time-a.time);

    arr.forEach(p=>{
      let div=document.createElement('div');
      div.className='card fade';

      update(ref(db, 'posts/'+p.id), {views:(p.views||0)+1});

      div.innerHTML=`
        <div class="user">
          <img src="${p.photo}">
          <b>${p.user}</b>
        </div>

        <p>${p.text}</p>

        ${p.file ? (p.file.includes('video') 
        ? `<video src="${p.file}" controls></video>` 
        : `<img src="${p.file}">`) : ''}

        <div class="actions">
          ❤️ ${p.likes || 0}
          <button onclick="likePost('${p.id}',${p.likes||0})">Like</button>
        </div>

        <div class="commentBox">
          <input placeholder="comentario" id="c-${p.id}">
          <button onclick="commentPost('${p.id}')">Enviar</button>
        </div>

        <div>${renderComments(p.comments)}</div>
      `;

      feed.appendChild(div);
    });
  });
}

window.likePost = (id,likes)=>{
  update(ref(db,'posts/'+id),{likes:likes+1});
}

window.commentPost = (id)=>{
  const text = document.getElementById('c-'+id).value;
  push(ref(db,'posts/'+id+'/comments'),{
    user:currentUser.displayName,
    text
  });
}

function renderComments(comments){
  if(!comments) return '';
  let html='';
  Object.values(comments).forEach(c=>{
    html+=`<p><b>${c.user}:</b> ${c.text}</p>`;
  });
  return html;
}

// TENDENCIAS
function loadTrends(){
  onValue(ref(db,'posts'),snapshot=>{
    let arr=[];
    snapshot.forEach(c=>arr.push(c.val()));

    arr.sort((a,b)=>(b.views + b.likes*2)-(a.views + a.likes*2));

    trends.innerHTML='';

    arr.slice(0,5).forEach(p=>{
      let div=document.createElement('div');
      div.className='card';
      div.innerHTML=`🔥 ${p.text} <br> 👁 ${p.views} ❤️ ${p.likes}`;
      trends.appendChild(div);
    });
  });
}
</script>

<style>
body{
  margin:0;
  background:#0b0f1a;
  color:white;
  font-family:Arial;
  display:flex;
}

#login{
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  width:100%;
}

/* SIDEBAR */
.sidebar{
  width:220px;
  background:#0a0d17;
  padding:20px;
  height:100vh;
}

/* MAIN */
.main{
  flex:1;
  max-width:600px;
  margin:auto;
  padding:20px;
}

/* RIGHT */
.right{
  width:250px;
  background:#0a0d17;
  padding:20px;
}

/* CARD */
.card{
  background:#141a2e;
  padding:15px;
  margin:15px 0;
  border-radius:15px;
  transition:.3s;
}

.card:hover{
  transform:scale(1.02);
}

/* USER */
.user{
  display:flex;
  align-items:center;
  gap:10px;
}

.user img{
  width:40px;
  border-radius:50%;
}

/* PUBLICAR */
.postBox{
  background:#141a2e;
  padding:15px;
  border-radius:15px;
}

.postTop{
  display:flex;
  gap:10px;
  align-items:center;
}

.postTop img{
  width:45px;
  border-radius:50%;
}

input{
  flex:1;
  padding:10px;
  border-radius:20px;
  border:none;
  background:#1c233a;
  color:white;
  margin-top:8px;
}

/* BOTONES */
.actions{
  display:flex;
  justify-content:space-between;
  margin-top:10px;
}

button{
  background:#6c2cff;
  border:none;
  color:white;
  padding:8px 12px;
  border-radius:10px;
  cursor:pointer;
}

button:hover{
  background:#5a22d1;
}

/* PREVIEW */
#preview img, #preview video{
  width:100%;
  border-radius:10px;
  margin-top:10px;
}

/* COMENTARIOS */
.commentBox{
  display:flex;
  gap:5px;
  margin-top:10px;
}

/* ANIMACIÓN */
.fade{
  animation:fadeIn .5s ease;
}

@keyframes fadeIn{
  from{opacity:0; transform:translateY(10px);}
  to{opacity:1; transform:translateY(0);}
}
</style>
</head>

<body>

<div id="login">
<button onclick="loginGoogle()">Login con Google</button>
</div>

<div id="appDiv" style="display:none;width:100%">

<div class="sidebar">
<h2>Nebula</h2>
<img id="userPhoto" width="50" style="border-radius:50%">
<br>
<span id="userName"></span>
</div>

<div class="main">

<div class="postBox">
  <div class="postTop">
    <img id="userAvatar">
    <input id="postText" placeholder="¿Qué estás pensando?">
  </div>

  <input type="file" id="filePost" onchange="previewFile()">

  <div id="preview"></div>

  <div class="actions">
    <span>📸 🎥</span>
    <button onclick="publish()">Publicar</button>
  </div>
</div>

<div id="feed"></div>

</div>

<div class="right">
<h3>🔥 Tendencias</h3>
<div id="trends"></div>
</div>

</div>

</body>
</html>
