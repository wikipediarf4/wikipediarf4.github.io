<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nebula ULTRA</title>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getDatabase, ref, push, onValue, update } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyA9oat9dd0S9vlxkg1osH4dW3XhRDGiOiw",
  authDomain: "charlasrf4.firebaseapp.com",
  databaseURL: "https://charlasrf4-default-rtdb.firebaseio.com",
  projectId: "charlasrf4",
  storageBucket: "charlasrf4.firebasestorage.app",
  messagingSenderId: "345019626508",
  appId: "1:345019626508:web:d099ca499acb29eac12a29"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getDatabase(app);
const provider = new GoogleAuthProvider();

let currentUser = null;

window.loginGoogle = async () => {
  await signInWithPopup(auth, provider);
};

onAuthStateChanged(auth, (user) => {
  if (user) {
    currentUser = user;
    document.getElementById('login').style.display = 'none';
    document.getElementById('app').style.display = 'flex';
    document.getElementById('userName').innerText = user.displayName;
    document.getElementById('userPhoto').src = user.photoURL;
    loadFeed();
    loadTrends();
  }
});

// CLOUDINARY
const cloudName = "ds4ejt5sp";
const uploadPreset = "VIDEOS";

async function uploadFile(id){
  const file = document.getElementById(id).files[0];
  if(!file) return "";

  const formData = new FormData();
  formData.append('file', file);
  formData.append('upload_preset', uploadPreset);

  const res = await fetch(`https://api.cloudinary.com/v1_1/${cloudName}/auto/upload`,{
    method:'POST',
    body:formData
  });

  const data = await res.json();
  return data.secure_url;
}

// PUBLICAR
window.publish = async () => {
  const text = document.getElementById('postText').value;
  const file = await uploadFile('filePost');

  push(ref(db, 'posts'), {
    user: currentUser.displayName,
    photo: currentUser.photoURL,
    text,
    file,
    likes: 0,
    comments: {},
    views: 0,
    time: Date.now()
  });
};

// FEED
function loadFeed(){
  onValue(ref(db, 'posts'), snapshot => {
    const feed = document.getElementById('feed');
    feed.innerHTML = '';

    let postsArr = [];
    snapshot.forEach(child => {
      postsArr.push({id:child.key, ...child.val()});
    });

    postsArr.sort((a,b)=>b.time-a.time);

    postsArr.forEach(p=>{
      let div = document.createElement('div');
      div.className='card';

      update(ref(db, 'posts/'+p.id), {views:(p.views||0)+1});

      div.innerHTML = `
        <img src="${p.photo}" width="40" style="border-radius:50%"> ${p.user}
        <p>${p.text}</p>
        ${p.file ? (p.file.includes('video') ? `<video src="${p.file}" controls width="100%"></video>` : `<img src="${p.file}" width="100%">`) : ''}
        <br>
        ❤️ ${p.likes || 0}
        <button onclick="likePost('${p.id}',${p.likes||0})">Like</button>
        <div>
          <input placeholder="comentario" id="c-${p.id}">
          <button onclick="commentPost('${p.id}')">Enviar</button>
        </div>
        <div>${renderComments(p.comments)}</div>
      `;

      feed.appendChild(div);
    });
  });
}

window.likePost = (id,likes)=>{
  update(ref(db,'posts/'+id),{likes:likes+1});
}

window.commentPost = (id)=>{
  const text = document.getElementById('c-'+id).value;
  push(ref(db,'posts/'+id+'/comments'),{
    user:currentUser.displayName,
    text
  });
}

function renderComments(comments){
  if(!comments) return '';
  let html='';
  Object.values(comments).forEach(c=>{
    html+=`<p><b>${c.user}:</b> ${c.text}</p>`;
  });
  return html;
}

// TENDENCIAS
function loadTrends(){
  onValue(ref(db,'posts'),snapshot=>{
    let arr=[];
    snapshot.forEach(c=>arr.push(c.val()));

    arr.sort((a,b)=>(b.views + b.likes*2)-(a.views + a.likes*2));

    const trends=document.getElementById('trends');
    trends.innerHTML='';

    arr.slice(0,5).forEach(p=>{
      let div=document.createElement('div');
      div.className='card';
      div.innerHTML=`🔥 ${p.text} <br> 👁 ${p.views} ❤️ ${p.likes}`;
      trends.appendChild(div);
    });
  });
}
</script>

<style>
body{margin:0;background:#0b0f1a;color:white;font-family:Arial;display:flex}
#login{display:flex;justify-content:center;align-items:center;height:100vh;width:100%}
button{padding:8px;background:#6c2cff;border:none;color:white;border-radius:6px;cursor:pointer}
#app{display:none;width:100%}
.sidebar{width:220px;background:#0a0d17;padding:20px;height:100vh}
.main{flex:1;padding:20px}
.right{width:250px;background:#0a0d17;padding:20px}
.card{background:#141a2e;padding:10px;margin:10px 0;border-radius:10px}
</style>
</head>

<body>

<div id="login">
<button onclick="loginGoogle()">Login con Google</button>
</div>

<div id="app">
<div class="sidebar">
<h2>Nebula</h2>
<img id="userPhoto" width="50" style="border-radius:50%"><br>
<span id="userName"></span>
</div>

<div class="main">
<h3>Publicar</h3>
<input id="postText" placeholder="Que estas pensando?">
<input type="file" id="filePost">
<button onclick="publish()">Publicar</button>

<div id="feed"></div>
</div>

<div class="right">
<h3>🔥 Tendencias</h3>
<div id="trends"></div>
</div>

</div>

</body>
</html>
