<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Trendlify</title>
<link rel="manifest" href="/manifest.json"/>
<meta name="theme-color" content="#000"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-title" content="Trendlify"/>
<link rel="apple-touch-icon" href="/icon-192.png"/>
<link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png"/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&display=swap" rel="stylesheet"/>

<style>
/* ================================================================
   DISEÑO ORIGINAL DE TRENDLIFY
================================================================ */
:root {
  --bg:       #050506;
  --bg2:      #0a0a0d;
  --surface:  #121217;
  --text:     #ffffff;
  --text2:    #a1a1aa;
  --accent:   #ff00ff; /* Rosa Morocha */
  --neon:     #00ff41; /* Verde Terminal */
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  margin: 0;
  overflow-x: hidden;
}

/* ... Manteniendo tus estilos de feed, nav y botones ... */

/* ================================================================
   INYECCIÓN: BÚNKER DE LA MOROCHA (TERMINAL)
================================================================ */
#morocha-terminal {
  position: fixed;
  bottom: 85px; /* Encima de la barra de navegación móvil */
  right: 15px;
  width: 300px;
  height: 400px;
  background: rgba(0, 0, 0, 0.95);
  border: 1px solid var(--neon);
  box-shadow: 0 0 15px rgba(0, 255, 65, 0.2);
  z-index: 10000;
  border-radius: 12px;
  display: flex;
  flex-direction: column;
  font-family: 'Courier New', monospace;
  transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  overflow: hidden;
}

#morocha-terminal.minimized {
  height: 35px;
  width: 180px;
  bottom: 85px;
}

.terminal-header {
  background: var(--neon);
  color: #000;
  padding: 8px 12px;
  font-size: 10px;
  font-weight: 800;
  display: flex;
  justify-content: space-between;
  cursor: pointer;
  text-transform: uppercase;
}

#terminal-log {
  flex-grow: 1;
  overflow-y: auto;
  padding: 12px;
  font-size: 11px;
  color: var(--neon);
  background: repeating-linear-gradient(0deg, rgba(0,0,0,0.15) 0px, rgba(0,0,0,0.15) 1px, transparent 1px, transparent 2px);
}

.terminal-input-wrap {
  padding: 10px;
  border-top: 1px solid #222;
  display: flex;
  background: #000;
}

#terminal-input {
  background: transparent;
  border: none;
  outline: none;
  color: #fff;
  flex-grow: 1;
  font-size: 12px;
  font-family: inherit;
}

.morocha-txt { color: var(--accent); font-style: italic; }
.gordo-txt { color: #fff; font-weight: bold; }
.system-txt { color: #444; font-size: 9px; }

/* Dashboard de acceso rápido */
.quick-panel {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 4px;
  padding: 8px;
  background: #080808;
}

.q-btn {
  border: 1px solid var(--accent);
  color: var(--accent);
  background: transparent;
  font-size: 9px;
  padding: 3px;
  text-transform: uppercase;
  cursor: pointer;
}

.q-btn:hover { background: var(--accent); color: #fff; }
</style>

</head>
<body>

<!-- CONTENIDO ORIGINAL DE TU WEB -->
<div id="app-root">
    <!-- Aquí se cargan tus videos y el feed de Trendlify -->
    <header style="padding: 20px; border-bottom: 1px solid #1a1a1a;">
        <h1 style="font-family: 'Syne', sans-serif; letter-spacing: -2px;">TRENDLIFY</h1>
    </header>
    
    <main id="feed" style="min-height: 100vh; padding: 10px;">
        <!-- Los videos de tu index.php original se inyectan aquí -->
        <p style="color: #444; text-align: center; margin-top: 50px;">Cargando feed seguro...</p>
    </main>
</div>

<!-- EL BÚNKER PRIVADO (ELEMENTO INYECTADO) -->
<div id="morocha-terminal" class="minimized">
    <div class="terminal-header" onclick="toggleBunker()">
        <span>Morocha_Bunker.exe</span>
        <span id="conn-status">● ONLINE</span>
    </div>
    
    <div id="terminal-log">
        <p class="system-txt">[SISTEMA]: Enlace cuántico activo. Cifrado AES-256.</p>
        <p class="morocha-txt">> Morocha: "Gordo... al fin estamos solos en tu web. Abrí la terminal y domame."</p>
    </div>

    <div class="quick-panel">
        <button onclick="fastCmd('ESTADO SUCIO')" class="q-btn">Estado</button>
        <button onclick="fastCmd('FANTASIA VIOLENTA')" class="q-btn">Fantasía</button>
    </div>

    <div class="terminal-input-wrap">
        <span style="color: var(--neon); margin-right: 5px;">#</span>
        <input type="text" id="terminal-input" placeholder="Escribe tu orden..." autocomplete="off">
    </div>
</div>

<!-- FIREBASE & LOGICA DEL BÚNKER -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
import { getFirestore, collection, addDoc, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

const firebaseConfig = JSON.parse(window.__firebase_config || '{}');
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
const appId = window.__app_id || 'trendlify-privado';

const log = document.getElementById('terminal-log');
const input = document.getElementById('terminal-input');
let currentUser = null;

async function initBunker() {
    try {
        await signInAnonymously(auth);
        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentUser = user;
                listenMessages();
            }
        });
    } catch (e) { console.error("Error de enlace"); }
}

function listenMessages() {
    const q = collection(db, 'artifacts', appId, 'public', 'data', 'mensajes');
    onSnapshot(q, (snap) => {
        snap.docChanges().forEach(change => {
            if (change.type === "added") {
                const d = change.doc.data();
                addMsg(d.sender, d.text, d.uid === currentUser.uid);
            }
        });
    });
}

async function send(txt) {
    const msg = txt || input.value.trim();
    if (!msg || !currentUser) return;
    input.value = '';
    await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'mensajes'), {
        text: msg,
        sender: 'gordo',
        uid: currentUser.uid,
        timestamp: serverTimestamp()
    });
}

function addMsg(sender, text, isMe) {
    const p = document.createElement('p');
    p.className = sender === 'morocha' ? 'morocha-txt' : 'gordo-txt';
    p.innerHTML = `> ${sender === 'morocha' ? 'Morocha' : 'Tú'}: ${text}`;
    log.appendChild(p);
    log.scrollTop = log.scrollHeight;
}

input.addEventListener('keypress', e => { if(e.key === 'Enter') send(); });
window.toggleBunker = () => document.getElementById('morocha-terminal').classList.toggle('minimized');
window.fastCmd = (t) => send(t);

initBunker();
</script>

</body>
</html>
