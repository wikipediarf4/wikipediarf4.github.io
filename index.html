<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="origin">
    <title>Cine Pro Latino</title>
    <style>
        :root { --primary: #E50914; --bg: #141414; --text: #ffffff; }
        body { font-family: Arial, sans-serif; background: var(--bg); color: var(--text); margin: 0; text-align: center; }
        .search-box { margin: 20px; }
        input { padding: 12px; width: 300px; border-radius: 4px; border: none; }
        button { padding: 12px 20px; background: var(--primary); color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
        #results { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 20px; padding: 20px; }
        .card { background: #222; border-radius: 8px; overflow: hidden; cursor: pointer; transition: 0.3s; }
        .card:hover { transform: scale(1.05); }
        .card img { width: 100%; }
        #player-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: black; z-index: 1000; }
        .close-btn { position: absolute; top: 10px; right: 20px; font-size: 40px; color: white; cursor: pointer; z-index: 1001; }
        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>

    <h1 style="color: var(--primary); margin-top: 20px;">CINE PRO ESPAÑOL</h1>

    <div class="search-box">
        <input type="text" id="query" placeholder="Buscar película o serie...">
        <button onclick="buscar()">BUSCAR</button>
    </div>

    <div id="results"></div>

    <div id="player-overlay">
        <div class="close-btn" onclick="cerrar()">×</div>
        <iframe id="video-frame" src="" allowfullscreen referrerpolicy="origin"></iframe>
    </div>

    <script>
        const API_KEY = 'f663f105c4c1626d23e86d2ac19471a9';

        async function buscar() {
            const q = document.getElementById('query').value;
            if(!q) return;
            const res = await fetch(`https://api.themoviedb.org/3/search/multi?api_key=${API_KEY}&query=${encodeURIComponent(q)}&language=es-ES`);
            const data = await res.json();
            const resultsDiv = document.getElementById('results');
            resultsDiv.innerHTML = '';

            data.results.forEach(item => {
                if(!item.poster_path) return;
                const card = document.createElement('div');
                card.className = 'card';
                const tipo = item.media_type === 'tv' ? 'tv' : 'movie';
                card.innerHTML = `<img src="https://image.tmdb.org/t/p/w500${item.poster_path}"><div style="padding:5px">${item.title || item.name}</div>`;
                card.onclick = () => reproducir(tipo, item.id);
                resultsDiv.appendChild(card);
            });
        }

        function reproducir(tipo, id) {
            const overlay = document.getElementById('player-overlay');
            const frame = document.getElementById('video-frame');
            
            // Intentamos forzar español con el parámetro lang=es
            frame.src = `https://vidsrc.to/embed/${tipo}/${id}?lang=es`;
            
            overlay.style.display = 'block';
        }

        function cerrar() {
            document.getElementById('player-overlay').style.display = 'none';
            document.getElementById('video-frame').src = '';
        }
    </script>
</body>
</html>
