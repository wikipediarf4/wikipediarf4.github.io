<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>VibeChat</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #13131a;
    --surface2: #1c1c28;
    --surface3: #252535;
    --border: rgba(255,255,255,0.07);
    --accent: #7c6aff;
    --accent2: #ff6ab0;
    --accent3: #6affd4;
    --text: #e8e8f0;
    --text-muted: #6b6b80;
    --text-dim: #9999b0;
    --glow: rgba(124,106,255,0.25);
    --glow2: rgba(255,106,176,0.15);
    --radius: 16px;
    --radius-sm: 10px;
    --font-head: 'Syne', sans-serif;
    --font-body: 'DM Sans', sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-body);
    font-size: 15px;
    overflow: hidden;
  }

  /* SCROLLBAR */
  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--surface3); border-radius: 99px; }

  /* LAYOUT */
  #app { height: 100vh; display: flex; flex-direction: column; }

  /* ── AUTH OVERLAY ── */
  #auth-overlay {
    position: fixed; inset: 0; z-index: 100;
    background: var(--bg);
    display: flex; align-items: center; justify-content: center;
    padding: 20px;
    animation: fadeIn .4s ease;
  }
  #auth-overlay.hidden { display: none; }

  .auth-card {
    width: 100%; max-width: 420px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 40px 36px;
    box-shadow: 0 0 80px var(--glow), 0 0 40px var(--glow2);
  }

  .auth-logo {
    font-family: var(--font-head);
    font-size: 2rem;
    font-weight: 800;
    letter-spacing: -1px;
    margin-bottom: 6px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .auth-sub { color: var(--text-muted); font-size: .9rem; margin-bottom: 28px; }

  .tab-row {
    display: flex; gap: 4px;
    background: var(--surface2);
    border-radius: var(--radius-sm);
    padding: 4px;
    margin-bottom: 24px;
  }
  .tab-btn {
    flex: 1; padding: 8px;
    border: none; background: transparent;
    color: var(--text-muted);
    font-family: var(--font-body);
    font-weight: 500; font-size: .9rem;
    border-radius: 7px;
    cursor: pointer; transition: all .2s;
  }
  .tab-btn.active {
    background: var(--surface3);
    color: var(--text);
    box-shadow: 0 1px 4px rgba(0,0,0,.3);
  }

  .form-section { display: none; }
  .form-section.active { display: block; }

  .input-group { margin-bottom: 14px; }
  .input-group label { display: block; font-size: .8rem; color: var(--text-muted); margin-bottom: 6px; font-weight: 500; letter-spacing: .5px; text-transform: uppercase; }

  .inp {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 11px 14px;
    color: var(--text);
    font-family: var(--font-body);
    font-size: .95rem;
    outline: none;
    transition: border-color .2s, box-shadow .2s;
  }
  .inp:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(124,106,255,.15); }
  .inp::placeholder { color: var(--text-muted); }

  .inp-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

  .avatar-upload-area {
    border: 2px dashed var(--border);
    border-radius: var(--radius-sm);
    padding: 20px;
    text-align: center;
    cursor: pointer;
    transition: all .2s;
    position: relative;
    overflow: hidden;
  }
  .avatar-upload-area:hover { border-color: var(--accent); background: rgba(124,106,255,.05); }
  .avatar-upload-area input { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
  .avatar-preview-img { width: 64px; height: 64px; border-radius: 50%; object-fit: cover; border: 2px solid var(--accent); margin: 0 auto 8px; display: none; }
  .upload-icon { font-size: 2rem; margin-bottom: 6px; }
  .upload-text { font-size: .85rem; color: var(--text-muted); }
  .upload-text span { color: var(--accent); font-weight: 600; }

  .btn-primary {
    width: 100%; padding: 13px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border: none; border-radius: var(--radius-sm);
    color: #fff; font-family: var(--font-head);
    font-weight: 700; font-size: 1rem;
    cursor: pointer; transition: opacity .2s, transform .1s;
    margin-top: 8px;
    letter-spacing: .5px;
  }
  .btn-primary:hover { opacity: .9; }
  .btn-primary:active { transform: scale(.98); }
  .btn-primary:disabled { opacity: .5; cursor: not-allowed; }

  .auth-error {
    background: rgba(255,80,80,.1);
    border: 1px solid rgba(255,80,80,.3);
    color: #ff7070;
    border-radius: var(--radius-sm);
    padding: 10px 14px;
    font-size: .85rem;
    margin-top: 12px;
    display: none;
  }
  .auth-error.visible { display: block; }

  .btn-google {
    width: 100%; padding: 12px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--text);
    font-family: var(--font-body);
    font-weight: 500; font-size: .95rem;
    cursor: pointer; transition: all .2s;
    display: flex; align-items: center; justify-content: center; gap: 10px;
    margin-top: 8px;
  }
  .btn-google:hover { border-color: var(--accent); background: rgba(124,106,255,.08); }
  .btn-google:active { transform: scale(.98); }
  .btn-google:disabled { opacity: .5; cursor: not-allowed; }
  .google-icon { width: 18px; height: 18px; flex-shrink: 0; }
  .auth-divider {
    display: flex; align-items: center; gap: 10px;
    margin: 16px 0 8px;
    color: var(--text-muted); font-size: .8rem;
  }
  .auth-divider::before, .auth-divider::after {
    content: ''; flex: 1; height: 1px; background: var(--border);
  }

  /* ── PROFILE MODAL ── */
  #profile-modal {
    position: fixed; inset: 0; z-index: 90;
    background: rgba(0,0,0,.7);
    backdrop-filter: blur(6px);
    display: flex; align-items: center; justify-content: center;
    padding: 20px;
    animation: fadeIn .3s ease;
  }
  #profile-modal.hidden { display: none; }

  .profile-card {
    width: 100%; max-width: 440px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 36px;
    box-shadow: 0 0 60px var(--glow);
    max-height: 90vh;
    overflow-y: auto;
  }

  .profile-card h2 {
    font-family: var(--font-head);
    font-size: 1.4rem; font-weight: 700;
    margin-bottom: 4px;
  }
  .profile-card .sub { color: var(--text-muted); font-size: .85rem; margin-bottom: 24px; }

  /* ── MAIN APP ── */
  #main-app { display: flex; flex-direction: column; height: 100vh; }

  /* HEADER */
  .app-header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 12px 16px;
    display: flex; align-items: center; justify-content: space-between;
    gap: 12px;
    flex-shrink: 0;
    z-index: 10;
  }

  .header-brand {
    font-family: var(--font-head);
    font-size: 1.3rem; font-weight: 800;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    letter-spacing: -0.5px;
    white-space: nowrap;
  }

  .header-actions { display: flex; align-items: center; gap: 10px; }

  .header-avatar {
    width: 36px; height: 36px;
    border-radius: 50%;
    object-fit: cover;
    border: 2px solid var(--accent);
    cursor: pointer;
    transition: transform .2s;
  }
  .header-avatar:hover { transform: scale(1.08); }

  .btn-icon {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 7px 10px;
    color: var(--text-muted);
    font-size: .8rem;
    cursor: pointer;
    transition: all .2s;
    font-family: var(--font-body);
    white-space: nowrap;
  }
  .btn-icon:hover { color: var(--text); border-color: var(--accent); background: rgba(124,106,255,.08); }

  /* YOUTUBE SECTION */
  .yt-section {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 12px 16px;
    flex-shrink: 0;
  }

  .yt-controls {
    display: flex; gap: 8px; align-items: center;
    margin-bottom: 10px;
  }

  .yt-input {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 12px;
    color: var(--text);
    font-family: var(--font-body);
    font-size: .85rem;
    outline: none;
    transition: border-color .2s;
  }
  .yt-input:focus { border-color: var(--accent); }
  .yt-input::placeholder { color: var(--text-muted); }

  .btn-yt {
    background: linear-gradient(135deg, #ff0000, #cc0000);
    border: none;
    border-radius: 8px;
    padding: 8px 14px;
    color: #fff;
    font-weight: 600; font-size: .8rem;
    cursor: pointer;
    white-space: nowrap;
    font-family: var(--font-body);
    transition: opacity .2s;
  }
  .btn-yt:hover { opacity: .85; }

  .yt-frame-wrap {
    position: relative;
    width: 100%;
    padding-bottom: 30%;
    border-radius: var(--radius-sm);
    overflow: hidden;
    background: #000;
    border: 1px solid var(--border);
  }
  .yt-frame-wrap iframe {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    border: none;
  }

  .yt-playlist {
    display: flex; gap: 6px;
    margin-top: 8px;
    flex-wrap: wrap;
  }

  .yt-chip {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 99px;
    padding: 4px 12px;
    font-size: .75rem;
    color: var(--text-muted);
    cursor: pointer;
    transition: all .2s;
    white-space: nowrap;
  }
  .yt-chip:hover { color: var(--text); border-color: var(--accent); }

  /* CHAT AREA */
  .chat-wrapper {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    min-height: 0;
  }

  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    min-height: 0;
  }

  .msg {
    display: flex; gap: 10px; align-items: flex-start;
    animation: slideUp .25s ease;
  }

  .msg.own { flex-direction: row-reverse; }

  .msg-avatar {
    width: 36px; height: 36px;
    border-radius: 50%;
    object-fit: cover;
    border: 1.5px solid var(--border);
    flex-shrink: 0;
    cursor: pointer;
    transition: transform .2s;
  }
  .msg-avatar:hover { transform: scale(1.1); }

  .msg-body { max-width: 68%; }
  .msg.own .msg-body { align-items: flex-end; display: flex; flex-direction: column; }

  .msg-meta {
    display: flex; align-items: center; gap: 6px;
    margin-bottom: 4px;
    flex-wrap: wrap;
  }
  .msg.own .msg-meta { flex-direction: row-reverse; }

  .msg-name {
    font-size: .8rem; font-weight: 600;
    color: var(--accent);
  }
  .msg.own .msg-name { color: var(--accent2); }

  .msg-location {
    font-size: .7rem;
    color: var(--text-muted);
    background: var(--surface2);
    padding: 1px 7px;
    border-radius: 99px;
    border: 1px solid var(--border);
  }

  .msg-time { font-size: .7rem; color: var(--text-muted); }

  .msg-bubble {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 14px 14px 14px 4px;
    padding: 9px 14px;
    font-size: .9rem;
    line-height: 1.5;
    color: var(--text);
    word-break: break-word;
  }
  .msg.own .msg-bubble {
    background: linear-gradient(135deg, rgba(124,106,255,.2), rgba(255,106,176,.15));
    border-color: rgba(124,106,255,.3);
    border-radius: 14px 14px 4px 14px;
  }

  /* CHAT INPUT */
  .chat-input-bar {
    background: var(--surface);
    border-top: 1px solid var(--border);
    padding: 12px 16px;
    flex-shrink: 0;
  }

  .no-profile-warning {
    background: rgba(255,106,176,.08);
    border: 1px solid rgba(255,106,176,.25);
    border-radius: var(--radius-sm);
    padding: 10px 16px;
    color: var(--accent2);
    font-size: .85rem;
    text-align: center;
    display: none;
  }
  .no-profile-warning.visible { display: block; }
  .no-profile-warning a {
    color: var(--accent2);
    font-weight: 600;
    cursor: pointer;
    text-decoration: underline;
  }

  .input-row {
    display: flex; gap: 8px; align-items: flex-end;
  }

  .msg-input {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 10px 14px;
    color: var(--text);
    font-family: var(--font-body);
    font-size: .95rem;
    outline: none;
    resize: none;
    max-height: 120px;
    line-height: 1.5;
    transition: border-color .2s;
  }
  .msg-input:focus { border-color: var(--accent); }
  .msg-input::placeholder { color: var(--text-muted); }

  .btn-send {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border: none;
    border-radius: 12px;
    width: 44px; height: 44px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    transition: opacity .2s, transform .1s;
    flex-shrink: 0;
  }
  .btn-send:hover { opacity: .9; }
  .btn-send:active { transform: scale(.95); }
  .btn-send svg { width: 18px; height: 18px; fill: white; }

  /* USER POPUP */
  #user-popup {
    position: fixed;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    min-width: 220px;
    box-shadow: 0 8px 40px rgba(0,0,0,.5), 0 0 30px var(--glow);
    z-index: 50;
    animation: fadeIn .2s ease;
    display: none;
  }
  #user-popup.visible { display: block; }

  .popup-avatar { width: 56px; height: 56px; border-radius: 50%; object-fit: cover; border: 2px solid var(--accent); margin-bottom: 10px; }
  .popup-name { font-family: var(--font-head); font-weight: 700; font-size: 1rem; margin-bottom: 2px; }
  .popup-info { font-size: .8rem; color: var(--text-muted); line-height: 1.7; }
  .popup-info span { color: var(--text-dim); }

  /* TOAST */
  #toast {
    position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 99px;
    padding: 10px 20px;
    font-size: .85rem;
    color: var(--text);
    z-index: 999;
    opacity: 0; pointer-events: none;
    transition: opacity .3s;
    white-space: nowrap;
    box-shadow: 0 4px 20px rgba(0,0,0,.4);
  }
  #toast.show { opacity: 1; }

  /* LOADER */
  .loader {
    display: inline-block; width: 14px; height: 14px;
    border: 2px solid rgba(255,255,255,.2);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin .6s linear infinite;
    vertical-align: middle; margin-right: 6px;
  }

  /* ONLINE COUNT */
  .online-badge {
    display: flex; align-items: center; gap: 5px;
    font-size: .75rem; color: var(--text-muted);
  }
  .online-dot {
    width: 7px; height: 7px;
    background: var(--accent3);
    border-radius: 50%;
    box-shadow: 0 0 6px var(--accent3);
    animation: pulse 2s infinite;
  }

  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: .4; } }

  /* ADMIN PANEL */
  #admin-panel {
    background: linear-gradient(135deg, rgba(124,106,255,.08), rgba(255,106,176,.06));
    border-bottom: 1px solid rgba(124,106,255,.25);
    padding: 10px 16px;
    flex-shrink: 0;
    display: none;
  }
  #admin-panel.visible { display: block; }

  .admin-header {
    display: flex; align-items: center; gap: 8px;
    margin-bottom: 10px;
  }
  .admin-badge {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #fff; font-size: .7rem; font-weight: 700;
    padding: 2px 8px; border-radius: 99px;
    font-family: var(--font-head); letter-spacing: .5px;
  }
  .admin-title {
    font-family: var(--font-head); font-weight: 700;
    font-size: .95rem; color: var(--text);
  }

  .admin-yt-row {
    display: flex; gap: 8px; align-items: center;
  }
  .admin-yt-input {
    flex: 1;
    background: var(--surface2);
    border: 1px solid rgba(124,106,255,.35);
    border-radius: 8px;
    padding: 8px 12px;
    color: var(--text);
    font-family: var(--font-body);
    font-size: .85rem;
    outline: none;
    transition: border-color .2s;
  }
  .admin-yt-input:focus { border-color: var(--accent); }
  .admin-yt-input::placeholder { color: var(--text-muted); }

  .btn-admin {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border: none; border-radius: 8px;
    padding: 8px 16px; color: #fff;
    font-family: var(--font-head); font-weight: 700;
    font-size: .8rem; cursor: pointer;
    transition: opacity .2s; white-space: nowrap;
  }
  .btn-admin:hover { opacity: .85; }

  .btn-admin-danger {
    background: linear-gradient(135deg, #ff4444, #cc0000);
    border: none; border-radius: 8px;
    padding: 8px 14px; color: #fff;
    font-family: var(--font-head); font-weight: 700;
    font-size: .8rem; cursor: pointer;
    transition: opacity .2s; white-space: nowrap;
  }
  .btn-admin-danger:hover { opacity: .85; }

  /* MSG delete btn for admin */
  .msg-delete-btn {
    display: none;
    background: rgba(255,60,60,.15);
    border: 1px solid rgba(255,60,60,.3);
    border-radius: 6px;
    color: #ff6060; font-size: .7rem;
    padding: 2px 7px; cursor: pointer;
    transition: all .2s; margin-top: 4px;
  }
  .msg-delete-btn:hover { background: rgba(255,60,60,.3); }
  body.is-admin .msg-delete-btn { display: inline-block; }

  /* RESPONSIVE */
  @media (max-width: 600px) {
    .yt-frame-wrap { padding-bottom: 45%; }
    .auth-card { padding: 28px 20px; }
    .inp-row { grid-template-columns: 1fr; }
    .msg-body { max-width: 80%; }
    .yt-playlist { display: none; }
  }
</style>
</head>
<body>

<!-- AUTH OVERLAY -->
<div id="auth-overlay">
  <div class="auth-card">
    <div class="auth-logo">VibeChat</div>
    <div class="auth-sub">Conectate, escuchá música y chateá en tiempo real.</div>

    <div class="tab-row">
      <button class="tab-btn active" onclick="switchTab('login')">Ingresar</button>
      <button class="tab-btn" onclick="switchTab('register')">Registrarse</button>
    </div>

    <!-- LOGIN -->
    <div class="form-section active" id="tab-login">
      <div class="input-group">
        <label>Email</label>
        <input class="inp" id="login-email" type="email" placeholder="tu@email.com"/>
      </div>
      <div class="input-group">
        <label>Contraseña</label>
        <input class="inp" id="login-pass" type="password" placeholder="••••••••"/>
      </div>
      <button class="btn-primary" id="btn-login" onclick="doLogin()">Entrar</button>
      <div class="auth-divider">o</div>
      <button class="btn-google" id="btn-google-login" onclick="doLoginGoogle()">
        <svg class="google-icon" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
          <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
          <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
          <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
          <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
        </svg>
        Continuar con Google
      </button>
      <div class="auth-error" id="login-error"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut, GoogleAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, collection, doc, setDoc, getDoc, addDoc, onSnapshot, query, orderBy, serverTimestamp, deleteDoc, getDocs, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

// ══════════════════════════════════════════════
// 🔥 CONFIGURACIÓN FIREBASE
// ══════════════════════════════════════════════
const firebaseConfig = {
  apiKey: "AIzaSyA9oat9dd0S9vlxkg1osH4dW3XhRDGiOiw",
  authDomain: "charlasrf4.firebaseapp.com",
  projectId: "charlasrf4",
  storageBucket: "charlasrf4.firebasestorage.app",
  messagingSenderId: "345019626508",
  appId: "1:345019626508:web:d099ca499acb29eac12a29"
};

// ──────────────────────────────────────────────
// ☁️ CLOUDINARY
// ──────────────────────────────────────────────
const CLOUDINARY_CLOUD_NAME = "da0n5tg3g";
const CLOUDINARY_UPLOAD_PRESET = "wikipediarf4";

// ── ADMIN EMAIL ──
const ADMIN_EMAIL = "synxyes@gmail.com";

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// ── State ──
let currentUser = null;
let currentProfile = null;
let avatarFileReg = null;
let avatarFileEdit = null;
let unsubscribeChat = null;
let unsubscribeVideo = null;

// ── Expose globals ──
window._auth = auth;
window._db = db;
window._signOut = signOut;
window._signInWithPopup = signInWithPopup;
window._GoogleAuthProvider = GoogleAuthProvider;
window._CLOUDINARY_CLOUD_NAME = CLOUDINARY_CLOUD_NAME;
window._CLOUDINARY_UPLOAD_PRESET = CLOUDINARY_UPLOAD_PRESET;
window._createUserWithEmailAndPassword = createUserWithEmailAndPassword;
window._signInWithEmailAndPassword = signInWithEmailAndPassword;
window._ADMIN_EMAIL = ADMIN_EMAIL;

window._setCurrentUser = (u) => { currentUser = u; };
window._getCurrentUser = () => currentUser;
window._setCurrentProfile = (p) => { currentProfile = p; };
window._getCurrentProfile = () => currentProfile;
window._setAvatarFileReg = (f) => { avatarFileReg = f; };
window._getAvatarFileReg = () => avatarFileReg;
window._setAvatarFileEdit = (f) => { avatarFileEdit = f; };
window._getAvatarFileEdit = () => avatarFileEdit;
window._isAdmin = () => currentUser?.email === ADMIN_EMAIL;

// ── Auth state ──
onAuthStateChanged(auth, async (user) => {
  if (user) {
    currentUser = user;
    window._setCurrentUser(user);
    const snap = await getDoc(doc(db, 'users', user.uid));
    const profile = snap.exists() ? snap.data() : null;
    currentProfile = profile;
    window._setCurrentProfile(profile);
    showMainApp(user, profile);
    startChat();
    updateOnlinePresence(user.uid);
    startVideoSync();

    // Mostrar panel admin si corresponde
    if (user.email === ADMIN_EMAIL) {
      document.body.classList.add('is-admin');
      const panel = document.getElementById('admin-panel');
      if (panel) panel.classList.add('visible');
    }
  } else {
    currentUser = null;
    currentProfile = null;
    if (unsubscribeChat) { unsubscribeChat(); unsubscribeChat = null; }
    if (unsubscribeVideo) { unsubscribeVideo(); unsubscribeVideo = null; }
    document.body.classList.remove('is-admin');
    showAuthOverlay();
  }
});

// ── Online presence con Firestore ──
function updateOnlinePresence(uid) {
  const presRef = doc(db, 'online', uid);
  setDoc(presRef, { online: true, ts: Date.now() });

  onSnapshot(collection(db, 'online'), snap => {
    const el = document.getElementById('online-count');
    if (el) el.textContent = `${snap.size} online`;
  });
}

// ── Sincronizar video en tiempo real para todos ──
function startVideoSync() {
  if (unsubscribeVideo) unsubscribeVideo();
  const videoRef = doc(db, 'config', 'currentVideo');
  unsubscribeVideo = onSnapshot(videoRef, (snap) => {
    if (snap.exists()) {
      const data = snap.data();
      const iframe = document.getElementById('yt-iframe');
      if (iframe && data.videoId) {
        const newSrc = `https://www.youtube.com/embed/${data.videoId}?autoplay=1`;
        if (!iframe.src.includes(data.videoId)) {
          iframe.src = newSrc;
        }
      }
    }
  });
}

// ── Chat en tiempo real con Firestore ──
function startChat() {
  if (unsubscribeChat) unsubscribeChat();
  const q = query(collection(db, 'messages'), orderBy('ts', 'asc'));
  unsubscribeChat = onSnapshot(q, (snap) => {
    const msgs = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    renderMessages(msgs);
  });
}

function renderMessages(msgs) {
  const container = document.getElementById('messages');
  if (!container) return;
  container.innerHTML = '';
  const uid = currentUser?.uid;
  const isAdmin = currentUser?.email === ADMIN_EMAIL;
  msgs.forEach(msg => {
    const isOwn = msg.uid === uid;
    const div = document.createElement('div');
    div.className = `msg${isOwn ? ' own' : ''}`;

    const ts = msg.ts?.toDate ? msg.ts.toDate() : (msg.ts ? new Date(msg.ts) : null);
    const time = ts ? ts.toLocaleTimeString('es-AR', { hour: '2-digit', minute: '2-digit' }) : '';
    const locationStr = msg.city ? `${msg.city}, ${msg.country || ''}` : (msg.country || '');

    const adminControls = isAdmin ? `
      <div>
        <button class="msg-delete-btn" onclick="adminDeleteMsg('${msg.id}')">🗑 Borrar</button>
        ${!isOwn ? `<button class="msg-delete-btn" style="margin-left:4px" onclick="adminBanUser('${msg.uid}', '${(msg.name||'').replace(/'/g,"\\'")}')">🚫 Banear</button>` : ''}
      </div>` : '';

    div.innerHTML = `
      <img class="msg-avatar" src="${msg.avatar || 'https://api.dicebear.com/7.x/thumbs/svg?seed=' + msg.uid}"
           alt="" onclick="showUserPopup(event, ${JSON.stringify(msg).replace(/"/g, '&quot;')})"/>
      <div class="msg-body">
        <div class="msg-meta">
          <span class="msg-name">${msg.name || 'Anónimo'}</span>
          ${locationStr ? `<span class="msg-location">📍 ${locationStr}</span>` : ''}
          <span class="msg-time">${time}</span>
        </div>
        <div class="msg-bubble">${escapeHtml(msg.text)}</div>
        ${adminControls}
      </div>
    `;
    container.appendChild(div);
  });
  container.scrollTop = container.scrollHeight;
}

// ── Push message a Firestore ──
window._pushMessage = async (msgData) => {
  await addDoc(collection(db, 'messages'), {
    ...msgData,
    ts: serverTimestamp()
  });
};

// ── Guardar/leer perfil en Firestore ──
window._saveUserProfile = async (uid, data) => {
  await setDoc(doc(db, 'users', uid), data, { merge: true });
};

window._loadUserProfile = async (uid) => {
  const snap = await getDoc(doc(db, 'users', uid));
  return snap.exists() ? snap.data() : null;
};

// ── ADMIN: Set video global ──
window._adminSetVideoId = async (videoId) => {
  await setDoc(doc(db, 'config', 'currentVideo'), { videoId, setAt: Date.now() });
};

// ── ADMIN: Borrar mensaje ──
window._adminDeleteMsg = async (msgId) => {
  await deleteDoc(doc(db, 'messages', msgId));
};

// ── ADMIN: Banear usuario (borrar su perfil y mensajes) ──
window._adminBanUser = async (uid) => {
  // Marcar usuario como baneado
  await setDoc(doc(db, 'banned', uid), { bannedAt: Date.now() });
  // Borrar sus mensajes
  const q = query(collection(db, 'messages'));
  const snap = await getDocs(q);
  const toDelete = snap.docs.filter(d => d.data().uid === uid);
  for (const d of toDelete) {
    await deleteDoc(d.ref);
  }
};

// ── ADMIN: Limpiar todo el chat ──
window._adminClearChat = async () => {
  const snap = await getDocs(collection(db, 'messages'));
  for (const d of snap.docs) {
    await deleteDoc(d.ref);
  }
};
</script>

<script>
// ══════════════════════════════════════════════
// UI HELPERS
// ══════════════════════════════════════════════

function showToast(msg, duration = 2500) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), duration);
}

function escapeHtml(str) {
  const d = document.createElement('div');
  d.appendChild(document.createTextNode(str));
  return d.innerHTML;
}

function switchTab(tab) {
  document.querySelectorAll('.tab-btn').forEach((b, i) => {
    b.classList.toggle('active', (i === 0 && tab === 'login') || (i === 1 && tab === 'register'));
  });
  document.getElementById('tab-login').classList.toggle('active', tab === 'login');
  document.getElementById('tab-register').classList.toggle('active', tab === 'register');
}

function showAuthOverlay() {
  document.getElementById('auth-overlay').classList.remove('hidden');
  document.getElementById('main-app').style.display = 'none';
}

function showMainApp(user, profile) {
  document.getElementById('auth-overlay').classList.add('hidden');
  document.getElementById('main-app').style.display = 'flex';

  // Set header avatar
  const avatar = profile?.avatar || `https://api.dicebear.com/7.x/thumbs/svg?seed=${user.uid}`;
  document.getElementById('header-avatar').src = avatar;

  // Check profile completeness
  checkChatAccess(profile);
}

function checkChatAccess(profile) {
  const hasAvatar = profile && profile.avatar;
  const warning = document.getElementById('no-profile-warning');
  const inputRow = document.getElementById('input-row');

  if (!hasAvatar) {
    warning.classList.add('visible');
    inputRow.style.display = 'none';
  } else {
    warning.classList.remove('visible');
    inputRow.style.display = 'flex';
  }
}

function openProfileModal() {
  const profile = window._getCurrentProfile ? window._getCurrentProfile() : null;
  if (profile) {
    document.getElementById('edit-name').value = profile.name || '';
    document.getElementById('edit-country').value = profile.country || '';
    document.getElementById('edit-city').value = profile.city || '';
    document.getElementById('edit-age').value = profile.age || '';
    document.getElementById('edit-phone').value = profile.phone || '';
    if (profile.avatar) {
      const img = document.getElementById('edit-avatar-img');
      img.src = profile.avatar;
      img.style.display = 'block';
      document.getElementById('edit-upload-placeholder').style.display = 'none';
    }
  }
  document.getElementById('profile-modal').classList.remove('hidden');
}

// ── Avatar preview (register) ──
function previewAvatar(e) {
  const file = e.target.files[0];
  if (!file) return;
  if (window._setAvatarFileReg) window._setAvatarFileReg(file);
  const reader = new FileReader();
  reader.onload = ev => {
    const img = document.getElementById('avatar-preview-img');
    img.src = ev.target.result;
    img.style.display = 'block';
    document.getElementById('upload-placeholder').style.display = 'none';
  };
  reader.readAsDataURL(file);
}

// ── Avatar preview (edit) ──
function previewEditAvatar(e) {
  const file = e.target.files[0];
  if (!file) return;
  if (window._setAvatarFileEdit) window._setAvatarFileEdit(file);
  const reader = new FileReader();
  reader.onload = ev => {
    const img = document.getElementById('edit-avatar-img');
    img.src = ev.target.result;
    img.style.display = 'block';
    document.getElementById('edit-upload-placeholder').style.display = 'none';
  };
  reader.readAsDataURL(file);
}

// ── Upload to Cloudinary ──
async function uploadToCloudinary(file) {
  const cloudName = window._CLOUDINARY_CLOUD_NAME;
  const preset = window._CLOUDINARY_UPLOAD_PRESET;
  const formData = new FormData();
  formData.append('file', file);
  formData.append('upload_preset', preset);
  const res = await fetch(`https://api.cloudinary.com/v1_1/${cloudName}/image/upload`, {
    method: 'POST', body: formData
  });
  const data = await res.json();
  if (!data.secure_url) throw new Error('Cloudinary error: ' + JSON.stringify(data));
  return data.secure_url;
}

// ── REGISTER ──
async function doRegister() {
  const name = document.getElementById('reg-name').value.trim();
  const email = document.getElementById('reg-email').value.trim();
  const pass = document.getElementById('reg-pass').value;
  const country = document.getElementById('reg-country').value.trim();
  const city = document.getElementById('reg-city').value.trim();
  const age = document.getElementById('reg-age').value.trim();
  const phone = document.getElementById('reg-phone').value.trim();
  const avatarFile = window._getAvatarFileReg ? window._getAvatarFileReg() : null;
  const errEl = document.getElementById('register-error');
  const btn = document.getElementById('btn-register');

  errEl.classList.remove('visible');

  if (!avatarFile) { showError(errEl, '⚠️ La foto de perfil es obligatoria.'); return; }
  if (!name) { showError(errEl, '⚠️ Ingresá tu nombre.'); return; }
  if (!email || !pass) { showError(errEl, '⚠️ Completá email y contraseña.'); return; }
  if (pass.length < 6) { showError(errEl, '⚠️ La contraseña debe tener al menos 6 caracteres.'); return; }

  btn.disabled = true;
  btn.innerHTML = '<span class="loader"></span>Creando cuenta...';

  try {
    let avatarUrl = '';
    avatarUrl = await uploadToCloudinary(avatarFile);

    const cred = await window._createUserWithEmailAndPassword(window._auth, email, pass);
    const uid = cred.user.uid;

    const profile = { name, email, country, city, age, phone, avatar: avatarUrl, uid };
    await window._saveUserProfile(uid, profile);

    showToast('✅ Cuenta creada. ¡Bienvenido!');
  } catch (err) {
    showError(errEl, '❌ ' + (err.message || 'Error al registrar'));
  } finally {
    btn.disabled = false;
    btn.innerHTML = 'Crear cuenta';
  }
}

// ── LOGIN CON GOOGLE ──
async function doLoginGoogle() {
  const errEl = document.getElementById('login-error');
  const btn = document.getElementById('btn-google-login');
  errEl.classList.remove('visible');
  btn.disabled = true;
  btn.innerHTML = `<span class="loader"></span>Conectando con Google...`;
  try {
    const provider = new window._GoogleAuthProvider();
    const cred = await window._signInWithPopup(window._auth, provider);
    const user = cred.user;
    // Si es usuario nuevo, crear perfil base con datos de Google
    const profile = await window._loadUserProfile(user.uid);
    if (!profile) {
      await window._saveUserProfile(user.uid, {
        name: user.displayName || 'Usuario',
        email: user.email || '',
        avatar: user.photoURL || '',
        uid: user.uid,
        country: '', city: '', age: '', phone: ''
      });
    }
    // onAuthStateChanged maneja el resto
  } catch (err) {
    if (err.code !== 'auth/popup-closed-by-user') {
      showError(errEl, '❌ ' + (err.message || 'Error al ingresar con Google'));
    }
    btn.disabled = false;
    btn.innerHTML = `<svg class="google-icon" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>Continuar con Google`;
  }
}

// ── LOGIN ──
async function doLogin() {
  const email = document.getElementById('login-email').value.trim();
  const pass = document.getElementById('login-pass').value;
  const errEl = document.getElementById('login-error');
  const btn = document.getElementById('btn-login');

  errEl.classList.remove('visible');
  if (!email || !pass) { showError(errEl, '⚠️ Completá los campos.'); return; }

  btn.disabled = true;
  btn.innerHTML = '<span class="loader"></span>Ingresando...';

  try {
    await window._signInWithEmailAndPassword(window._auth, email, pass);
  } catch (err) {
    showError(errEl, '❌ Email o contraseña incorrectos.');
  } finally {
    btn.disabled = false;
    btn.innerHTML = 'Entrar';
  }
}

// ── LOGOUT ──
async function doLogout() {
  const user = window._getCurrentUser ? window._getCurrentUser() : null;
  if (user) {
    try { await window._set(window._ref(window._db, `online/${user.uid}`), null); } catch(e){}
  }
  await window._signOut(window._auth);
}

// ── SAVE PROFILE ──
async function saveProfile() {
  const user = window._getCurrentUser ? window._getCurrentUser() : null;
  if (!user) return;

  const name = document.getElementById('edit-name').value.trim();
  const country = document.getElementById('edit-country').value.trim();
  const city = document.getElementById('edit-city').value.trim();
  const age = document.getElementById('edit-age').value.trim();
  const phone = document.getElementById('edit-phone').value.trim();
  const avatarFile = window._getAvatarFileEdit ? window._getAvatarFileEdit() : null;
  const errEl = document.getElementById('profile-error');
  const btn = document.getElementById('btn-save-profile');

  errEl.classList.remove('visible');

  if (!name) { showError(errEl, '⚠️ Ingresá tu nombre/nick.'); return; }

  const existingProfile = window._getCurrentProfile ? window._getCurrentProfile() : {};
  const hasExistingAvatar = existingProfile && existingProfile.avatar;

  if (!avatarFile && !hasExistingAvatar) {
    showError(errEl, '⚠️ Necesitás una foto de perfil.'); return;
  }

  btn.disabled = true;
  btn.innerHTML = '<span class="loader"></span>Guardando...';

  try {
    let avatarUrl = hasExistingAvatar ? existingProfile.avatar : '';
    if (avatarFile) {
      avatarUrl = await uploadToCloudinary(avatarFile);
    }

    const updatedProfile = {
      ...(existingProfile || {}),
      name, country, city, age, phone,
      avatar: avatarUrl,
      uid: user.uid
    };

    await window._saveUserProfile(user.uid, updatedProfile);
    window._setCurrentProfile(updatedProfile);

    // Update UI
    document.getElementById('header-avatar').src = avatarUrl;
    checkChatAccess(updatedProfile);
    document.getElementById('profile-modal').classList.add('hidden');

    showToast('✅ Perfil guardado');
  } catch (err) {
    showError(errEl, '❌ ' + (err.message || 'Error al guardar'));
  } finally {
    btn.disabled = false;
    btn.innerHTML = 'Guardar Perfil';
  }
}

function showError(el, msg) {
  el.textContent = msg;
  el.classList.add('visible');
}

// ── SEND MESSAGE ──
async function sendMessage() {
  const user = window._getCurrentUser ? window._getCurrentUser() : null;
  const profile = window._getCurrentProfile ? window._getCurrentProfile() : null;

  if (!user) return;
  if (!profile || !profile.avatar) {
    showToast('⚠️ Necesitás foto de perfil para chatear.');
    return;
  }

  const input = document.getElementById('msg-input');
  const text = input.value.trim();
  if (!text) return;

  input.value = '';
  input.style.height = 'auto';

  try {
    await window._pushMessage({
      text,
      uid: user.uid,
      name: profile.name || 'Anónimo',
      avatar: profile.avatar,
      country: profile.country || '',
      city: profile.city || '',
      ts: Date.now()
    });
  } catch (err) {
    showToast('❌ Error al enviar: ' + err.message);
  }
}

function handleMsgKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

// ── ADMIN: Set video ──
async function adminSetVideo() {
  if (!window._isAdmin || !window._isAdmin()) return;
  const url = document.getElementById('admin-yt-input').value.trim();
  if (!url) return;
  const id = extractYouTubeId(url);
  if (!id) { showToast('⚠️ URL de YouTube no válida'); return; }
  try {
    await window._adminSetVideoId(id);
    document.getElementById('admin-yt-input').value = '';
    showToast('✅ Video actualizado para todos');
  } catch(e) {
    showToast('❌ Error: ' + e.message);
  }
}

// ── ADMIN: Borrar mensaje ──
async function adminDeleteMsg(msgId) {
  if (!window._isAdmin || !window._isAdmin()) return;
  if (!confirm('¿Borrar este mensaje?')) return;
  try {
    await window._adminDeleteMsg(msgId);
    showToast('🗑 Mensaje borrado');
  } catch(e) {
    showToast('❌ Error: ' + e.message);
  }
}

// ── ADMIN: Banear usuario ──
async function adminBanUser(uid, name) {
  if (!window._isAdmin || !window._isAdmin()) return;
  if (!confirm(`¿Banear a "${name}" y borrar todos sus mensajes?`)) return;
  try {
    await window._adminBanUser(uid);
    showToast(`🚫 ${name} baneado`);
  } catch(e) {
    showToast('❌ Error: ' + e.message);
  }
}

// ── ADMIN: Limpiar chat ──
async function adminClearChat() {
  if (!window._isAdmin || !window._isAdmin()) return;
  if (!confirm('¿Limpiar TODO el chat? Esta acción no se puede deshacer.')) return;
  try {
    await window._adminClearChat();
    showToast('🗑 Chat limpiado');
  } catch(e) {
    showToast('❌ Error: ' + e.message);
  }
}

function extractYouTubeId(url) {
  const patterns = [
    /youtu\.be\/([^?&\s]+)/,
    /v=([^?&\s]+)/,
    /embed\/([^?&\s]+)/,
    /shorts\/([^?&\s]+)/
  ];
  for (const p of patterns) {
    const m = url.match(p);
    if (m) return m[1];
  }
  return null;
}

// ── USER POPUP ──
function showUserPopup(event, msgData) {
  const popup = document.getElementById('user-popup');

  document.getElementById('popup-avatar').src = msgData.avatar || '';
  document.getElementById('popup-name').textContent = msgData.name || 'Anónimo';

  let info = '';
  if (msgData.country || msgData.city) info += `📍 <span>${[msgData.city, msgData.country].filter(Boolean).join(', ')}</span><br>`;

  document.getElementById('popup-info').innerHTML = info || '<span>Sin info adicional</span>';

  // Positioning
  const x = Math.min(event.clientX, window.innerWidth - 240);
  const y = Math.min(event.clientY - 10, window.innerHeight - 180);
  popup.style.left = x + 'px';
  popup.style.top = y + 'px';
  popup.classList.add('visible');

  setTimeout(() => {
    document.addEventListener('click', () => popup.classList.remove('visible'), { once: true });
  }, 100);
}

// Close profile modal clicking outside
document.getElementById('profile-modal').addEventListener('click', function(e) {
  if (e.target === this) this.classList.add('hidden');
});
</script>
