<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Mivo 🔥</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#070709;--s1:#111115;--s2:#18181d;--s3:#222228;
  --border:#2a2a32;--text:#f2f2f5;--muted:#66666e;
  --accent:#ff2d55;--accent2:#ff9500;
  --grad:linear-gradient(135deg,#ff2d55,#ff9500);
  --fh:'Syne',sans-serif;--fb:'DM Sans',sans-serif;
}
html,body{width:100%;height:100%;background:var(--bg);color:var(--text);font-family:var(--fb);overflow:hidden;-webkit-tap-highlight-color:transparent}

/* ── AUTH ── */
#authWrap{position:fixed;inset:0;z-index:1000;background:var(--bg);display:flex;align-items:center;justify-content:center;flex-direction:column;padding:28px}
#authWrap.gone{display:none}
.auth-brand{font-family:var(--fh);font-weight:800;font-size:3rem;letter-spacing:-2px;background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:6px}
.auth-tagline{color:var(--muted);font-size:.9rem;margin-bottom:36px}
.auth-tabs{display:flex;gap:3px;background:var(--s1);border-radius:14px;padding:4px;margin-bottom:24px;width:100%;max-width:360px}
.a-tab{flex:1;padding:10px;border:none;border-radius:10px;background:transparent;color:var(--muted);font-family:var(--fb);font-size:.95rem;font-weight:500;cursor:pointer;transition:all .2s}
.a-tab.on{background:var(--s2);color:var(--text)}
.a-form{width:100%;max-width:360px;display:flex;flex-direction:column;gap:12px}
.a-inp{width:100%;padding:14px 16px;background:var(--s1);border:1.5px solid var(--border);border-radius:13px;color:var(--text);font-family:var(--fb);font-size:1rem;outline:none;transition:border-color .2s}
.a-inp:focus{border-color:var(--accent)}
.a-inp::placeholder{color:var(--muted)}
.btn-main{padding:15px;border:none;border-radius:13px;background:var(--grad);color:#fff;font-family:var(--fh);font-size:1rem;font-weight:700;cursor:pointer;transition:opacity .2s,transform .1s}
.btn-main:active{transform:scale(.98);opacity:.88}
.divider{display:flex;align-items:center;gap:10px;color:var(--muted);font-size:.82rem}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border)}
.btn-google{display:flex;align-items:center;justify-content:center;gap:10px;padding:13px;border:1.5px solid var(--border);border-radius:13px;background:var(--s1);color:var(--text);font-family:var(--fb);font-size:.95rem;font-weight:500;cursor:pointer;transition:background .2s,border-color .2s}
.btn-google:hover{background:var(--s2);border-color:var(--muted)}
.btn-google svg{width:20px;height:20px;flex-shrink:0}
.a-err{color:var(--accent);font-size:.83rem;text-align:center;min-height:18px}

/* ── APP SHELL ── */
#app{display:none;width:100%;height:100%;flex-direction:column}
#app.on{display:flex}

/* ── PAGES ── */
.page{display:none;flex:1;overflow:hidden;flex-direction:column}
.page.on{display:flex}

/* ── FEED PAGE ── */
#feedWrap{flex:1;overflow-y:scroll;overflow-x:hidden;scroll-snap-type:y mandatory;scrollbar-width:none}
#feedWrap::-webkit-scrollbar{display:none}
.pst{width:100%;height:100dvh;scroll-snap-align:start;scroll-snap-stop:always;position:relative;display:flex;align-items:flex-end;overflow:hidden;background:#000}
.pst-media{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
.pst-veil{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.8) 0%,rgba(0,0,0,.06) 55%,transparent 100%)}
.pst-info{position:relative;z-index:2;padding:18px 76px 34px 18px;flex:1}
.pst-user{display:flex;align-items:center;gap:9px;font-family:var(--fh);font-weight:700;font-size:.95rem;margin-bottom:6px;cursor:pointer}
.pst-caption{font-size:.88rem;color:rgba(255,255,255,.82);line-height:1.45}
.pst-acts{position:absolute;right:10px;bottom:74px;z-index:3;display:flex;flex-direction:column;align-items:center;gap:18px}
.act-btn{display:flex;flex-direction:column;align-items:center;gap:4px;background:none;border:none;cursor:pointer;color:#fff;user-select:none}
.act-ico{width:46px;height:46px;border-radius:50%;background:rgba(255,255,255,.14);display:flex;align-items:center;justify-content:center;font-size:1.3rem;backdrop-filter:blur(6px);transition:transform .15s,background .15s}
.act-btn:active .act-ico{transform:scale(1.18)}
.act-btn.fired .act-ico{background:rgba(255,85,0,.38);animation:fpop .35s ease}
@keyframes fpop{0%{transform:scale(1)}45%{transform:scale(1.45)}75%{transform:scale(.88)}100%{transform:scale(1)}}
.act-count{font-size:.75rem;font-weight:600}
/* msg btn on feed */
.act-btn.msg-btn .act-ico{font-size:1.15rem}
.pi{position:absolute;inset:0;z-index:2;display:flex;align-items:center;justify-content:center;pointer-events:none;opacity:0;transition:opacity .25s}
.pi.show{opacity:1}
.pi em{font-style:normal;font-size:4rem;filter:drop-shadow(0 0 18px rgba(0,0,0,.8));animation:piA .5s ease forwards}
@keyframes piA{0%{transform:scale(.4);opacity:1}100%{transform:scale(1.3);opacity:0}}

/* ── AV ── */
.av{width:34px;height:34px;border-radius:50%;flex-shrink:0;background:var(--grad);display:flex;align-items:center;justify-content:center;font-size:.8rem;font-weight:800;color:#fff;overflow:hidden}
.av img,.av-lg img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.av-lg{width:72px;height:72px;border-radius:50%;flex-shrink:0;background:var(--grad);display:flex;align-items:center;justify-content:center;font-size:1.8rem;font-weight:800;color:#fff;overflow:hidden}

/* ── TOP NAV ── */
#topNav{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:14px 16px;background:linear-gradient(to bottom,rgba(7,7,9,.88),transparent);pointer-events:none}
#topNav>*{pointer-events:all}
.nav-logo{font-family:var(--fh);font-weight:800;font-size:1.4rem;letter-spacing:-1px;background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.nav-r{display:flex;gap:8px}
.nav-btn{width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,.1);border:none;color:#fff;font-size:1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(6px);transition:background .2s;position:relative}
.nav-btn:hover{background:rgba(255,255,255,.18)}
.notif-dot{position:absolute;top:3px;right:3px;width:8px;height:8px;border-radius:50%;background:var(--accent);border:2px solid var(--bg);display:none}
.notif-dot.on{display:block}

/* ── BOTTOM NAV ── */
#botNav{position:fixed;bottom:0;left:0;right:0;z-index:100;display:flex;align-items:center;justify-content:space-around;padding:8px 0 22px;background:linear-gradient(to top,rgba(7,7,9,.95) 65%,transparent)}
.bn-btn{display:flex;flex-direction:column;align-items:center;gap:2px;background:none;border:none;color:var(--muted);cursor:pointer;font-size:.58rem;font-weight:600;letter-spacing:.06em;text-transform:uppercase;transition:color .2s;position:relative}
.bn-btn span.icon{font-size:1.35rem}
.bn-btn.on{color:#fff}
.bn-plus{width:50px;height:34px;border-radius:10px;background:var(--grad);display:flex;align-items:center;justify-content:center;font-size:1.25rem;border:none;cursor:pointer;transition:transform .15s,opacity .15s}
.bn-plus:active{transform:scale(.91);opacity:.82}
.bn-badge{position:absolute;top:-2px;right:-2px;min-width:16px;height:16px;border-radius:8px;background:var(--accent);color:#fff;font-size:.6rem;font-weight:700;display:none;align-items:center;justify-content:center;padding:0 3px}
.bn-badge.on{display:flex}

/* ── MODALS (upload) ── */
.mbd{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.72);backdrop-filter:blur(5px);display:none;align-items:flex-end;justify-content:center}
.mbd.open{display:flex}
.msheet{width:100%;max-width:520px;background:var(--s1);border-radius:22px 22px 0 0;padding:18px 18px 44px;animation:sUp .28s ease}
@keyframes sUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.mhandle{width:38px;height:4px;border-radius:2px;background:var(--border);margin:0 auto 18px}
.mtitle{font-family:var(--fh);font-weight:700;font-size:1.15rem;margin-bottom:18px}
.utype{display:flex;gap:10px;margin-bottom:18px}
.utype-btn{flex:1;padding:16px;border-radius:13px;border:1.5px solid var(--border);background:none;color:var(--text);font-family:var(--fb);font-size:.88rem;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:6px;transition:all .2s}
.utype-btn em{font-style:normal;font-size:1.8rem}
.utype-btn.on{border-color:var(--accent);background:rgba(255,45,85,.07)}
.udrop{border:1.5px dashed var(--border);border-radius:13px;padding:28px;text-align:center;cursor:pointer;transition:border-color .2s;margin-bottom:12px}
.udrop:hover{border-color:var(--accent)}
.udrop em{font-style:normal;font-size:2.2rem}
.udrop p{color:var(--muted);font-size:.86rem;margin-top:6px}
.ucap{width:100%;padding:12px 14px;background:var(--s2);border:1.5px solid var(--border);border-radius:12px;color:var(--text);resize:none;font-family:var(--fb);font-size:.93rem;outline:none;margin-bottom:12px;transition:border-color .2s}
.ucap:focus{border-color:var(--accent)}
.uprog{width:100%;height:3px;border-radius:2px;background:var(--border);overflow:hidden;display:none;margin-bottom:12px}
.uprog-bar{height:100%;width:0%;background:var(--grad);transition:width .3s}

/* ── FULL PANELS (slide-in) ── */
.panel{position:fixed;inset:0;z-index:150;background:var(--bg);display:none;flex-direction:column;transform:translateX(100%);transition:transform .3s cubic-bezier(.4,0,.2,1)}
.panel.open{display:flex;transform:translateX(0)}
.ph{padding:52px 16px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px}
.ph-back{background:none;border:none;color:var(--muted);font-size:1.3rem;cursor:pointer;padding:4px 8px 4px 0}
.ph-title{font-family:var(--fh);font-weight:700;font-size:1.1rem;flex:1}
.ph-action{background:none;border:none;color:var(--accent);font-family:var(--fb);font-size:.9rem;font-weight:500;cursor:pointer}

/* ── PROFILE PANEL ── */
.prof-hero{padding:24px 16px 20px;border-bottom:1px solid var(--border)}
.prof-row{display:flex;align-items:center;gap:16px;margin-bottom:14px}
.prof-stats{display:flex;gap:28px;margin-top:4px}
.prof-stat{display:flex;flex-direction:column;align-items:center;gap:2px}
.prof-stat strong{font-family:var(--fh);font-weight:700;font-size:1.1rem}
.prof-stat span{color:var(--muted);font-size:.72rem;text-transform:uppercase;letter-spacing:.05em}
.prof-nick{font-family:var(--fh);font-weight:700;font-size:1.1rem}
.prof-email{color:var(--muted);font-size:.8rem;margin-top:1px}
.prof-btns{display:flex;gap:8px;margin-top:14px}
.btn-sm{padding:9px 18px;border-radius:10px;border:1.5px solid var(--border);background:none;color:var(--text);font-family:var(--fb);cursor:pointer;font-size:.85rem;transition:background .2s;font-weight:500}
.btn-sm:hover{background:var(--s2)}
.btn-sm.accent{background:var(--grad);border-color:transparent;color:#fff}
.prof-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:2px;overflow-y:auto;flex:1}
.prof-thumb{aspect-ratio:1;background:var(--s2);overflow:hidden;cursor:pointer;position:relative}
.prof-thumb img,.prof-thumb video{width:100%;height:100%;object-fit:cover}
.prof-thumb .vid-badge{position:absolute;top:5px;right:5px;background:rgba(0,0,0,.6);border-radius:4px;padding:2px 5px;font-size:.65rem;color:#fff}
.prof-empty{grid-column:1/-1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:48px 0;color:var(--muted);gap:10px}
.prof-empty em{font-style:normal;font-size:2.5rem}

/* ── CHAT LIST PANEL ── */
.chat-list{overflow-y:auto;flex:1}
.chat-item{display:flex;align-items:center;gap:12px;padding:14px 16px;cursor:pointer;border-bottom:1px solid var(--border);transition:background .15s;position:relative}
.chat-item:hover{background:var(--s1)}
.chat-item-info{flex:1;min-width:0}
.chat-item-nick{font-family:var(--fh);font-weight:600;font-size:.95rem;display:flex;align-items:center;gap:8px}
.chat-item-preview{color:var(--muted);font-size:.83rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px}
.chat-item-time{color:var(--muted);font-size:.72rem;white-space:nowrap;margin-left:8px}
.unread-badge{min-width:18px;height:18px;border-radius:9px;background:var(--accent);color:#fff;font-size:.65rem;font-weight:700;display:flex;align-items:center;justify-content:center;padding:0 4px}
.chat-list-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;gap:12px;color:var(--muted)}
.chat-list-empty em{font-style:normal;font-size:2.8rem}
.chat-list-empty p{font-size:.88rem}

/* ── PRIVATE CHAT PANEL ── */
#privChat{z-index:160}
.chat-msgs{flex:1;overflow-y:auto;padding:12px 12px 8px;display:flex;flex-direction:column;gap:6px;scroll-behavior:smooth}
.chat-msgs::-webkit-scrollbar{display:none}
.msg-row{display:flex;align-items:flex-end;gap:6px}
.msg-row.mine{flex-direction:row-reverse}
.bubble{max-width:72%;padding:10px 14px;border-radius:18px;font-size:.9rem;line-height:1.45;word-break:break-word;position:relative}
.msg-row.theirs .bubble{background:var(--s2);border-bottom-left-radius:4px;color:var(--text)}
.msg-row.mine .bubble{background:var(--grad);border-bottom-right-radius:4px;color:#fff}
.bubble-time{font-size:.65rem;opacity:.6;margin-top:3px;text-align:right}
.chat-input-row{display:flex;align-items:center;gap:8px;padding:10px 12px 28px;border-top:1px solid var(--border);background:var(--s1)}
.chat-inp{flex:1;padding:11px 14px;background:var(--s2);border:none;border-radius:22px;color:var(--text);font-family:var(--fb);font-size:.95rem;outline:none;resize:none;max-height:100px;overflow-y:auto}
.chat-inp::placeholder{color:var(--muted)}
.chat-send{width:40px;height:40px;border-radius:50%;background:var(--grad);border:none;color:#fff;font-size:1.1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:opacity .2s}
.chat-send:active{opacity:.75}
/* typing indicator */
.typing-ind{display:none;align-items:center;gap:4px;padding:6px 14px;color:var(--muted);font-size:.8rem}
.typing-ind.on{display:flex}
.typing-dot{width:6px;height:6px;border-radius:50%;background:var(--muted);animation:tdot 1.2s ease infinite}
.typing-dot:nth-child(2){animation-delay:.2s}
.typing-dot:nth-child(3){animation-delay:.4s}
@keyframes tdot{0%,80%,100%{transform:scale(.8);opacity:.5}40%{transform:scale(1.2);opacity:1}}
/* date separator */
.date-sep{text-align:center;color:var(--muted);font-size:.73rem;padding:6px 0;letter-spacing:.04em}

/* ── USER SEARCH (for starting chat) ── */
.user-search-wrap{padding:12px 16px;border-bottom:1px solid var(--border)}
.user-search{width:100%;padding:10px 14px;background:var(--s2);border:none;border-radius:22px;color:var(--text);font-family:var(--fb);font-size:.9rem;outline:none}
.user-search::placeholder{color:var(--muted)}
.user-results{overflow-y:auto;flex:1}
.user-row{display:flex;align-items:center;gap:12px;padding:12px 16px;cursor:pointer;border-bottom:1px solid var(--border);transition:background .15s}
.user-row:hover{background:var(--s1)}
.user-row-nick{font-family:var(--fh);font-weight:600;font-size:.9rem}
.user-row-email{color:var(--muted);font-size:.78rem;margin-top:1px}

/* ── TOAST ── */
#toasts{position:fixed;bottom:86px;left:50%;transform:translateX(-50%);z-index:999;display:flex;flex-direction:column;gap:6px;align-items:center;pointer-events:none}
.tst{padding:9px 20px;border-radius:50px;background:rgba(28,28,35,.95);color:#fff;font-size:.86rem;font-weight:500;backdrop-filter:blur(8px);white-space:nowrap;animation:tIn .25s ease,tOut .25s ease 2.5s forwards}
@keyframes tIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes tOut{to{opacity:0}}
.spin{width:36px;height:36px;border-radius:50%;border:3px solid var(--border);border-top-color:var(--accent);animation:sp .75s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
.feed-load{width:100%;height:100dvh;scroll-snap-align:start;background:var(--s1);display:flex;align-items:center;justify-content:center}
.empty-feed{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100dvh;gap:14px;color:var(--muted)}
.empty-feed em{font-style:normal;font-size:3rem}
</style>
</head>
<body>

<!-- ═══ AUTH ═══ -->
<div id="authWrap">
  <div class="auth-brand">Mivo</div>
  <p class="auth-tagline">Tu feed. Tu vibra. 🔥</p>
  <div class="auth-tabs">
    <button class="a-tab on" id="tabL" onclick="swTab('login')">Entrar</button>
    <button class="a-tab" id="tabR" onclick="swTab('reg')">Registrarse</button>
  </div>
  <div class="a-form">
    <input class="a-inp" id="aNick" type="text" placeholder="Nombre de usuario" style="display:none">
    <input class="a-inp" id="aEmail" type="email" placeholder="Email" autocomplete="email">
    <input class="a-inp" id="aPass" type="password" placeholder="Contraseña" autocomplete="current-password">
    <button class="btn-main" onclick="doAuth()">Continuar →</button>
    <div class="divider">o</div>
    <button class="btn-google" onclick="doGoogle()">
      <svg viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.1 0 5.8 1.1 7.9 2.9l5.9-5.9C34.3 3.3 29.5 1 24 1 14.8 1 7 6.7 3.7 14.6l6.9 5.3C12.2 13.4 17.6 9.5 24 9.5z"/><path fill="#4285F4" d="M46.5 24.5c0-1.6-.1-3.1-.4-4.5H24v8.5h12.7c-.6 3-2.3 5.5-4.8 7.2l7.4 5.7c4.3-4 6.8-9.9 7.2-16.9z"/><path fill="#FBBC05" d="M10.6 28.6A14.3 14.3 0 0 1 9.5 24c0-1.6.3-3.2.7-4.6l-6.9-5.3A23 23 0 0 0 1 24c0 3.8.9 7.4 2.5 10.6l7.1-6z"/><path fill="#34A853" d="M24 47c5.5 0 10.1-1.8 13.5-4.9l-7.4-5.7c-1.9 1.3-4.2 2-6.1 2-6.4 0-11.8-4-13.5-9.4l-7.1 6C7 40.3 14.8 47 24 47z"/></svg>
      Continuar con Google
    </button>
    <p class="a-err" id="aErr"></p>
  </div>
</div>

<!-- ═══ APP ═══ -->
<div id="app">

  <!-- Top nav -->
  <div id="topNav">
    <div class="nav-logo">Mivo</div>
    <div class="nav-r">
      <button class="nav-btn" id="navChatBtn" onclick="showPage('chatPage')">
        💬<span class="notif-dot" id="chatDot"></span>
      </button>
      <button class="nav-btn" onclick="showPage('profPage')">👤</button>
    </div>
  </div>

  <!-- ── FEED PAGE ── -->
  <div class="page on" id="feedPage" style="flex:1;overflow:hidden">
    <div id="feedWrap">
      <div class="feed-load"><div class="spin"></div></div>
    </div>
  </div>

  <!-- ── PROFILE PAGE (own) ── -->
  <div class="page" id="profPage" style="overflow-y:auto">
    <div style="padding-top:58px"></div>
    <div class="prof-hero">
      <div class="prof-row">
        <div class="av-lg" id="myAvLg">?</div>
        <div style="flex:1">
          <div class="prof-nick" id="myNick">—</div>
          <div class="prof-email" id="myEmail" style="color:var(--muted);font-size:.8rem;margin-top:2px">—</div>
          <div class="prof-stats" id="myStats">
            <div class="prof-stat"><strong id="myPostCount">0</strong><span>Posts</span></div>
            <div class="prof-stat"><strong id="myFireCount">0</strong><span>🔥 Total</span></div>
          </div>
        </div>
      </div>
      <div class="prof-btns">
        <button class="btn-sm" onclick="openUpload()" style="flex:1">+ Publicar</button>
        <button class="btn-sm" onclick="doLogout()">Salir</button>
      </div>
    </div>
    <div class="prof-grid" id="myGrid">
      <div class="prof-empty"><em>📸</em><p>Aún no publicaste nada</p></div>
    </div>
  </div>

  <!-- ── CHAT LIST PAGE ── -->
  <div class="page" id="chatPage" style="overflow:hidden;flex-direction:column">
    <div style="padding-top:58px"></div>
    <div style="padding:14px 16px 10px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border)">
      <span style="font-family:var(--fh);font-weight:700;font-size:1.1rem">Mensajes</span>

<!-- ═══ FIREBASE ═══ -->
<script type="module">
import { initializeApp }       from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword,
         signOut, onAuthStateChanged, GoogleAuthProvider, signInWithPopup, updateProfile }
                               from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getDatabase, ref, push, set, get, update, onValue, runTransaction,
         serverTimestamp, query, orderByChild, equalTo, off, onChildAdded, limitToLast }
                               from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const fbApp  = initializeApp({
  apiKey:            "AIzaSyA9oat9dd0S9vlxkg1osH4dW3XhRDGiOiw",
  authDomain:        "charlasrf4.firebaseapp.com",
  databaseURL:       "https://charlasrf4-default-rtdb.firebaseio.com",
  projectId:         "charlasrf4",
  storageBucket:     "charlasrf4.firebasestorage.app",
  messagingSenderId: "345019626508",
  appId:             "1:345019626508:web:d099ca499acb29eac12a29"
});
const auth      = getAuth(fbApp);
const db        = getDatabase(fbApp);
const gProvider = new GoogleAuthProvider();

const CLD_CLOUD  = 'da0n5tg3g';
const CLD_PRESET = 'milatido_video';
const IMGBB_KEY  = '75c60bcb472ab597b1dee463438b18ba';

// ── State ──
let CU          = null;  // { uid, nick, email, photo }
let curTab      = 'login';
let uType       = 'photo';
let selFile     = null;
let curPage     = 'feedPage';
let otherUser   = null;  // user being viewed or chatting with
let privChatId  = null;  // current open chat id
let privMsgRef  = null;  // current msgs listener ref
let typingTimer = null;
let allUsers    = {};    // uid→{nick,email,photo}
let unsubConvs  = null;

const $    = id => document.getElementById(id);
const toast = msg => {
  const t = document.createElement('div');
  t.className='tst'; t.textContent=msg;
  $('toasts').appendChild(t);
  setTimeout(()=>t.remove(), 2800);
};
const setBar = pct => $('upBar').style.width = pct+'%';
const chatId = (a,b) => [a,b].sort().join('_');
const fmtTime = ts => {
  const d = new Date(ts);
  return d.toLocaleTimeString('es',{hour:'2-digit',minute:'2-digit'});
};
const fmtDate = ts => {
  const d = new Date(ts), now = new Date();
  if (d.toDateString()===now.toDateString()) return 'Hoy';
  const y = new Date(now); y.setDate(y.getDate()-1);
  if (d.toDateString()===y.toDateString()) return 'Ayer';
  return d.toLocaleDateString('es',{day:'numeric',month:'short'});
};
const avHTML = (photo,nick,cls='av') =>
  photo ? `<div class="${cls}"><img src="${photo}" alt=""></div>`
        : `<div class="${cls}">${(nick||'?')[0].toUpperCase()}</div>`;

// ── Page switcher ──
window.showPage = id => {
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('on'));
  $(id).classList.add('on');
  curPage = id;
  // update bottom nav
  ['bnFeed','bnChat','bnProf'].forEach(b=>$(b).classList.remove('on'));
  if(id==='feedPage') $('bnFeed').classList.add('on');
  if(id==='chatPage'){ $('bnChat').classList.add('on'); loadChatList(); }
  if(id==='profPage'){ $('bnProf').classList.add('on'); loadMyProfile(); }
  // hide top nav on chat page
  $('topNav').style.display = id==='chatPage' ? 'none' : 'flex';
};

// ── Auth tab ──
window.swTab = tab => {
  curTab=tab;
  $('tabL').classList.toggle('on',tab==='login');
  $('tabR').classList.toggle('on',tab==='reg');
  $('aNick').style.display = tab==='reg'?'block':'none';
  $('aErr').textContent='';
};

// ── Email auth ──
window.doAuth = async () => {
  const email=$('aEmail').value.trim(), pass=$('aPass').value, nick=$('aNick').value.trim();
  $('aErr').textContent='';
  if(!email||!pass){$('aErr').textContent='Completá todos los campos.';return;}
  try {
    if(curTab==='reg'){
      if(!nick){$('aErr').textContent='Ingresá un nombre de usuario.';return;}
      const c = await createUserWithEmailAndPassword(auth,email,pass);
      await updateProfile(c.user,{displayName:nick});
      await set(ref(db,`mivo_users/${c.user.uid}`),{nick,email,photo:'',createdAt:Date.now()});
    } else {
      await signInWithEmailAndPassword(auth,email,pass);
    }
  } catch(e) {
    const m={'auth/email-already-in-use':'El email ya está registrado.','auth/invalid-email':'Email inválido.',
             'auth/weak-password':'Contraseña mínimo 6 caracteres.','auth/user-not-found':'Usuario no encontrado.',
             'auth/wrong-password':'Contraseña incorrecta.','auth/invalid-credential':'Email o contraseña incorrectos.'};
    $('aErr').textContent = m[e.code]||e.message;
  }
};

// ── Google auth ──
window.doGoogle = async () => {
  $('aErr').textContent='';
  try {
    const r = await signInWithPopup(auth,gProvider);
    const u = r.user;
    const s = await get(ref(db,`mivo_users/${u.uid}`));
    if(!s.exists()) await set(ref(db,`mivo_users/${u.uid}`),{nick:u.displayName||u.email.split('@')[0],email:u.email,photo:u.photoURL||'',createdAt:Date.now()});
  } catch(e){ if(e.code!=='auth/popup-closed-by-user') $('aErr').textContent=e.message; }
};

window.doLogout = async () => { await signOut(auth); };

// ── Auth state ──
onAuthStateChanged(auth, async user => {
  if(user){
    const s = await get(ref(db,`mivo_users/${user.uid}`));
    const d = s.val()||{};
    CU = { uid:user.uid, nick:d.nick||user.displayName||user.email.split('@')[0], email:user.email, photo:d.photo||user.photoURL||'' };
    $('authWrap').classList.add('gone');
    $('app').classList.add('on');
    loadAllUsers();
    loadFeed();
    listenUnreadCount();
  } else {
    CU=null;
    $('authWrap').classList.remove('gone');
    $('app').classList.remove('on');
  }
});

// ── Load all users (for search & display) ──
function loadAllUsers(){
  onValue(ref(db,'mivo_users'), snap=>{
    allUsers={};
    snap.forEach(c=>{ allUsers[c.key]=c.val(); });
  });
}

// ── FEED ──
function loadFeed(){
  onValue(ref(db,'mivo_posts'), snap=>{
    const posts=[];
    snap.forEach(c=>posts.push({id:c.key,...c.val()}));
    posts.reverse();
    renderFeed(posts);
  });
}

function renderFeed(posts){
  const feed=$('feedWrap');
  feed.querySelectorAll('video').forEach(v=>v.pause());
  feed.innerHTML='';
  if(!posts.length){ feed.innerHTML=`<div class="empty-feed"><em>🎬</em><p>¡Sé el primero en publicar!</p></div>`; return; }
  posts.forEach(p=>{
    const el=document.createElement('div');
    el.className='pst'; el.dataset.id=p.id;
    const fires=p.fires||0, fired=p.firedBy&&CU&&p.firedBy[CU.uid];
    const av=avHTML(p.userPhoto,p.nick);
    if(p.type==='video'){
      el.innerHTML=`<video class="pst-media" src="${p.url}" loop playsinline muted></video><div class="pi" id="pi_${p.id}"><em>▶️</em></div>`;
      el.addEventListener('click',e=>{
        if(e.target.closest('.pst-acts')||e.target.closest('.pst-user')) return;
        const v=el.querySelector('video'), pi=$(`pi_${p.id}`);
        if(v.paused) v.play(); else v.pause();
        if(pi){pi.classList.add('show');setTimeout(()=>pi.classList.remove('show'),550);}
      });
    } else {
      el.innerHTML=`<img class="pst-media" src="${p.url}" alt="" loading="lazy">`;
    }
    el.innerHTML+=`
      <div class="pst-veil"></div>
      <div class="pst-info">
        <div class="pst-user" onclick="openOtherProfile('${p.uid}')">${av}@${p.nick||'usuario'}</div>
        ${p.caption?`<div class="pst-caption">${p.caption}</div>`:''}
      </div>
      <div class="pst-acts">
        <button class="act-btn${fired?' fired':''}" onclick="toggleFire('${p.id}',this)">
          <div class="act-ico">🔥</div>
          <span class="act-count" id="fc_${p.id}">${fires}</span>
        </button>
        ${p.uid!==CU?.uid?`<button class="act-btn msg-btn" onclick="openOtherProfile('${p.uid}')">
          <div class="act-ico">💬</div><span class="act-count">Msg</span>
        </button>`:''}
      </div>`;
    feed.appendChild(el);
  });
  setupIO();
}

function setupIO(){
  const io=new IntersectionObserver(entries=>{
    entries.forEach(e=>{
      const v=e.target.querySelector('video');
      if(!v) return;
      if(e.isIntersecting) v.play().catch(()=>{}); else v.pause();
    });
  },{threshold:0.65});
  document.querySelectorAll('.pst').forEach(p=>io.observe(p));
}

// ── Fire reaction ──
window.toggleFire = async (pid,btn)=>{
  if(!CU){toast('Iniciá sesión primero');return;}
  const uid=CU.uid;
  await runTransaction(ref(db,`mivo_posts/${pid}`),post=>{
    if(!post) return post;
    if(!post.firedBy) post.firedBy={};
    if(post.firedBy[uid]){ delete post.firedBy[uid]; post.fires=Math.max(0,(post.fires||1)-1); btn.classList.remove('fired'); }
    else { post.firedBy[uid]=true; post.fires=(post.fires||0)+1; btn.classList.add('fired'); }
    return post;
  });
};

// ── MY PROFILE ──
function loadMyProfile(){
  if(!CU) return;
  // avatar
  const avEl=$('myAvLg');
  if(CU.photo) avEl.innerHTML=`<img src="${CU.photo}" alt="">`;
  else avEl.textContent=CU.nick[0].toUpperCase();
  $('myNick').textContent='@'+CU.nick;
  $('myEmail').textContent=CU.email;
  // posts
  onValue(ref(db,'mivo_posts'), snap=>{
    const posts=[];
    snap.forEach(c=>{ const v=c.val(); if(v.uid===CU.uid) posts.push({id:c.key,...v}); });
    posts.reverse();
    $('myPostCount').textContent=posts.length;
    let totalFires=0; posts.forEach(p=>totalFires+=(p.fires||0));
    $('myFireCount').textContent=totalFires;
    renderGrid($('myGrid'), posts, true);
  },{onlyOnce:true});
}

// ── OTHER USER PROFILE ──
window.openOtherProfile = async uid=>{
  if(!uid||uid===CU?.uid){ showPage('profPage'); return; }
  const u=allUsers[uid];
  if(!u) return;
  otherUser={uid,...u};
  $('otherProfTitle').textContent='@'+u.nick;
  $('otherNickEl').textContent='@'+u.nick;
  const avEl=$('otherAvLg');
  if(u.photo) avEl.innerHTML=`<img src="${u.photo}" alt="">`;
  else avEl.textContent=u.nick[0].toUpperCase();
  // load posts
  const snap=await get(ref(db,'mivo_posts'));
  const posts=[];
  snap.forEach(c=>{ const v=c.val(); if(v.uid===uid) posts.push({id:c.key,...v}); });
  posts.reverse();
  $('otherPostCount').textContent=posts.length;
  let tf=0; posts.forEach(p=>tf+=(p.fires||0));
  $('otherFireCount').textContent=tf;
  renderGrid($('otherGrid'),posts,false);
  openPanel('otherProfPanel');
};

function renderGrid(container, posts, isMine){
  container.innerHTML='';
  if(!posts.length){
    container.innerHTML=`<div class="prof-empty"><em>📸</em><p>${isMine?'Aún no publicaste nada':'Sin publicaciones aún'}</p></div>`;
    return;
  }
  posts.forEach(p=>{
    const el=document.createElement('div');
    el.className='prof-thumb';
    if(p.type==='video') el.innerHTML=`<video src="${p.url}" muted></video><span class="vid-badge">▶ Video</span>`;
    else el.innerHTML=`<img src="${p.url}" alt="" loading="lazy">`;
    container.appendChild(el);
  });
}

// ── START CHAT FROM OTHER PROFILE ──
window.startChatWith = ()=>{
  if(!otherUser) return;
  closePanel('otherProfPanel');
  openPrivateChat(otherUser);
};

// ── CHAT LIST ──
function loadChatList(){
  if(!CU) return;
  if(unsubConvs) unsubConvs();
  const convRef=ref(db,`mivo_convs/${CU.uid}`);
  const unsub=onValue(convRef, snap=>{
    const convs=[];
    snap.forEach(c=>convs.push({id:c.key,...c.val()}));
    convs.sort((a,b)=>(b.lastTs||0)-(a.lastTs||0));
    renderChatList(convs);
  });
  unsubConvs=()=>off(convRef);
}

function renderChatList(convs){
  const list=$('chatList');
  list.innerHTML='';
  if(!convs.length){
    list.innerHTML=`<div class="chat-list-empty"><em>💬</em><p>No tenés conversaciones aún</p></div>`;
    return;
  }
  convs.forEach(c=>{
    const u=allUsers[c.withUid]||{nick:c.withNick||'?',photo:''};
    const unread=c.unread||0;
    const el=document.createElement('div');
    el.className='chat-item';
    el.innerHTML=`
      ${avHTML(u.photo||c.withPhoto,u.nick||c.withNick)}
      <div class="chat-item-info">
        <div class="chat-item-nick">
          @${u.nick||c.withNick||'?'}
          <span class="chat-item-time">${c.lastTs?fmtTime(c.lastTs):''}</span>
        </div>
        <div class="chat-item-preview">${c.lastMsg||'Iniciar conversación'}</div>
      </div>
      ${unread>0?`<span class="unread-badge">${unread}</span>`:''}`;
    el.onclick=()=>openPrivateChat({uid:c.withUid,nick:u.nick||c.withNick,photo:u.photo||c.withPhoto||''});
    list.appendChild(el);
  });
}

// ── OPEN PRIVATE CHAT ──
function openPrivateChat(user){
  otherUser=user;
  const cid=chatId(CU.uid,user.uid);
  privChatId=cid;
  // update header
  const avEl=$('pcAv');
  if(user.photo) avEl.innerHTML=`<img src="${user.photo}" alt="">`;
  else avEl.textContent=(user.nick||'?')[0].toUpperCase();
  $('pcNick').textContent='@'+(user.nick||'?');
  $('chatMsgs').innerHTML='';
  openPanel('privChat');
  // mark as read
  update(ref(db,`mivo_convs/${CU.uid}/${user.uid}`),{unread:0}).catch(()=>{});
  // listen messages
  if(privMsgRef) off(privMsgRef);
  privMsgRef=query(ref(db,`mivo_msgs/${cid}`),orderByChild('ts'),limitToLast(100));
  onValue(privMsgRef, snap=>{
    const msgs=[];
    snap.forEach(c=>msgs.push({id:c.key,...c.val()}));
    renderMsgs(msgs);
  });
  // listen typing
  onValue(ref(db,`mivo_typing/${cid}/${user.uid}`), snap=>{
    $('typingInd').classList.toggle('on', !!snap.val());
  });
}

window.closePrivChat = ()=>{
  if(privMsgRef){ off(privMsgRef); privMsgRef=null; }
  // clear typing
  if(privChatId&&CU) set(ref(db,`mivo_typing/${privChatId}/${CU.uid}`),null).catch(()=>{});
  privChatId=null;
  closePanel('privChat');
};

function renderMsgs(msgs){
  const container=$('chatMsgs');
  container.innerHTML='';
  let lastDate='';
  msgs.forEach(m=>{
    const ts=m.ts||0;
    const dateStr=fmtDate(ts);
    if(dateStr!==lastDate){
      const sep=document.createElement('div');
      sep.className='date-sep'; sep.textContent=dateStr;
      container.appendChild(sep);
      lastDate=dateStr;
    }
    const mine=m.uid===CU.uid;
    const row=document.createElement('div');
    row.className=`msg-row ${mine?'mine':'theirs'}`;
    if(!mine){ const av=document.createElement('div'); av.className='av'; av.textContent=(otherUser?.nick||'?')[0].toUpperCase(); if(otherUser?.photo) av.innerHTML=`<img src="${otherUser.photo}" alt="">`; row.appendChild(av); }
    const bub=document.createElement('div');
    bub.className='bubble';
    bub.innerHTML=`${escHtml(m.text)}<div class="bubble-time">${fmtTime(ts)}</div>`;
    row.appendChild(bub);
    container.appendChild(row);
  });
  container.scrollTop=container.scrollHeight;
}

function escHtml(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>'); }

// ── Send message ──
window.sendMsg = async ()=>{
  if(!CU||!privChatId||!otherUser) return;
  const inp=$('chatInp');
  const text=inp.value.trim(); if(!text) return;
  inp.value=''; autoResize(inp);
  // clear typing
  set(ref(db,`mivo_typing/${privChatId}/${CU.uid}`),null).catch(()=>{});
  clearTimeout(typingTimer);
  const ts=Date.now();
  const msgData={uid:CU.uid,text,ts};
  await push(ref(db,`mivo_msgs/${privChatId}`),msgData);
  // update both conversation records
  const preview=text.length>40?text.slice(0,40)+'…':text;
  const myConv={withUid:otherUser.uid,withNick:otherUser.nick,withPhoto:otherUser.photo||'',lastMsg:preview,lastTs:ts,unread:0};
  const theirConv={withUid:CU.uid,withNick:CU.nick,withPhoto:CU.photo||'',lastMsg:preview,lastTs:ts};
  await update(ref(db,`mivo_convs/${CU.uid}/${otherUser.uid}`),myConv);
  // increment unread for other
  const theirRef=ref(db,`mivo_convs/${otherUser.uid}/${CU.uid}`);
  await runTransaction(theirRef, cur=>{
    const base=cur||{};
    return {...base,...theirConv, unread:(base.unread||0)+1};
  });
};

// ── Typing indicator ──
window.handleTyping = ()=>{
  if(!CU||!privChatId) return;
  set(ref(db,`mivo_typing/${privChatId}/${CU.uid}`),true).catch(()=>{});
  clearTimeout(typingTimer);
  typingTimer=setTimeout(()=>{ set(ref(db,`mivo_typing/${privChatId}/${CU.uid}`),null).catch(()=>{}); },2000);
};

// ── Unread count listener ──
function listenUnreadCount(){
  onValue(ref(db,`mivo_convs/${CU.uid}`), snap=>{
    let total=0;
    snap.forEach(c=>{ total+=(c.val().unread||0); });
    const badge=$('chatBadge'), dot=$('chatDot');
    if(total>0){ badge.textContent=total>99?'99+':total; badge.classList.add('on'); dot.classList.add('on'); }
    else { badge.classList.remove('on'); dot.classList.remove('on'); }
  });
}

// ── New chat / user search ──
window.openNewChat = ()=>{ $('userSearchInp').value=''; $('userResults').innerHTML=`<div style="padding:24px;color:var(--muted);font-size:.88rem;text-align:center">Escribí un nombre para buscar</div>`; openPanel('newChatPanel'); };
window.searchUsers = q=>{
  const res=$('userResults'); res.innerHTML='';
  q=q.toLowerCase().trim();
  if(!q){ res.innerHTML=`<div style="padding:24px;color:var(--muted);font-size:.88rem;text-align:center">Escribí un nombre para buscar</div>`; return; }
  const found=Object.entries(allUsers).filter(([uid,u])=>uid!==CU.uid&&(u.nick||'').toLowerCase().includes(q));
  if(!found.length){ res.innerHTML=`<div style="padding:24px;color:var(--muted);font-size:.88rem;text-align:center">No se encontraron usuarios</div>`; return; }
  found.forEach(([uid,u])=>{
    const el=document.createElement('div'); el.className='user-row';
    el.innerHTML=`${avHTML(u.photo,u.nick)}<div><div class="user-row-nick">@${u.nick}</div><div class="user-row-email">${u.email||''}</div></div>`;
    el.onclick=()=>{ closePanel('newChatPanel'); openPrivateChat({uid,...u}); };
    res.appendChild(el);
  });
};

// ── UPLOAD ──
window.openUpload = ()=>{ if(!CU){toast('Iniciá sesión primero');return;} $('upModal').classList.add('open'); };
window.setUType = type=>{
  uType=type;
  $('utPhoto').classList.toggle('on',type==='photo');
  $('utVideo').classList.toggle('on',type==='video');
  $('fInput').accept=type==='video'?'video/*':'image/*';
  $('dropHint').textContent=type==='video'?'Toca para elegir un video (MP4/WebM, max 100MB)':'Toca para elegir una imagen (JPG/PNG, max 32MB)';
  selFile=null;
};
window.onFile = inp=>{ selFile=inp.files[0]||null; if(selFile) $('dropHint').textContent='✅ '+selFile.name; };
window.submitPost = async ()=>{
  if(!CU){toast('No estás autenticado');return;}
  if(!selFile){toast('Seleccioná un archivo');return;}
  const btn=$('upBtn'); btn.disabled=true; btn.textContent='Subiendo...';
  $('upProg').style.display='block'; setBar(10);
  const caption=$('capInput').value.trim();
  try {
    const url=uType==='photo'?await uploadImgBB(selFile):await uploadCloudinary(selFile);
    setBar(90);
    await push(ref(db,'mivo_posts'),{url,type:uType,caption,nick:CU.nick,uid:CU.uid,userPhoto:CU.photo||'',fires:0,firedBy:{},createdAt:serverTimestamp()});
    setBar(100); toast('¡Publicado! 🔥'); closeModal('upModal'); resetUpload();
  } catch(e){ toast('Error: '+e.message); console.error(e); }
  finally{ btn.disabled=false; btn.textContent='Publicar 🔥'; $('upProg').style.display='none'; }
};

async function uploadImgBB(file){
  const fd=new FormData(); fd.append('image',file);
  const r=await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_KEY}`,{method:'POST',body:fd});
  const j=await r.json(); if(!j.success) throw new Error(j.error?.message||'ImgBB error');
  return j.data.url;
}
async function uploadCloudinary(file){
  const fd=new FormData(); fd.append('file',file); fd.append('upload_preset',CLD_PRESET);
  const r=await fetch(`https://api.cloudinary.com/v1_1/${CLD_CLOUD}/video/upload`,{method:'POST',body:fd});
  const j=await r.json(); if(j.error) throw new Error(j.error.message);
  return j.secure_url;
}
function resetUpload(){ selFile=null; $('capInput').value=''; $('fInput').value=''; $('dropHint').textContent='Toca para elegir una imagen (JPG/PNG, max 32MB)'; setUType('photo'); }

// ── UI helpers ──
window.closeModal = id=>{ $(id).classList.remove('open'); resetUpload(); };
window.bdClose    = (e,id)=>{ if(e.target.id===id) closeModal(id); };
window.openPanel  = id=>{ const p=$(id); p.style.display='flex'; requestAnimationFrame(()=>p.classList.add('open')); };
window.closePanel = id=>{ const p=$(id); p.classList.remove('open'); setTimeout(()=>{ if(!p.classList.contains('open')) p.style.display='none'; },320); };
window.autoResize = el=>{ el.style.height='auto'; el.style.height=Math.min(el.scrollHeight,100)+'px'; };
</script>
