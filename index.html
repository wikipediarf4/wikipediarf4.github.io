<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>VibeChat</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #13131a;
    --surface2: #1c1c28;
    --surface3: #252535;
    --border: rgba(255,255,255,0.07);
    --accent: #7c6aff;
    --accent2: #ff6ab0;
    --accent3: #6affd4;
    --text: #e8e8f0;
    --text-muted: #6b6b80;
    --text-dim: #9999b0;
    --glow: rgba(124,106,255,0.25);
    --glow2: rgba(255,106,176,0.15);
    --radius: 16px;
    --radius-sm: 10px;
    --font-head: 'Syne', sans-serif;
    --font-body: 'DM Sans', sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-body);
    font-size: 15px;
    overflow: hidden;
  }

  /* SCROLLBAR */
  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--surface3); border-radius: 99px; }

  /* LAYOUT */
  #app { height: 100vh; display: flex; flex-direction: column; }

  /* ── AUTH OVERLAY ── */
  #auth-overlay {
    position: fixed; inset: 0; z-index: 100;
    background: var(--bg);
    display: flex; align-items: center; justify-content: center;
    padding: 20px;
    animation: fadeIn .4s ease;
  }
  #auth-overlay.hidden { display: none; }

  .auth-card {
    width: 100%; max-width: 420px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 40px 36px;
    box-shadow: 0 0 80px var(--glow), 0 0 40px var(--glow2);
  }

  .auth-logo {
    font-family: var(--font-head);
    font-size: 2rem;
    font-weight: 800;
    letter-spacing: -1px;
    margin-bottom: 6px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .auth-sub { color: var(--text-muted); font-size: .9rem; margin-bottom: 28px; }

  .tab-row {
    display: flex; gap: 4px;
    background: var(--surface2);
    border-radius: var(--radius-sm);
    padding: 4px;
    margin-bottom: 24px;
  }
  .tab-btn {
    flex: 1; padding: 8px;
    border: none; background: transparent;
    color: var(--text-muted);
    font-family: var(--font-body);
    font-weight: 500; font-size: .9rem;
    border-radius: 7px;
    cursor: pointer; transition: all .2s;
  }
  .tab-btn.active {
    background: var(--surface3);
    color: var(--text);
    box-shadow: 0 1px 4px rgba(0,0,0,.3);
  }

  .form-section { display: none; }
  .form-section.active { display: block; }

  .input-group { margin-bottom: 14px; }
  .input-group label { display: block; font-size: .8rem; color: var(--text-muted); margin-bottom: 6px; font-weight: 500; letter-spacing: .5px; text-transform: uppercase; }

  .inp {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 11px 14px;
    color: var(--text);
    font-family: var(--font-body);
    font-size: .95rem;
    outline: none;
    transition: border-color .2s, box-shadow .2s;
  }
  .inp:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(124,106,255,.15); }
  .inp::placeholder { color: var(--text-muted); }

  .inp-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

  .avatar-upload-area {
    border: 2px dashed var(--border);
    border-radius: var(--radius-sm);
    padding: 20px;
    text-align: center;
    cursor: pointer;
    transition: all .2s;
    position: relative;
    overflow: hidden;
  }
  .avatar-upload-area:hover { border-color: var(--accent); background: rgba(124,106,255,.05); }
  .avatar-upload-area input { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
  .avatar-preview-img { width: 64px; height: 64px; border-radius: 50%; object-fit: cover; border: 2px solid var(--accent); margin: 0 auto 8px; display: none; }
  .upload-icon { font-size: 2rem; margin-bottom: 6px; }
  .upload-text { font-size: .85rem; color: var(--text-muted); }
  .upload-text span { color: var(--accent); font-weight: 600; }

  .btn-primary {
    width: 100%; padding: 13px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border: none; border-radius: var(--radius-sm);
    color: #fff; font-family: var(--font-head);
    font-weight: 700; font-size: 1rem;
    cursor: pointer; transition: opacity .2s, transform .1s;
    margin-top: 8px;
    letter-spacing: .5px;
  }
  .btn-primary:hover { opacity: .9; }
  .btn-primary:active { transform: scale(.98); }
  .btn-primary:disabled { opacity: .5; cursor: not-allowed; }

  .auth-error {
    background: rgba(255,80,80,.1);
    border: 1px solid rgba(255,80,80,.3);
    color: #ff7070;
    border-radius: var(--radius-sm);
    padding: 10px 14px;
    font-size: .85rem;
    margin-top: 12px;
    display: none;
  }
  .auth-error.visible { display: block; }

  .btn-google {
    width: 100%; padding: 12px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--text);
    font-family: var(--font-body);
    font-weight: 500; font-size: .95rem;
    cursor: pointer; transition: all .2s;
    display: flex; align-items: center; justify-content: center; gap: 10px;
    margin-top: 8px;
  }
  .btn-google:hover { border-color: var(--accent); background: rgba(124,106,255,.08); }
  .btn-google:active { transform: scale(.98); }
  .btn-google:disabled { opacity: .5; cursor: not-allowed; }
  .google-icon { width: 18px; height: 18px; flex-shrink: 0; }
  .auth-divider {
    display: flex; align-items: center; gap: 10px;
    margin: 16px 0 8px;
    color: var(--text-muted); font-size: .8rem;
  }
  .auth-divider::before, .auth-divider::after {
    content: ''; flex: 1; height: 1px; background: var(--border);
  }

  /* ── PROFILE MODAL ── */
  #profile-modal {
    position: fixed; inset: 0; z-index: 90;
    background: rgba(0,0,0,.7);
    backdrop-filter: blur(6px);
    display: flex; align-items: center; justify-content: center;
    padding: 20px;
    animation: fadeIn .3s ease;
  }
  #profile-modal.hidden { display: none; }

  .profile-card {
    width: 100%; max-width: 440px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 36px;
    box-shadow: 0 0 60px var(--glow);
    max-height: 90vh;
    overflow-y: auto;
  }

  .profile-card h2 {
    font-family: var(--font-head);
    font-size: 1.4rem; font-weight: 700;
    margin-bottom: 4px;
  }
  .profile-card .sub { color: var(--text-muted); font-size: .85rem; margin-bottom: 24px; }

  /* ── MAIN APP ── */
  #main-app { display: flex; flex-direction: column; height: 100vh; }

  /* HEADER */
  .app-header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 12px 16px;
    display: flex; align-items: center; justify-content: space-between;
    gap: 12px;
    flex-shrink: 0;
    z-index: 10;
  }

  .header-brand {
    font-family: var(--font-head);
    font-size: 1.3rem; font-weight: 800;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    letter-spacing: -0.5px;
    white-space: nowrap;
  }

  .header-actions { display: flex; align-items: center; gap: 10px; }

  .header-avatar {
    width: 36px; height: 36px;
    border-radius: 50%;
    object-fit: cover;
    border: 2px solid var(--accent);
    cursor: pointer;
    transition: transform .2s;
  }
  .header-avatar:hover { transform: scale(1.08); }

  .btn-icon {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 7px 10px;
    color: var(--text-muted);
    font-size: .8rem;
    cursor: pointer;
    transition: all .2s;
    font-family: var(--font-body);
    white-space: nowrap;
  }
  .btn-icon:hover { color: var(--text); border-color: var(--accent); background: rgba(124,106,255,.08); }

  /* YOUTUBE SECTION */
  .yt-section {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0;
    flex-shrink: 0;
  }

  .yt-controls {
    display: flex; gap: 8px; align-items: center;
    margin-bottom: 10px;
  }

  .yt-input {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 12px;
    color: var(--text);
    font-family: var(--font-body);
    font-size: .85rem;
    outline: none;
    transition: border-color .2s;
  }
  .yt-input:focus { border-color: var(--accent); }
  .yt-input::placeholder { color: var(--text-muted); }

  .btn-yt {
    background: linear-gradient(135deg, #ff0000, #cc0000);
    border: none;
    border-radius: 8px;
    padding: 8px 14px;
    color: #fff;
    font-weight: 600; font-size: .8rem;
    cursor: pointer;
    white-space: nowrap;
    font-family: var(--font-body);
    transition: opacity .2s;
  }
  .btn-yt:hover { opacity: .85; }

  .yt-frame-wrap {
    position: relative;
    width: 100%;
    height: 155px;
    border-radius: 0;
    overflow: hidden;
    background: #000;
  }
  .yt-frame-wrap iframe,
  .yt-frame-wrap > div,
  #yt-player {
    position: absolute; inset: 0;
    width: 100% !important; height: 100% !important;
    border: none;
    pointer-events: none; /* bloquea controles del usuario */
  }

  .yt-playlist {
    display: flex; gap: 6px;
    margin-top: 8px;
    flex-wrap: wrap;
  }

  .yt-chip {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 99px;
    padding: 4px 12px;
    font-size: .75rem;
    color: var(--text-muted);
    cursor: pointer;
    transition: all .2s;
    white-space: nowrap;
  }
  .yt-chip:hover { color: var(--text); border-color: var(--accent); }

  /* CHAT AREA */
  .chat-wrapper {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    min-height: 0;
  }

  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    min-height: 0;
  }

  .msg {
    display: flex; gap: 10px; align-items: flex-start;
    animation: slideUp .25s ease;
  }

  .msg.own { flex-direction: row-reverse; }

  .msg-avatar {
    width: 36px; height: 36px;
    border-radius: 50%;
    object-fit: cover;
    border: 1.5px solid var(--border);
    flex-shrink: 0;
    cursor: pointer;
    transition: transform .2s;
  }
  .msg-avatar:hover { transform: scale(1.1); }

  .msg-body { max-width: 68%; }
  .msg.own .msg-body { align-items: flex-end; display: flex; flex-direction: column; }

  .msg-meta {
    display: flex; align-items: center; gap: 6px;
    margin-bottom: 4px;
    flex-wrap: wrap;
  }
  .msg.own .msg-meta { flex-direction: row-reverse; }

  .msg-name {
    font-size: .8rem; font-weight: 600;
    color: var(--accent);
  }
  .msg.own .msg-name { color: var(--accent2); }

  .msg-location {
    font-size: .7rem;
    color: var(--text-muted);
    background: var(--surface2);
    padding: 1px 7px;
    border-radius: 99px;
    border: 1px solid var(--border);
  }

  .msg-time { font-size: .7rem; color: var(--text-muted); }

  .msg-bubble {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 14px 14px 14px 4px;
    padding: 9px 14px;
    font-size: .9rem;
    line-height: 1.5;
    color: var(--text);
    word-break: break-word;
  }
  .msg.own .msg-bubble {
    background: linear-gradient(135deg, rgba(124,106,255,.2), rgba(255,106,176,.15));
    border-color: rgba(124,106,255,.3);
    border-radius: 14px 14px 4px 14px;
  }

  /* CHAT INPUT */
  .chat-input-bar {
    background: var(--surface);
    border-top: 1px solid var(--border);
    padding: 12px 16px;
    flex-shrink: 0;
  }

  .no-profile-warning {
    background: rgba(255,106,176,.08);
    border: 1px solid rgba(255,106,176,.25);
    border-radius: var(--radius-sm);
    padding: 10px 16px;
    color: var(--accent2);
    font-size: .85rem;
    text-align: center;
    display: none;
  }
  .no-profile-warning.visible { display: block; }
  .no-profile-warning a {
    color: var(--accent2);
    font-weight: 600;
    cursor: pointer;
    text-decoration: underline;
  }

  .input-row {
    display: flex; gap: 8px; align-items: flex-end;
  }

  .msg-input {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 10px 14px;
    color: var(--text);
    font-family: var(--font-body);
    font-size: .95rem;
    outline: none;
    resize: none;
    max-height: 120px;
    line-height: 1.5;
    transition: border-color .2s;
  }
  .msg-input:focus { border-color: var(--accent); }
  .msg-input::placeholder { color: var(--text-muted); }

  .btn-send {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border: none;
    border-radius: 12px;
    width: 44px; height: 44px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    transition: opacity .2s, transform .1s;
    flex-shrink: 0;
  }
  .btn-send:hover { opacity: .9; }
  .btn-send:active { transform: scale(.95); }
  .btn-send svg { width: 18px; height: 18px; fill: white; }

  /* USER POPUP */
  #user-popup {
    position: fixed;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    min-width: 220px;
    box-shadow: 0 8px 40px rgba(0,0,0,.5), 0 0 30px var(--glow);
    z-index: 50;
    animation: fadeIn .2s ease;
    display: none;
  }
  #user-popup.visible { display: block; }

  .popup-avatar { width: 56px; height: 56px; border-radius: 50%; object-fit: cover; border: 2px solid var(--accent); margin-bottom: 10px; }
  .popup-name { font-family: var(--font-head); font-weight: 700; font-size: 1rem; margin-bottom: 2px; }
  .popup-info { font-size: .8rem; color: var(--text-muted); line-height: 1.7; }
  .popup-info span { color: var(--text-dim); }

  /* ── PROFILE WALL MODAL ── */
  #profile-wall-modal {
    position: fixed; inset: 0; z-index: 95;
    background: rgba(0,0,0,.75);
    backdrop-filter: blur(8px);
    display: flex; align-items: flex-start; justify-content: center;
    padding: 20px;
    overflow-y: auto;
    animation: fadeIn .3s ease;
  }
  #profile-wall-modal.hidden { display: none; }

  .wall-container {
    width: 100%; max-width: 600px;
    padding-bottom: 40px;
  }

  /* Cover + header */
  .wall-cover {
    width: 100%; height: 160px;
    background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 60%, var(--accent3) 100%);
    border-radius: var(--radius) var(--radius) 0 0;
    position: relative;
    overflow: hidden;
  }
  .wall-cover-pattern {
    position: absolute; inset: 0;
    background-image: radial-gradient(circle at 20% 50%, rgba(255,255,255,.08) 0%, transparent 50%),
      radial-gradient(circle at 80% 20%, rgba(255,255,255,.06) 0%, transparent 40%);
  }
  .wall-close-btn {
    position: absolute; top: 12px; right: 12px;
    background: rgba(0,0,0,.4); border: none;
    border-radius: 50%; width: 32px; height: 32px;
    color: #fff; font-size: 1rem; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background .2s;
  }
  .wall-close-btn:hover { background: rgba(0,0,0,.7); }

  .wall-profile-header {
    background: var(--surface);
    border: 1px solid var(--border);
    border-top: none;
    padding: 0 24px 20px;
    position: relative;
    border-radius: 0 0 var(--radius) var(--radius);
    margin-bottom: 16px;
  }

  .wall-avatar-wrap {
    position: relative;
    display: inline-block;
    margin-top: -40px;
    margin-bottom: 12px;
  }
  .wall-avatar {
    width: 80px; height: 80px;
    border-radius: 50%;
    object-fit: cover;
    border: 3px solid var(--surface);
    box-shadow: 0 0 0 2px var(--accent), 0 4px 20px rgba(0,0,0,.5);
  }
  .wall-online-dot {
    position: absolute; bottom: 4px; right: 4px;
    width: 14px; height: 14px;
    background: var(--accent3);
    border-radius: 50%;
    border: 2px solid var(--surface);
    box-shadow: 0 0 6px var(--accent3);
  }

  .wall-name {
    font-family: var(--font-head);
    font-size: 1.4rem; font-weight: 800;
    letter-spacing: -.5px;
    margin-bottom: 2px;
  }
  .wall-handle { color: var(--text-muted); font-size: .85rem; margin-bottom: 10px; }
  .wall-meta-row {
    display: flex; flex-wrap: wrap; gap: 10px;
    margin-bottom: 14px;
  }
  .wall-meta-chip {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 99px;
    padding: 4px 12px;
    font-size: .78rem;
    color: var(--text-dim);
    display: flex; align-items: center; gap: 5px;
  }

  .wall-stats-row {
    display: flex; gap: 0;
    border-top: 1px solid var(--border);
    padding-top: 14px;
  }
  .wall-stat {
    flex: 1; text-align: center;
    border-right: 1px solid var(--border);
  }
  .wall-stat:last-child { border-right: none; }
  .wall-stat-num {
    font-family: var(--font-head);
    font-size: 1.2rem; font-weight: 800;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .wall-stat-label { font-size: .72rem; color: var(--text-muted); margin-top: 2px; }

  /* Post composer */
  .wall-composer {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    margin-bottom: 14px;
    display: none;
  }
  .wall-composer.visible { display: block; }
  .wall-composer-row {
    display: flex; gap: 10px; align-items: flex-start;
    margin-bottom: 12px;
  }
  .wall-composer-avatar {
    width: 38px; height: 38px;
    border-radius: 50%; object-fit: cover;
    border: 2px solid var(--accent); flex-shrink: 0;
  }
  .wall-composer-input {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 10px 16px;
    color: var(--text);
    font-family: var(--font-body);
    font-size: .9rem;
    outline: none; resize: none;
    max-height: 120px;
    line-height: 1.5;
    transition: border-color .2s, box-shadow .2s;
    min-height: 42px;
  }
  .wall-composer-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(124,106,255,.12); }
  .wall-composer-input::placeholder { color: var(--text-muted); }
  .wall-composer-actions {
    display: flex; justify-content: flex-end; gap: 8px; align-items: center;
  }
  .wall-post-btn {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border: none; border-radius: 20px;
    padding: 8px 20px; color: #fff;
    font-family: var(--font-head); font-weight: 700;
    font-size: .85rem; cursor: pointer;
    transition: opacity .2s, transform .1s;
  }
  .wall-post-btn:hover { opacity: .9; }
  .wall-post-btn:active { transform: scale(.97); }
  .wall-post-btn:disabled { opacity: .5; cursor: not-allowed; }

  /* Posts feed */
  .wall-post {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    margin-bottom: 12px;
    overflow: hidden;
    animation: slideUp .25s ease;
  }
  .wall-post-header {
    display: flex; align-items: center; gap: 10px;
    padding: 14px 16px 10px;
  }
  .wall-post-avatar {
    width: 40px; height: 40px;
    border-radius: 50%; object-fit: cover;
    border: 2px solid var(--border);
    flex-shrink: 0;
  }
  .wall-post-meta { flex: 1; }
  .wall-post-author {
    font-weight: 700; font-size: .9rem;
    color: var(--accent);
    font-family: var(--font-head);
  }
  .wall-post-time { font-size: .75rem; color: var(--text-muted); margin-top: 1px; }
  .wall-post-body {
    padding: 0 16px 14px;
    font-size: .92rem; line-height: 1.6;
    color: var(--text);
    word-break: break-word;
  }
  .wall-post-image {
    width: 100%; max-height: 320px;
    object-fit: cover; display: block;
    margin-bottom: 0;
  }
  .wall-post-actions {
    display: flex;

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut, GoogleAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, collection, doc, setDoc, getDoc, addDoc, onSnapshot, query, orderBy, serverTimestamp, deleteDoc, getDocs, updateDoc, arrayUnion, arrayRemove, increment } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

// ══════════════════════════════════════════════
// 🔥 CONFIGURACIÓN FIREBASE
// ══════════════════════════════════════════════
const firebaseConfig = {
  apiKey: "AIzaSyA9oat9dd0S9vlxkg1osH4dW3XhRDGiOiw",
  authDomain: "charlasrf4.firebaseapp.com",
  projectId: "charlasrf4",
  storageBucket: "charlasrf4.firebasestorage.app",
  messagingSenderId: "345019626508",
  appId: "1:345019626508:web:d099ca499acb29eac12a29"
};

// ──────────────────────────────────────────────
// ☁️ CLOUDINARY
// ──────────────────────────────────────────────
const CLOUDINARY_CLOUD_NAME = "da0n5tg3g";
const CLOUDINARY_UPLOAD_PRESET = "wikipediarf4";

// ── ADMIN EMAIL ──
const ADMIN_EMAIL = "synxyes@gmail.com";

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// ── State ──
let currentUser = null;
let currentProfile = null;
let avatarFileReg = null;
let avatarFileEdit = null;
let unsubscribeChat = null;
let unsubscribeVideo = null;

// ── Expose globals ──
window._auth = auth;
window._db = db;
window._signOut = signOut;
window._signInWithPopup = signInWithPopup;
window._GoogleAuthProvider = GoogleAuthProvider;
window._CLOUDINARY_CLOUD_NAME = CLOUDINARY_CLOUD_NAME;
window._CLOUDINARY_UPLOAD_PRESET = CLOUDINARY_UPLOAD_PRESET;
window._createUserWithEmailAndPassword = createUserWithEmailAndPassword;
window._signInWithEmailAndPassword = signInWithEmailAndPassword;
window._ADMIN_EMAIL = ADMIN_EMAIL;

window._setCurrentUser = (u) => { currentUser = u; };
window._getCurrentUser = () => currentUser;
window._setCurrentProfile = (p) => { currentProfile = p; };
window._getCurrentProfile = () => currentProfile;
window._setAvatarFileReg = (f) => { avatarFileReg = f; };
window._getAvatarFileReg = () => avatarFileReg;
window._setAvatarFileEdit = (f) => { avatarFileEdit = f; };
window._getAvatarFileEdit = () => avatarFileEdit;
window._isAdmin = () => currentUser?.email === ADMIN_EMAIL;

// ── Auth state ──
onAuthStateChanged(auth, async (user) => {
  if (user) {
    currentUser = user;
    window._setCurrentUser(user);
    const snap = await getDoc(doc(db, 'users', user.uid));
    const profile = snap.exists() ? snap.data() : null;
    currentProfile = profile;
    window._setCurrentProfile(profile);
    showMainApp(user, profile);
    startChat();
    updateOnlinePresence(user.uid);
    startVideoSync();

    // Mostrar panel admin si corresponde
    if (user.email === ADMIN_EMAIL) {
      document.body.classList.add('is-admin');
      const panel = document.getElementById('admin-panel');
      if (panel) panel.classList.add('visible');
    }
  } else {
    currentUser = null;
    currentProfile = null;
    if (unsubscribeChat) { unsubscribeChat(); unsubscribeChat = null; }
    if (unsubscribeVideo) { unsubscribeVideo(); unsubscribeVideo = null; }
    document.body.classList.remove('is-admin');
    showAuthOverlay();
  }
});

// ── Online presence con Firestore ──
function updateOnlinePresence(uid) {
  const presRef = doc(db, 'online', uid);
  setDoc(presRef, { online: true, ts: Date.now() });

  onSnapshot(collection(db, 'online'), snap => {
    const el = document.getElementById('online-count');
    if (el) el.textContent = `${snap.size} online`;
  });
}

// ── YouTube IFrame API + sincronización de tiempo ──
let ytPlayer = null;
let ytPlayerReady = false;
let pendingVideoData = null;

// Cargar YouTube IFrame API una sola vez
if (!window.YT) {
  const tag = document.createElement('script');
  tag.src = 'https://www.youtube.com/iframe_api';
  document.head.appendChild(tag);
}

window.onYouTubeIframeAPIReady = function() {
  ytPlayer = new YT.Player('yt-player', {
    width: '100%',
    height: '100%',
    videoId: 'jfKfPfyJRdk',
    playerVars: {
      autoplay: 0,
      controls: 0,       // sin controles visibles
      rel: 0,
      modestbranding: 1,
      disablekb: 1,      // bloquear teclado
      fs: 0,             // sin fullscreen
      iv_load_policy: 3, // sin anotaciones
    },
    events: {
      onReady: () => {
        ytPlayerReady = true;
        if (pendingVideoData) {
          applySyncedVideo(pendingVideoData);
          pendingVideoData = null;
        }
      },
      onStateChange: (e) => {
        // Si el usuario pausa o para, forzar reproducción en el segundo correcto
        if (e.data === YT.PlayerState.PAUSED || e.data === YT.PlayerState.ENDED) {
          if (pendingVideoData || window._lastVideoData) {
            setTimeout(() => applySyncedVideo(window._lastVideoData || pendingVideoData), 300);
          }
        }
      }
    }
  });

  // Re-sincronizar cada 10 segundos para mantener a todos en el mismo punto
  setInterval(() => {
    if (window._lastVideoData) applySyncedVideo(window._lastVideoData);
  }, 10000);
};

function applySyncedVideo(data) {
  if (!ytPlayer || !ytPlayerReady) {
    pendingVideoData = data;
    return;
  }
  if (!data || !data.videoId) return;
  window._lastVideoData = data; // guardar para re-sync periódico

  const { videoId, startedAt } = data;
  const elapsedSeconds = startedAt ? Math.floor((Date.now() - startedAt) / 1000) : 0;

  const currentId = ytPlayer.getVideoData ? ytPlayer.getVideoData().video_id : '';
  if (currentId !== videoId) {
    // Video nuevo o distinto: cargar y saltar al segundo correcto
    ytPlayer.loadVideoById({ videoId, startSeconds: elapsedSeconds });
  } else {
    // Mismo video: corregir si hay más de 2 segundos de diferencia
    const currentTime = ytPlayer.getCurrentTime ? ytPlayer.getCurrentTime() : 0;
    if (Math.abs(currentTime - elapsedSeconds) > 2) {
      ytPlayer.seekTo(elapsedSeconds, true);
      ytPlayer.playVideo();
    }
  }
}

function startVideoSync() {
  if (unsubscribeVideo) unsubscribeVideo();
  const videoRef = doc(db, 'config', 'currentVideo');
  unsubscribeVideo = onSnapshot(videoRef, (snap) => {
    if (snap.exists()) {
      const data = snap.data();
      applySyncedVideo(data);
    }
  });
}

// ── Chat en tiempo real con Firestore ──
function startChat() {
  if (unsubscribeChat) unsubscribeChat();
  const q = query(collection(db, 'messages'), orderBy('ts', 'asc'));
  unsubscribeChat = onSnapshot(q, (snap) => {
    const msgs = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    renderMessages(msgs);
  });
}

function renderMessages(msgs) {
  const container = document.getElementById('messages');
  if (!container) return;
  container.innerHTML = '';
  const uid = currentUser?.uid;
  const isAdmin = currentUser?.email === ADMIN_EMAIL;
  msgs.forEach(msg => {
    const isOwn = msg.uid === uid;
    const div = document.createElement('div');
    div.className = `msg${isOwn ? ' own' : ''}`;

    const ts = msg.ts?.toDate ? msg.ts.toDate() : (msg.ts ? new Date(msg.ts) : null);
    const time = ts ? ts.toLocaleTimeString('es-AR', { hour: '2-digit', minute: '2-digit' }) : '';
    const locationStr = msg.city ? `${msg.city}, ${msg.country || ''}` : (msg.country || '');

    const adminControls = isAdmin ? `
      <div>
        <button class="msg-delete-btn" onclick="adminDeleteMsg('${msg.id}')">🗑 Borrar</button>
        ${!isOwn ? `<button class="msg-delete-btn" style="margin-left:4px" onclick="adminBanUser('${msg.uid}', '${(msg.name||'').replace(/'/g,"\\'")}')">🚫 Banear</button>` : ''}
      </div>` : '';

    div.innerHTML = `
      <img class="msg-avatar" src="${msg.avatar || 'https://api.dicebear.com/7.x/thumbs/svg?seed=' + msg.uid}"
           alt="" onclick="showUserPopup(event, ${JSON.stringify(msg).replace(/"/g, '&quot;')})"/>
      <div class="msg-body">
        <div class="msg-meta">
          <span class="msg-name">${msg.name || 'Anónimo'}</span>
          ${locationStr ? `<span class="msg-location">📍 ${locationStr}</span>` : ''}
          <span class="msg-time">${time}</span>
        </div>
        <div class="msg-bubble">${escapeHtml(msg.text)}</div>
        ${adminControls}
      </div>
    `;
    container.appendChild(div);
  });
  container.scrollTop = container.scrollHeight;
}

// ── Push message a Firestore ──
window._pushMessage = async (msgData) => {
  await addDoc(collection(db, 'messages'), {
    ...msgData,
    ts: serverTimestamp()
  });
};

// ── Guardar/leer perfil en Firestore ──
window._saveUserProfile = async (uid, data) => {
  await setDoc(doc(db, 'users', uid), data, { merge: true });
};

window._loadUserProfile = async (uid) => {
  const snap = await getDoc(doc(db, 'users', uid));
  return snap.exists() ? snap.data() : null;
};

// ── ADMIN: Set video global (guarda el momento exacto de inicio) ──
window._adminSetVideoId = async (videoId) => {
  await setDoc(doc(db, 'config', 'currentVideo'), { videoId, startedAt: Date.now() });
};

// ── ADMIN: Borrar mensaje ──
window._adminDeleteMsg = async (msgId) => {
  await deleteDoc(doc(db, 'messages', msgId));
};

// ── ADMIN: Banear usuario (borrar su perfil y mensajes) ──
window._adminBanUser = async (uid) => {
  // Marcar usuario como baneado
  await setDoc(doc(db, 'banned', uid), { bannedAt: Date.now() });
  // Borrar sus mensajes
  const q = query(collection(db, 'messages'));
  const snap = await getDocs(q);
  const toDelete = snap.docs.filter(d => d.data().uid === uid);
  for (const d of toDelete) {
    await deleteDoc(d.ref);
  }
};

// ── ADMIN: Limpiar todo el chat ──
window._adminClearChat = async () => {
  const snap = await getDocs(collection(db, 'messages'));
  for (const d of snap.docs) {
    await deleteDoc(d.ref);
  }
};
</script>

// ── Upload to Cloudinary ──
async function uploadToCloudinary(file) {
  const cloudName = window._CLOUDINARY_CLOUD_NAME;
  const preset = window._CLOUDINARY_UPLOAD_PRESET;
  const formData = new FormData();
  formData.append('file', file);
  formData.append('upload_preset', preset);
  const res = await fetch(`https://api.cloudinary.com/v1_1/${cloudName}/image/upload`, {
    method: 'POST', body: formData
  });
  const data = await res.json();
  if (!data.secure_url) throw new Error('Cloudinary error: ' + JSON.stringify(data));
  return data.secure_url;
}

async function saveProfile() {
  const user = window._getCurrentUser ? window._getCurrentUser() : null;
  if (!user) return;

  const name = document.getElementById('edit-name').value.trim();
  const country = document.getElementById('edit-country').value.trim();
  const city = document.getElementById('edit-city').value.trim();
  const age = document.getElementById('edit-age').value.trim();
  const phone = document.getElementById('edit-phone').value.trim();
  const avatarFile = window._getAvatarFileEdit ? window._getAvatarFileEdit() : null;
  const errEl = document.getElementById('profile-error');
  const btn = document.getElementById('btn-save-profile');

  errEl.classList.remove('visible');

  if (!name) { showError(errEl, '⚠️ Ingresá tu nombre/nick.'); return; }

  const existingProfile = window._getCurrentProfile ? window._getCurrentProfile() : {};
  const hasExistingAvatar = existingProfile && existingProfile.avatar;

  if (!avatarFile && !hasExistingAvatar) {
    showError(errEl, '⚠️ Necesitás una foto de perfil.'); return;

      ...(existingProfile || {}),
      name, country, city, age, phone,
      avatar: avatarUrl,
      uid: user.uid

function extractYouTubeId(url) {
  const patterns = [
    /youtu\.be\/([^?&\s]+)/,
    /v=([^?&\s]+)/,
    /embed\/([^?&\s]+)/,
    /shorts\/([^?&\s]+)/
  ];
  for (const p of patterns) {
    const m = url.match(p);
    if (m) return m[1];
  }
  return null;
}

async function submitWallPost() {
  const input = document.getElementById('wall-composer-input');
  const text = input.value.trim();
  if (!text) return;

  const currentUser = window._getCurrentUser ? window._getCurrentUser() : null;

  const btn = document.getElementById('wall-post-btn');

  try {

      uid: currentUser.uid,
      name: currentProfile?.name || 'Anónimo',
      avatar: currentProfile?.avatar || '',
      ts: serverTimestamp(),
      likes: [],
      commentCount: 0
    });
    input.value = '';
    input.style.height = 'auto';
  } catch(e) {
    showToast('❌ Error al publicar');
  } finally {
    btn.disabled = false; btn.textContent = 'Publicar';
  }
}

function loadWallPosts(uid) {
  const feed = document.getElementById('wall-feed');
  feed.innerHTML = '<div class="wall-empty"><div class="wall-empty-icon">⏳</div>Cargando...</div>';

  import("https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js").then(({ collection, query, orderBy, onSnapshot }) => {
    const db = window._db;
    const q = query(collection(db, 'walls', uid, 'posts'), orderBy('ts', 'desc'));
    if (_wallUnsubscribe) _wallUnsubscribe();
    _wallUnsubscribe = onSnapshot(q, snap => {
      const posts = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      renderWallPosts(posts, uid);
    });
  });
}

function renderWallPosts(posts, wallOwnerUid) {
  const feed = document.getElementById('wall-feed');
  const currentUser = window._getCurrentUser ? window._getCurrentUser() : null;

  // Update stats
  const totalLikes = posts.reduce((sum, p) => sum + (p.likes?.length || 0), 0);
  const totalComments = posts.reduce((sum, p) => sum + (p.commentCount || 0), 0);
  const statPosts = document.getElementById('wall-stat-posts');
  const statLikes = document.getElementById('wall-stat-likes');
  const statComments = document.getElementById('wall-stat-comments');
  if (statPosts) statPosts.textContent = posts.length;
  if (statLikes) statLikes.textContent = totalLikes;
  if (statComments) statComments.textContent = totalComments;

  if (posts.length === 0) {
    feed.innerHTML = '<div class="wall-empty"><div class="wall-empty-icon">📭</div>Todavía no hay posts. ¡Sé el primero!</div>';
    return;
  }

  feed.innerHTML = '';
  posts.forEach(post => {
    const ts = post.ts?.toDate ? post.ts.toDate() : (post.ts ? new Date(post.ts) : null);
    const timeStr = ts ? ts.toLocaleDateString('es-AR', { day:'numeric', month:'short', year:'numeric', hour:'2-digit', minute:'2-digit' }) : '';
    const likeCount = post.likes?.length || 0;
    const isLiked = currentUser && post.likes?.includes(currentUser.uid);
    const commentCount = post.commentCount || 0;

    const div = document.createElement('div');
    div.className = 'wall-post';
    div.setAttribute('data-post-id', post.id);
    div.innerHTML = `
      <div class="wall-post-header">
        <img class="wall-post-avatar" src="${post.avatar || ''}" alt=""/>
        <div class="wall-post-meta">
          <div class="wall-post-author">${post.name || 'Anónimo'}</div>
          <div class="wall-post-time">🕐 ${timeStr}</div>
        </div>
      </div>
      <div class="wall-post-body">${escapeHtml(post.text)}</div>
      <div class="wall-post-actions">
        <button class="wall-action-btn${isLiked ? ' liked' : ''}" onclick="toggleWallLike('${wallOwnerUid}','${post.id}', this)">
          <span class="action-icon">${isLiked ? '❤️' : '🤍'}</span>
          <span class="like-label">${likeCount > 0 ? likeCount + ' Me gusta' : 'Me gusta'}</span>
        </button>
        <button class="wall-action-btn" onclick="toggleWallComments('${post.id}', '${wallOwnerUid}', this)">
          <span class="action-icon">💬</span>
          ${commentCount > 0 ? commentCount + ' Comentarios' : 'Comentar'}
        </button>
      </div>
      <div class="wall-comments" id="comments-${post.id}">
        <div id="comments-list-${post.id}"></div>
        <div class="wall-comment-input-row">
          <img class="wall-comment-avatar" src="${window._getCurrentProfile?.()?.avatar || ''}" alt=""/>
          <input class="wall-comment-input" id="comment-input-${post.id}" placeholder="Escribí un comentario..."
            onkeydown="if(event.key==='Enter'){submitWallComment('${wallOwnerUid}','${post.id}');event.preventDefault();}"/>
          <button class="wall-comment-send" onclick="submitWallComment('${wallOwnerUid}','${post.id}')">
            <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2v7z"/></svg>
          </button>
        </div>
      </div>
    `;
    feed.appendChild(div);
  });
}

async function toggleWallLike(wallOwnerUid, postId, btn) {
  const currentUser = window._getCurrentUser ? window._getCurrentUser() : null;
  if (!currentUser) return;

  const { doc, getDoc, updateDoc, arrayUnion, arrayRemove } = await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js");
  const db = window._db;
  const postRef = doc(db, 'walls', wallOwnerUid, 'posts', postId);
  const snap = await getDoc(postRef);
  if (!snap.exists()) return;

  const likes = snap.data().likes || [];
  const isLiked = likes.includes(currentUser.uid);

  if (isLiked) {
    await updateDoc(postRef, { likes: arrayRemove(currentUser.uid) });
    btn.classList.remove('liked');
    btn.querySelector('.action-icon').textContent = '🤍';
    const newCount = likes.length - 1;
    btn.querySelector('.like-label').textContent = newCount > 0 ? newCount + ' Me gusta' : 'Me gusta';
  } else {
    await updateDoc(postRef, { likes: arrayUnion(currentUser.uid) });
    btn.classList.add('liked');
    btn.querySelector('.action-icon').textContent = '❤️';
    const newCount = likes.length + 1;
    btn.querySelector('.like-label').textContent = newCount + ' Me gusta';
  }
}

async function toggleWallComments(postId, wallOwnerUid, btn) {
  const commentsEl = document.getElementById(`comments-${postId}`);
  if (!commentsEl) return;

  const isVisible = commentsEl.classList.contains('visible');
  if (isVisible) {
    commentsEl.classList.remove('visible');
    return;
  }

  commentsEl.classList.add('visible');
  loadWallComments(wallOwnerUid, postId);
}

async function loadWallComments(wallOwnerUid, postId) {
  const listEl = document.getElementById(`comments-list-${postId}`);
  if (!listEl) return;
  listEl.innerHTML = '<div style="font-size:.8rem;color:var(--text-muted);padding:4px 0">Cargando...</div>';

  const { collection, query, orderBy, getDocs } = await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js");
  const db = window._db;
  const q = query(collection(db, 'walls', wallOwnerUid, 'posts', postId, 'comments'), orderBy('ts', 'asc'));
  const snap = await getDocs(q);
  const comments = snap.docs.map(d => ({ id: d.id, ...d.data() }));

  listEl.innerHTML = '';
  comments.forEach(c => {
    const div = document.createElement('div');
    div.className = 'wall-comment';
    div.innerHTML = `
      <img class="wall-comment-avatar" src="${c.avatar || ''}" alt=""/>
      <div class="wall-comment-bubble">
        <div class="wall-comment-author">${c.name || 'Anónimo'}</div>
        ${escapeHtml(c.text)}
      </div>`;
    listEl.appendChild(div);
  });

  if (comments.length === 0) {
    listEl.innerHTML = '<div style="font-size:.8rem;color:var(--text-muted);padding:4px 0">Sé el primero en comentar.</div>';
  }
}

async function submitWallComment(wallOwnerUid, postId) {
  const input = document.getElementById(`comment-input-${postId}`);
  const text = input?.value?.trim();
  if (!text) return;

  const currentUser = window._getCurrentUser ? window._getCurrentUser() : null;
  const currentProfile = window._getCurrentProfile ? window._getCurrentProfile() : null;
  if (!currentUser) return;

  input.value = '';
  const { addDoc, collection, doc, updateDoc, increment, serverTimestamp } = await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js");
  const db = window._db;

  await addDoc(collection(db, 'walls', wallOwnerUid, 'posts', postId, 'comments'), {
    text,
    uid: currentUser.uid,
    name: currentProfile?.name || 'Anónimo',
    avatar: currentProfile?.avatar || '',
    ts: serverTimestamp()
  });

  await updateDoc(doc(db, 'walls', wallOwnerUid, 'posts', postId), { commentCount: increment(1) });
  loadWallComments(wallOwnerUid, postId);
}

// Close wall clicking outside
document.getElementById('profile-wall-modal').addEventListener('click', function(e) {
  if (e.target === this) closeProfileWall();
});

// Close profile modal clicking outside
document.getElementById('profile-modal').addEventListener('click', function(e) {
  if (e.target === this) this.classList.add('hidden');
});
