<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DYTATUBE - Sitio en Construcción</title>
    <style>
        body {
            background-color: #000000;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
        }

        .container {
            max-width: 600px;
            padding: 20px;
        }

        /* Imagen DYTATUBE */
        .logo {
            max-width: 400px;
            width: 90%;
            height: auto;
            margin-bottom: 30px;
            filter: grayscale(50%);
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            color: #ff0000;
        }

        p {
            font-size: 1.2rem;
            color: #aaaaaa;
            line-height: 1.6;
        }

        .loader {
            border: 4px solid #222;
            border-top: 4px solid #ff0000;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 30px auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .footer {
            margin-top: 50px;
            font-size: 0.8rem;
            color: #444;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>

    <div class="container">
        <img src="dytatube.png" alt="DYTATUBE" class="logo">
        
        <h1>SITIO EN CONSTRUCCIÓN</h1>
        <p>Estamos mejorando el sistema de descarga directa para que funcione sin ventanas emergentes y con la mejor calidad MP3/MP4.</p>
        
        <div class="loader"></div>
        
        <p style="font-size: 0.9rem;">Vuelve pronto. Estamos trabajando para servirte mejor.</p>
    </div>

    <div class="footer">
        DYTA 2026 • PRÓXIMAMENTE
    </div>

</body>
</html>
