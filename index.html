<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>DYTATUBE - Descarga Directa</title>
    <style>
        :root { --primary: #ff0000; --bg: #050505; --card: #121212; --text: #ffffff; --accent: #2ecc71; }
        body { font-family: 'Segoe UI', Arial; background: var(--bg); color: var(--text); margin: 0; text-align: center; }
        
        /* Navbar Canela */
        header { background: #000; padding: 15px; border-bottom: 1px solid #222; display: flex; gap: 15px; justify-content: center; overflow-x: auto; }
        .nav-link { color: #ccc; font-size: 13px; font-weight: bold; white-space: nowrap; }

        .main { padding: 40px; display: flex; flex-direction: column; align-items: center; }
        .header-img { max-width: 400px; margin-bottom: 20px; } /* */
        
        .box { background: var(--card); padding: 30px; border-radius: 20px; border: 1px solid #333; width: 100%; max-width: 600px; }
        input { width: 90%; padding: 15px; border-radius: 10px; border: 2px solid #444; background: #000; color: white; margin-bottom: 20px; outline: none; }
        
        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        button { padding: 15px; border: none; border-radius: 10px; font-weight: bold; color: white; cursor: pointer; text-transform: uppercase; }
        .btn-mp3 { background: var(--accent); }
        .btn-mp4 { background: var(--primary); }

        /* Barra de progreso estilo EXE */
        #prog-cont { display: none; margin-top: 25px; }
        .bar-bg { background: #222; height: 12px; border-radius: 10px; overflow: hidden; }
        #bar { width: 0%; height: 100%; background: var(--accent); transition: width 0.3s; }
        
        /* Botón de descarga real que aparece al final */
        #final-download { 
            display: none; margin-top: 20px; padding: 15px; width: 100%; 
            background: #f1c40f; color: #000; text-decoration: none; 
            border-radius: 10px; font-weight: 900; animation: pulse 1.5s infinite;
        }
        @keyframes pulse { 0% {transform: scale(1);} 50% {transform: scale(1.02);} 100% {transform: scale(1);} }
    </style>
</head>
<body>
    <header>
        <div class="nav-link">Inicio</div><div class="nav-link">Películas</div><div class="nav-link">Series</div><div class="nav-link">Música</div>
    </header>

    <div class="main">
        <img src="dytatube.png" class="header-img"> <div class="box">
            <input type="text" id="url" placeholder="Pega el link de YouTube aquí...">
            <div class="btn-grid">
                <button class="btn-mp3" onclick="preparar('mp3')">Convertir a MP3</button>
                <button class="btn-mp4" onclick="preparar('mp4')">Convertir a MP4</button>
            </div>

            <div id="prog-cont">
                <div class="bar-bg"><div id="bar"></div></div>
                <p id="status">Iniciando...</p>
                <a id="final-download" href="#" target="_blank">¡CLIC AQUÍ PARA DESCARGAR ARCHIVO!</a>
            </div>
        </div>
    </div>

    <script>
        function preparar(tipo) {
            const link = document.getElementById('url').value;
            if (!link) return alert("Pega un link");
            
            const id = link.match(/(?:https?:\/\/)?(?:www\.)?(?:youtube\.com\/watch\?v=|youtu\.be\/)([a-zA-Z0-9_-]{11})/);
            if (!id) return alert("Link de YouTube no válido");

            // UI
            document.getElementById('prog-cont').style.display = 'block';
            document.getElementById('final-download').style.display = 'none';
            let b = document.getElementById('bar');
            let s = document.getElementById('status');
            let p = 0;

            let interval = setInterval(() => {
                p += Math.random() * 10;
                if (p >= 100) {
                    p = 100;
                    clearInterval(interval);
                    s.innerText = "¡Conversión Completa! Haz clic abajo:"; //
                    
                    // Configuramos el botón real
                    const btnDescarga = document.getElementById('final-download');
                    btnDescarga.style.display = 'block';
                    btnDescarga.href = tipo === 'mp3' 
                        ? `https://api.v-mate.net/api/mp3/${id[1]}`
                        : `https://api.v-mate.net/api/video/${id[1]}`;
                }
                b.style.width = p + "%";
                s.innerText = `Procesando ${tipo.toUpperCase()}... ${Math.floor(p)}%`;
            }, 300);
        }
    </script>
</body>
</html>
