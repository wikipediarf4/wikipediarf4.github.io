<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DYTATUBE - Descargas Online</title>
    <style>
        :root {
            --primary: #ff0000;
            --bg: #050505;
            --card: #121212;
            --text: #ffffff;
            --accent: #2ecc71;
            --blue: #01b4e4;
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            align-items: center;
        }

        /* --- NAVBAR ESTILO CANELA --- */
        header {
            background: #000;
            padding: 15px 50px;
            display: flex;
            align-items: center;
            width: 100%;
            border-bottom: 1px solid #222;
            box-sizing: border-box;
        }

        nav { display: flex; gap: 20px; overflow-x: auto; white-space: nowrap; }
        .nav-link { color: #ccc; text-decoration: none; font-weight: 700; font-size: 14px; cursor: pointer; }

        /* --- CONTENEDOR PRINCIPAL --- */
        .main-container {
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
        }

        .header-img {
            max-width: 450px;
            width: 90%;
            margin-bottom: 25px;
        }

        .download-box {
            width: 100%;
            max-width: 600px;
            background: var(--card);
            padding: 35px;
            border-radius: 20px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.9);
            border: 1px solid #333;
            text-align: center;
        }

        input {
            width: 100%;
            padding: 18px;
            border-radius: 12px;
            border: 2px solid #444;
            background: #000;
            color: white;
            font-size: 16px;
            margin-bottom: 25px;
            box-sizing: border-box;
            outline: none;
        }

        .btn-group {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 15px;
        }

        button {
            padding: 18px;
            border: none;
            border-radius: 12px;
            font-weight: 800;
            cursor: pointer;
            color: white;
            text-transform: uppercase;
            font-size: 13px;
            transition: 0.3s;
        }

        .btn-mp3 { background: var(--accent); }
        .btn-mp4 { background: var(--primary); }
        .btn-movie { background: var(--blue); }

        button:hover { transform: translateY(-3px); filter: brightness(1.2); }

        /* --- BARRA DE PROGRESO --- */
        #progress-container {
            display: none;
            margin-top: 30px;
        }

        .progress-bg {
            background: #222;
            height: 12px;
            border-radius: 10px;
            overflow: hidden;
        }

        #progress-bar {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, var(--accent), #00ff88);
            transition: width 0.4s;
        }

        #status-text {
            margin-top: 12px;
            font-size: 14px;
            color: #aaa;
        }

        footer {
            margin-top: auto;
            padding: 30px;
            color: #444;
            font-size: 13px;
        }

        /* El "motor" invisible para descargar sin pestañas */
        #dl-engine { display: none; }
    </style>
</head>
<body>

    <header>
        <nav>
            <div class="nav-link">Inicio</div>
            <div class="nav-link">Guía de TV</div>
            <div class="nav-link">Películas</div>
            <div class="nav-link">Series</div>
            <div class="nav-link">Clásicos</div>
            <div class="nav-link">Deportes</div>
            <div class="nav-link">Música</div>
            <div class="nav-link">Kids</div>
            <div class="nav-link">Noticias</div>
        </nav>
    </header>

    <div class="main-container">
        <img src="dytatube.png" alt="DYTATUBE" class="header-img">

        <div class="download-box">
            <input type="text" id="target-url" placeholder="Pega el link de YouTube o Película aquí...">
            
            <div class="btn-group">
                <button class="btn-mp3" onclick="handleDownload('mp3')">MP3 Música</button>
                <button class="btn-mp4" onclick="handleDownload('mp4')">MP4 Video</button>
                <button class="btn-movie" onclick="handleDownload('movie')">Películas</button>
            </div>

            <div id="progress-container">
                <div class="progress-bg"><div id="progress-bar"></div></div>
                <div id="status-text">Analizando...</div>
            </div>
        </div>
    </div>

    <iframe id="dl-engine"></iframe>

    <footer>
        DYTA 2026 Todos los derechos reservados
    </footer>

    <script>
        function handleDownload(type) {
            const url = document.getElementById('target-url').value;
            if (!url) return alert("Pega un link primero");

            const container = document.getElementById('progress-container');
            const bar = document.getElementById('progress-bar');
            const status = document.getElementById('status-text');
            const engine = document.getElementById('dl-engine');

            container.style.display = 'block';
            let p = 0;
            status.innerText = `Iniciando descarga de ${type.toUpperCase()}...`;

            // Animación de barra estilo EXE
            const anim = setInterval(() => {
                p += Math.random() * 7;
                if (p >= 95) {
                    p = 95;
                    status.innerText = "¡Casi listo! El archivo se bajará en breve...";
                } else {
                    bar.style.width = p + "%";
                    status.innerText = `Descargando... ${Math.floor(p)}%`;
                }
            }, 400);

            // LOGICA DE DESCARGA
            const videoId = extractID(url);
            let finalUrl = "";

            if (type === 'movie') {
                finalUrl = url; // Para pelis abre el link directo
                window.open(finalUrl, '_blank');
            } else if (videoId) {
                // Motor de descarga directa sin popups
                finalUrl = type === 'mp3' 
                    ? `https://api.v-mate.net/api/mp3/${videoId}` 
                    : `https://api.v-mate.net/api/video/${videoId}`;
                
                // Usamos el iframe oculto para forzar la bajada sin salir de la web
                engine.src = finalUrl;
            } else {
                status.innerText = "Error: El link no es de YouTube.";
                clearInterval(anim);
                return;
            }

            // Finalización
            setTimeout(() => {
                clearInterval(anim);
                bar.style.width = "100%";
                status.innerText = "¡Descarga lista! Revisa tu carpeta de descargas.";
                setTimeout(() => { container.style.display = 'none'; bar.style.width = '0%'; }, 5000);
            }, 8000);
        }

        function extractID(url) {
            const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
            const match = url.match(regExp);
            return (match && match[2].length == 11) ? match[2] : null;
        }
    </script>
</body>
</html>
