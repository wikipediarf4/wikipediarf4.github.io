<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DYTA Downloads - Online Gratis</title>
    <style>
        :root {
            --primary: #ff0000; /* Rojo YouTube */
            --bg: #0f0f0f;
            --card: #1e1e1e;
            --text: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            align-items: center;
        }

        header {
            text-align: center;
            padding: 40px 20px;
        }

        h1 {
            font-size: 3rem;
            margin: 0;
            color: var(--text);
            letter-spacing: -1px;
        }

        h1 span { color: var(--primary); }

        .subtitle { color: #aaa; margin-top: 10px; }

        .container {
            width: 90%;
            max-width: 800px;
            background: var(--card);
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            margin-bottom: 40px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        input {
            padding: 15px;
            border-radius: 8px;
            border: 2px solid #333;
            background: #121212;
            color: white;
            font-size: 16px;
            outline: none;
            transition: border 0.3s;
        }

        input:focus { border-color: var(--primary); }

        .btn-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        button {
            padding: 15px;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            transition: 0.3s;
        }

        .btn-mp3 { background: #2ecc71; color: white; }
        .btn-mp4 { background: var(--primary); color: white; }
        .btn-movie { background: #3498db; color: white; grid-column: span 2; }

        button:hover { opacity: 0.8; transform: translateY(-2px); }

        /* --- SECCIÓN PELICULAS --- */
        .movie-section {
            width: 90%;
            max-width: 800px;
            text-align: center;
        }

        footer {
            margin-top: auto;
            padding: 20px;
            color: #555;
            font-size: 14px;
        }

        iframe {
            width: 100%;
            height: 150px;
            border: none;
            margin-top: 20px;
            display: none;
            border-radius: 8px;
        }
    </style>
</head>
<body>

    <header>
        <h1>DYTA <span>Downloads</span></h1>
        <p class="subtitle">Online gratis - YouTube, Music & Movies</p>
    </header>

    <div class="container">
        <div class="input-group">
            <input type="text" id="url-input" placeholder="Pega el link de YouTube o nombre de película aquí...">
            
            <div class="btn-group">
                <button class="btn-mp3" onclick="download('mp3')">Descargar MP3</button>
                <button class="btn-mp4" onclick="download('mp4')">Descargar Video</button>
                <button class="btn-movie" onclick="searchMovie()">Buscar Película para Descargar</button>
            </div>
        </div>

        <iframe id="download-frame"></iframe>
    </div>

    <div class="movie-section" id="movie-results"></div>

    <footer>
        DYTA 2026 Todos los derechos reservados
    </footer>

    <script>
        // Función para descargar de YouTube
        function download(format) {
            const url = document.getElementById('url-input').value;
            if (!url) { alert("Por favor pega un link"); return; }

            const frame = document.getElementById('download-frame');
            frame.style.display = 'block';

            // Usamos un servicio de conversión (y2mate / loader.to compatible)
            // Nota: Estas URLs pueden cambiar, son servicios externos.
            if (format === 'mp3') {
                frame.src = `https://loader.to/api/button/?url=${encodeURIComponent(url)}&f=mp3`;
            } else {
                frame.src = `https://loader.to/api/button/?url=${encodeURIComponent(url)}&f=720`;
            }
        }

        // Función para buscar películas (TMDB) y dar opción de descarga
        async function searchMovie() {
            const query = document.getElementById('url-input').value;
            if (!query) { alert("Escribe el nombre de una película"); return; }

            const API_KEY = 'f663f105c4c1626d23e86d2ac19471a9';
            const res = await fetch(`https://api.themoviedb.org/3/search/movie?api_key=${API_KEY}&query=${encodeURIComponent(query)}&language=es-ES`);
            const data = await res.json();

            const resultsContainer = document.getElementById('movie-results');
            resultsContainer.innerHTML = '<h3>Resultados encontrados:</h3>';

            data.results.slice(0, 3).forEach(movie => {
                const div = document.createElement('div');
                div.style.background = "#1e1e1e";
                div.style.padding = "15px";
                div.style.marginBottom = "10px";
                div.style.borderRadius = "8px";
                div.style.display = "flex";
                div.style.alignItems = "center";
                div.style.justifyContent = "space-between";

                div.innerHTML = `
                    <span>${movie.title} (${movie.release_date.split('-')[0]})</span>
                    <button onclick="window.open('https://vidsrc.to/embed/movie/${movie.id}')" 
                            style="padding:5px 10px; font-size:12px; background:#e67e22; color:white; border:none; border-radius:4px; cursor:pointer;">
                        VER/DESCARGAR
                    </button>
                `;
                resultsContainer.appendChild(div);
            });
        }
    </script>
</body>
</html>
