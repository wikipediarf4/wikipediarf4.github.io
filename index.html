<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="origin">
    <title>Mi Canela TV Clone</title>
    <style>
        :root {
            --bg-color: #0c0c0c;
            --text-color: #ffffff;
            --accent-color: #00b4e4; /* El azul de TMDB de tu imagen */
            --nav-bg: rgba(0, 0, 0, 0.8);
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }

        /* --- MENÚ SUPERIOR (Segunda Imagen) --- */
        nav {
            background: var(--nav-bg);
            padding: 15px 40px;
            display: flex;
            align-items: center;
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 1000;
            gap: 25px;
        }

        .nav-item {
            cursor: pointer;
            font-weight: bold;
            font-size: 16px;
            color: #ccc;
            transition: color 0.3s;
        }

        .nav-item:hover, .nav-item.active {
            color: white;
        }

        /* --- BUSCADOR --- */
        .search-container {
            margin-top: 100px;
            padding: 0 50px;
            display: flex;
            gap: 10px;
        }

        input {
            flex: 1;
            padding: 12px;
            background: #222;
            border: 1px solid #444;
            color: white;
            border-radius: 4px;
        }

        /* --- SECCIONES DE CATEGORÍAS --- */
        .section-title {
            padding: 20px 50px 10px 50px;
            font-size: 22px;
            font-weight: bold;
        }

        .horizontal-scroll {
            display: flex;
            overflow-x: auto;
            padding: 10px 50px 30px 50px;
            gap: 15px;
            scroll-behavior: smooth;
        }

        .horizontal-scroll::-webkit-scrollbar { display: none; }

        .card {
            min-width: 180px;
            max-width: 180px;
            background: #1a1a1a;
            border-radius: 8px;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.3s;
        }

        .card:hover {
            transform: scale(1.1);
            z-index: 5;
        }

        .card img {
            width: 100%;
            height: 270px;
            object-fit: cover;
        }

        .card-title {
            padding: 8px;
            font-size: 14px;
            text-align: center;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* --- REPRODUCTOR INTEGRADO --- */
        #player-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: black;
            z-index: 2000;
        }

        .close-btn {
            position: absolute;
            top: 20px;
            right: 30px;
            font-size: 40px;
            color: white;
            cursor: pointer;
            z-index: 2001;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>

    <nav>
        <div class="nav-item active" onclick="location.reload()">Inicio</div>
        <div class="nav-item">Guía de TV</div>
        <div class="nav-item">Películas</div>
        <div class="nav-item">Series</div>
        <div class="nav-item">Clásicos</div>
        <div class="nav-item">Deportes</div>
        <div class="nav-item">Música</div>
        <div class="nav-item">Kids</div>
        <div class="nav-item">Noticias</div>
    </nav>

    <div class="search-container">
        <input type="text" id="search-input" placeholder="Buscar en el catálogo...">
        <button onclick="buscarManual()" style="padding:10px 20px; background:var(--accent-color); border:none; color:white; font-weight:bold; cursor:pointer;">BUSCAR</button>
    </div>

    <div id="dynamic-content">
        </div>

    <div id="player-overlay">
        <div class="close-btn" onclick="cerrarReproductor()">×</div>
        <iframe id="main-player" src="" allowfullscreen referrerpolicy="origin"></iframe>
    </div>

    <script>
        const API_KEY = 'f663f105c4c1626d23e86d2ac19471a9';
        
        // Categorías que queremos mostrar en el inicio
        const categorias = [
            { nombre: "Películas Tendencia", url: `https://api.themoviedb.org/3/trending/movie/week?api_key=${API_KEY}&language=es-ES` },
            { nombre: "Series Más Populares", url: `https://api.themoviedb.org/3/tv/popular?api_key=${API_KEY}&language=es-ES` },
            { nombre: "Acción y Adrenalina", url: `https://api.themoviedb.org/3/discover/movie?api_key=${API_KEY}&with_genres=28&language=es-ES` },
            { nombre: "Comedia para Reír", url: `https://api.themoviedb.org/3/discover/movie?api_key=${API_KEY}&with_genres=35&language=es-ES` }
        ];

        async function cargarInicio() {
            const contenedor = document.getElementById('dynamic-content');
            contenedor.innerHTML = '';

            for (const cat of categorias) {
                const res = await fetch(cat.url);
                const data = await res.json();
                crearFila(cat.nombre, data.results);
            }
        }

        function crearFila(titulo, items) {
            const contenedor = document.getElementById('dynamic-content');
            
            const sectionTitle = document.createElement('div');
            sectionTitle.className = 'section-title';
            sectionTitle.innerText = titulo;
            
            const scroll = document.createElement('div');
            scroll.className = 'horizontal-scroll';

            items.forEach(item => {
                if (!item.poster_path) return;
                const card = document.createElement('div');
                card.className = 'card';
                const tipo = item.media_type === 'tv' || item.first_air_date ? 'tv' : 'movie';
                
                card.innerHTML = `
                    <img src="https://image.tmdb.org/t/p/w500${item.poster_path}">
                    <div class="card-title">${item.title || item.name}</div>
                `;
                card.onclick = () => abrirReproductor(tipo, item.id);
                scroll.appendChild(card);
            });

            contenedor.appendChild(sectionTitle);
            contenedor.appendChild(scroll);
        }

        async function buscarManual() {
            const query = document.getElementById('search-input').value;
            if (!query) return;
            const res = await fetch(`https://api.themoviedb.org/3/search/multi?api_key=${API_KEY}&query=${encodeURIComponent(query)}&language=es-ES`);
            const data = await res.json();
            
            const contenedor = document.getElementById('dynamic-content');
            contenedor.innerHTML = '';
            crearFila(`Resultados para: ${query}`, data.results);
        }

        function abrirReproductor(tipo, id) {
            const overlay = document.getElementById('player-overlay');
            const iframe = document.getElementById('main-player');
            // Usamos un servidor que permite elegir audio Latino/Español
            iframe.src = `https://multiembed.mov/?video_id=${id}&tmdb=1`;
            overlay.style.display = 'block';
            document.body.style.overflow = 'hidden';
        }

        function cerrarReproductor() {
            document.getElementById('player-overlay').style.display = 'none';
            document.getElementById('main-player').src = '';
            document.body.style.overflow = 'auto';
        }

        cargarInicio();
    </script>
</body>
</html>
