<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DYTA Downloads - Online Gratis</title>
    <style>
        :root {
            --primary: #ff0000;
            --accent: #01b4e4;
            --bg: #0a0a0a;
            --card: #161616;
            --text: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* --- NAVBAR ESTILO CANELA (Imagen 1) --- */
        header {
            background: #000;
            padding: 15px 50px;
            display: flex;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid #222;
        }

        .logo-container { margin-right: 30px; }
        .logo-main { font-size: 24px; font-weight: 900; color: var(--primary); text-decoration: none; }
        .logo-main span { color: white; }

        nav { display: flex; gap: 20px; overflow-x: auto; white-space: nowrap; }
        .nav-link { color: #ccc; text-decoration: none; font-weight: 600; font-size: 14px; cursor: pointer; }
        .nav-link:hover { color: var(--accent); }

        /* --- CONTENEDOR PRINCIPAL --- */
        .main-content {
            flex: 1;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .download-box {
            width: 100%;
            max-width: 700px;
            background: var(--card);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            text-align: center;
        }

        input {
            width: 90%;
            padding: 15px;
            border-radius: 8px;
            border: 2px solid #333;
            background: #000;
            color: white;
            font-size: 16px;
            margin-bottom: 20px;
        }

        .btn-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        
        button {
            padding: 15px;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            color: white;
            text-transform: uppercase;
        }

        .btn-mp3 { background: #2ecc71; }
        .btn-mp4 { background: var(--primary); }
        .btn-search { background: var(--accent); grid-column: span 2; margin-top: 10px; }

        button:hover { opacity: 0.8; transform: translateY(-2px); }

        /* --- RESULTADOS DE PELICULAS (Imagen 2) --- */
        #results {
            width: 100%;
            max-width: 1100px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 20px;
            margin-top: 40px;
        }

        .movie-card {
            background: #111;
            border-radius: 8px;
            overflow: hidden;
            transition: 0.3s;
            cursor: pointer;
            border: 1px solid #222;
        }

        .movie-card:hover { transform: scale(1.05); border-color: var(--accent); }
        .movie-card img { width: 100%; height: 240px; object-fit: cover; }
        .movie-card p { padding: 10px; font-size: 13px; margin: 0; text-align: center; }

        footer {
            background: #000;
            text-align: center;
            padding: 20px;
            color: #666;
            font-size: 13px;
            margin-top: 40px;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo-container">
            <a href="#" class="logo-main">DYTA <span>Downloads</span></a>
        </div>
        <nav>
            <div class="nav-link" onclick="location.reload()">Inicio</div>
            <div class="nav-link" onclick="searchByGenre(28)">Películas</div>
            <div class="nav-link" onclick="searchByGenre(80)">Series</div>
            <div class="nav-link">Clásicos</div>
            <div class="nav-link">Deportes</div>
            <div class="nav-link">Música</div>
            <div class="nav-link">Kids</div>
            <div class="nav-link">Noticias</div>
        </nav>
    </header>

    <div class="main-content">
        <div class="download-box">
            <h2 style="margin-top:0">Descargas Gratis</h2>
            <input type="text" id="url-input" placeholder="Pega link de YouTube o busca Película/Serie...">
            <div class="btn-row">
                <button class="btn-mp3" onclick="ytDownload('mp3')">Descargar MP3</button>
                <button class="btn-mp4" onclick="ytDownload('mp4')">Descargar Video</button>
                <button class="btn-search" onclick="searchMovie()">Buscar para Ver/Descargar</button>
            </div>
        </div>

        <div id="results">
            </div>
    </div>

    <footer>
        DYTA 2026 Todos los derechos reservados
    </footer>

    <script>
        const API_KEY = 'f663f105c4c1626d23e86d2ac19471a9';

        // Función para YouTube (Abre en pestaña nueva para evitar el error de conexión rechazada)
        function ytDownload(format) {
            const url = document.getElementById('url-input').value;
            if (!url) return alert("Pega un link de YouTube primero");
            
            let downloadUrl = "";
            if(format === 'mp3') {
                downloadUrl = `https://loader.to/api/card/?url=${encodeURIComponent(url)}&f=mp3`;
            } else {
                downloadUrl = `https://loader.to/api/card/?url=${encodeURIComponent(url)}&f=720`;
            }
            window.open(downloadUrl, '_blank');
        }

        // Buscar películas (Estilo Imagen 2)
        async function searchMovie() {
            const query = document.getElementById('url-input').value;
            if (!query) return alert("Escribe un nombre para buscar");

            const res = await fetch(`https://api.themoviedb.org/3/search/multi?api_key=${API_KEY}&query=${encodeURIComponent(query)}&language=es-ES`);
            const data = await res.json();
            display(data.results);
        }

        function display(items) {
            const container = document.getElementById('results');
            container.innerHTML = '';
            items.forEach(item => {
                if(!item.poster_path) return;
                const div = document.createElement('div');
                div.className = 'movie-card';
                div.innerHTML = `
                    <img src="https://image.tmdb.org/t/p/w500${item.poster_path}">
                    <p>${item.title || item.name}</p>
                `;
                // Al hacer clic, abre el reproductor que permite descargar
                div.onclick = () => window.open(`https://vidsrc.to/embed/${item.media_type || 'movie'}/${item.id}`, '_blank');
                container.appendChild(div);
            });
        }

        // Cargar algo de inicio
        window.onload = async () => {
            const res = await fetch(`https://api.themoviedb.org/3/trending/all/week?api_key=${API_KEY}&language=es-ES`);
            const data = await res.json();
            display(data.results);
        };
    </script>
</body>
</html>
