<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DYTA Downloads - Online Gratis</title>
    <style>
        :root {
            --primary: #ff0000;
            --bg: #0a0a0a;
            --card: #161616;
            --text: #ffffff;
            --accent: #2ecc71;
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .container {
            width: 90%;
            max-width: 600px;
            background: var(--card);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.7);
            text-align: center;
            border: 1px solid #222;
        }

        h1 { font-size: 2.5rem; margin-bottom: 10px; font-weight: 900; }
        h1 span { color: var(--primary); }
        .tagline { color: #888; margin-bottom: 30px; font-size: 14px; }

        input {
            width: 100%;
            padding: 18px;
            border-radius: 12px;
            border: 2px solid #333;
            background: #000;
            color: white;
            font-size: 16px;
            box-sizing: border-box;
            margin-bottom: 25px;
            outline: none;
            transition: border-color 0.3s;
        }

        input:focus { border-color: var(--primary); }

        .btn-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        button {
            padding: 18px;
            border: none;
            border-radius: 12px;
            font-weight: bold;
            font-size: 14px;
            cursor: pointer;
            text-transform: uppercase;
            transition: all 0.3s;
            color: white;
        }

        .btn-mp3 { background: var(--accent); }
        .btn-mp4 { background: var(--primary); }

        button:hover { transform: translateY(-3px); filter: brightness(1.1); }
        button:disabled { background: #444; cursor: not-allowed; transform: none; }

        /* --- BARRA DE CARGA --- */
        #progress-container {
            display: none;
            margin-top: 30px;
            background: #222;
            height: 12px;
            border-radius: 10px;
            overflow: hidden;
            position: relative;
        }

        #progress-bar {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, var(--accent), #00ff88);
            transition: width 0.4s ease;
        }

        #status-text {
            margin-top: 10px;
            font-size: 13px;
            color: #aaa;
        }

        footer {
            margin-top: 40px;
            color: #444;
            font-size: 12px;
        }

        /* Iframe invisible para disparar la descarga sin abrir pestañas */
        #dl-helper { display: none; }
    </style>
</head>
<body>

    <div class="container">
        <h1>DYTA <span>Downloads</span></h1>
        <div class="tagline">Descarga MP3 y MP4 con carátula incluida</div>

        <input type="text" id="youtube-url" placeholder="Pega el link de YouTube aquí...">

        <div class="btn-group">
            <button class="btn-mp3" id="btn-mp3" onclick="startDownload('mp3')">Descargar MP3</button>
            <button class="btn-mp4" id="btn-mp4" onclick="startDownload('mp4')">Descargar MP4</button>
        </div>

        <div id="progress-container">
            <div id="progress-bar"></div>
        </div>
        <div id="status-text"></div>
    </div>

    <iframe id="dl-helper"></iframe>

    <footer>
        DYTA 2026 Todos los derechos reservados
    </footer>

    <script>
        function startDownload(format) {
            const url = document.getElementById('youtube-url').value;
            if (!url) return alert("Por favor, pega un link de YouTube");

            const videoId = extractID(url);
            if (!videoId) return alert("Link de YouTube no válido");

            // UI: Desactivar botones y mostrar barra
            document.getElementById('btn-mp3').disabled = true;
            document.getElementById('btn-mp4').disabled = true;
            document.getElementById('progress-container').style.display = 'block';
            const progressBar = document.getElementById('progress-bar');
            const statusText = document.getElementById('status-text');

            let progress = 0;
            statusText.innerText = "Iniciando conversión...";

            // Simulación de progreso (Ya que las APIs externas no devuelven % real por seguridad)
            const interval = setInterval(() => {
                progress += Math.random() * 5;
                if (progress > 95) {
                    progress = 95;
                    statusText.innerText = "Preparando archivo para descarga...";
                } else {
                    statusText.innerText = `Procesando ${format.toUpperCase()} (${Math.floor(progress)}%)`;
                }
                progressBar.style.width = progress + "%";
            }, 500);

            // Disparar la descarga usando el helper invisible
            const downloadUrl = format === 'mp3' 
                ? `https://api.vevioz.com/@api/button/mp3/${videoId}`
                : `https://api.vevioz.com/@api/button/videos/${videoId}`;

            // En lugar de window.open, cargamos la URL en el iframe oculto
            // Esto intenta disparar el "Save As" sin salir de tu web
            document.getElementById('dl-helper').src = downloadUrl;

            // Finalización estética
            setTimeout(() => {
                clearInterval(interval);
                progressBar.style.width = "100%";
                statusText.innerText = "¡Descarga lista! Revisa tus archivos.";
                
                setTimeout(() => {
                    document.getElementById('btn-mp3').disabled = false;
                    document.getElementById('btn-mp4').disabled = false;
                    document.getElementById('progress-container').style.display = 'none';
                    progressBar.style.width = "0%";
                }, 3000);
            }, 8000);
        }

        function extractID(url) {
            const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
            const match = url.match(regExp);
            return (match && match[2].length == 11) ? match[2] : null;
        }
    </script>
</body>
</html>
