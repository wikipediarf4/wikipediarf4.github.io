<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Mivo 🔥</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#070709;--s1:#111115;--s2:#18181d;--s3:#222228;
  --border:#2a2a32;--text:#f2f2f5;--muted:#66666e;
  --accent:#ff2d55;--accent2:#ff9500;
  --grad:linear-gradient(135deg,#ff2d55,#ff9500);
  --fh:'Syne',sans-serif;--fb:'DM Sans',sans-serif;
}
html,body{width:100%;height:100%;background:var(--bg);color:var(--text);font-family:var(--fb);overflow:hidden;-webkit-tap-highlight-color:transparent}

/* ─── AUTH ─── */
#authWrap{position:fixed;inset:0;z-index:1000;background:var(--bg);display:flex;align-items:center;justify-content:center;flex-direction:column;padding:28px}
#authWrap.gone{display:none}
.auth-brand{font-family:var(--fh);font-weight:800;font-size:3rem;letter-spacing:-2px;background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:6px}
.auth-tagline{color:var(--muted);font-size:.9rem;margin-bottom:36px}
.auth-tabs{display:flex;gap:3px;background:var(--s1);border-radius:14px;padding:4px;margin-bottom:24px;width:100%;max-width:360px}
.a-tab{flex:1;padding:10px;border:none;border-radius:10px;background:transparent;color:var(--muted);font-family:var(--fb);font-size:.95rem;font-weight:500;cursor:pointer;transition:all .2s}
.a-tab.on{background:var(--s2);color:var(--text)}
.a-form{width:100%;max-width:360px;display:flex;flex-direction:column;gap:12px}
.a-inp{width:100%;padding:14px 16px;background:var(--s1);border:1.5px solid var(--border);border-radius:13px;color:var(--text);font-family:var(--fb);font-size:1rem;outline:none;transition:border-color .2s}
.a-inp:focus{border-color:var(--accent)}
.a-inp::placeholder{color:var(--muted)}
.btn-main{padding:15px;border:none;border-radius:13px;background:var(--grad);color:#fff;font-family:var(--fh);font-size:1rem;font-weight:700;cursor:pointer;transition:opacity .2s,transform .1s}
.btn-main:active{transform:scale(.98);opacity:.88}
.divider{display:flex;align-items:center;gap:10px;color:var(--muted);font-size:.82rem}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border)}
.btn-google{display:flex;align-items:center;justify-content:center;gap:10px;padding:13px;border:1.5px solid var(--border);border-radius:13px;background:var(--s1);color:var(--text);font-family:var(--fb);font-size:.95rem;font-weight:500;cursor:pointer;transition:background .2s,border-color .2s}
.btn-google:hover{background:var(--s2);border-color:var(--muted)}
.btn-google svg{width:20px;height:20px;flex-shrink:0}
.a-err{color:var(--accent);font-size:.83rem;text-align:center;min-height:18px}

/* ─── APP ─── */
#app{display:none;width:100%;height:100%;flex-direction:column}
#app.on{display:flex}

/* ─── FEED ─── */
#feed{flex:1;overflow-y:scroll;overflow-x:hidden;scroll-snap-type:y mandatory;scrollbar-width:none}
#feed::-webkit-scrollbar{display:none}
.pst{width:100%;height:100dvh;scroll-snap-align:start;scroll-snap-stop:always;position:relative;display:flex;align-items:flex-end;overflow:hidden;background:#000}
.pst-media{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;background:#0a0a0a}
.pst-veil{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.78) 0%,rgba(0,0,0,.08) 55%,transparent 100%)}
.pst-info{position:relative;z-index:2;padding:18px 76px 32px 18px;flex:1}
.pst-user{display:flex;align-items:center;gap:9px;font-family:var(--fh);font-weight:700;font-size:.95rem;margin-bottom:7px}
.av{width:34px;height:34px;border-radius:50%;flex-shrink:0;background:var(--grad);display:flex;align-items:center;justify-content:center;font-size:.8rem;font-weight:800;color:#fff;overflow:hidden}
.av img{width:100%;height:100%;border-radius:50%;object-fit:cover}
.pst-caption{font-size:.88rem;color:rgba(255,255,255,.82);line-height:1.45}
.pst-acts{position:absolute;right:10px;bottom:72px;z-index:3;display:flex;flex-direction:column;align-items:center;gap:18px}
.act-btn{display:flex;flex-direction:column;align-items:center;gap:4px;background:none;border:none;cursor:pointer;color:#fff;user-select:none}
.act-ico{width:46px;height:46px;border-radius:50%;background:rgba(255,255,255,.14);display:flex;align-items:center;justify-content:center;font-size:1.3rem;backdrop-filter:blur(6px);transition:transform .15s,background .15s}
.act-btn:active .act-ico{transform:scale(1.18)}
.act-btn.fired .act-ico{background:rgba(255,85,0,.38);animation:fpop .35s ease}
@keyframes fpop{0%{transform:scale(1)}45%{transform:scale(1.45)}75%{transform:scale(.88)}100%{transform:scale(1)}}
.act-count{font-size:.75rem;font-weight:600;letter-spacing:.02em}
.pi{position:absolute;inset:0;z-index:2;display:flex;align-items:center;justify-content:center;pointer-events:none;opacity:0;transition:opacity .25s}
.pi.show{opacity:1}
.pi em{font-style:normal;font-size:4rem;filter:drop-shadow(0 0 18px rgba(0,0,0,.8));animation:piA .5s ease forwards}
@keyframes piA{0%{transform:scale(.4);opacity:1}100%{transform:scale(1.3);opacity:0}}

/* ─── TOP NAV ─── */
#topNav{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:14px 16px;background:linear-gradient(to bottom,rgba(7,7,9,.85),transparent)}
.nav-logo{font-family:var(--fh);font-weight:800;font-size:1.4rem;letter-spacing:-1px;background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.nav-r{display:flex;gap:8px}
.nav-btn{width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,.1);border:none;color:#fff;font-size:1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(6px);transition:background .2s}
.nav-btn:hover{background:rgba(255,255,255,.18)}

/* ─── BOTTOM NAV ─── */
#botNav{position:fixed;bottom:0;left:0;right:0;z-index:100;display:flex;align-items:center;justify-content:space-around;padding:8px 0 22px;background:linear-gradient(to top,rgba(7,7,9,.92) 60%,transparent)}
.bn-btn{display:flex;flex-direction:column;align-items:center;gap:2px;background:none;border:none;color:var(--muted);cursor:pointer;font-size:.58rem;font-weight:600;letter-spacing:.06em;text-transform:uppercase;transition:color .2s}
.bn-btn span{font-size:1.35rem}
.bn-btn.on{color:#fff}
.bn-plus{width:50px;height:34px;border-radius:10px;background:var(--grad);display:flex;align-items:center;justify-content:center;font-size:1.25rem;border:none;cursor:pointer;transition:transform .15s,opacity .15s}
.bn-plus:active{transform:scale(.91);opacity:.82}

/* ─── MODALS ─── */
.mbd{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.72);backdrop-filter:blur(5px);display:none;align-items:flex-end;justify-content:center}
.mbd.open{display:flex}
.msheet{width:100%;max-width:520px;background:var(--s1);border-radius:22px 22px 0 0;padding:18px 18px 44px;animation:sUp .28s ease}
@keyframes sUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.mhandle{width:38px;height:4px;border-radius:2px;background:var(--border);margin:0 auto 18px}
.mtitle{font-family:var(--fh);font-weight:700;font-size:1.15rem;margin-bottom:18px}
.utype{display:flex;gap:10px;margin-bottom:18px}
.utype-btn{flex:1;padding:16px;border-radius:13px;border:1.5px solid var(--border);background:none;color:var(--text);font-family:var(--fb);font-size:.88rem;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:6px;transition:all .2s}
.utype-btn em{font-style:normal;font-size:1.8rem}
.utype-btn.on{border-color:var(--accent);background:rgba(255,45,85,.07)}
.udrop{border:1.5px dashed var(--border);border-radius:13px;padding:28px;text-align:center;cursor:pointer;transition:border-color .2s;margin-bottom:12px}
.udrop:hover{border-color:var(--accent)}
.udrop em{font-style:normal;font-size:2.2rem}
.udrop p{color:var(--muted);font-size:.86rem;margin-top:6px}
.ucap{width:100%;padding:12px 14px;background:var(--s2);border:1.5px solid var(--border);border-radius:12px;color:var(--text);resize:none;font-family:var(--fb);font-size:.93rem;outline:none;margin-bottom:12px;transition:border-color .2s}
.ucap:focus{border-color:var(--accent)}
.uprog{width:100%;height:3px;border-radius:2px;background:var(--border);overflow:hidden;display:none;margin-bottom:12px}
.uprog-bar{height:100%;width:0%;background:var(--grad);transition:width .3s}

/* ─── PANELS ─── */
.panel{position:fixed;inset:0;z-index:150;background:var(--bg);display:none;flex-direction:column}
.panel.open{display:flex}
.panel-head{padding:52px 16px 16px;border-bottom:1px solid var(--border);font-family:var(--fh);font-weight:700;font-size:1.1rem;display:flex;align-items:center;justify-content:space-between}
.pcl{background:none;border:none;color:var(--muted);font-size:1.4rem;cursor:pointer}
.prof-top{padding:50px 16px 20px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border)}
.prof-av{width:58px;height:58px;border-radius:50%;flex-shrink:0;background:var(--grad);display:flex;align-items:center;justify-content:center;font-size:1.4rem;font-weight:800;color:#fff;overflow:hidden}
.prof-av img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.prof-nick{font-family:var(--fh);font-weight:700;font-size:1.05rem}
.prof-email{color:var(--muted);font-size:.8rem;margin-top:2px}
.btn-out{padding:9px 16px;border-radius:10px;border:1px solid var(--border);background:none;color:var(--text);font-family:var(--fb);cursor:pointer;font-size:.85rem;transition:background .2s}
.btn-out:hover{background:var(--s2)}
.chat-ph{flex:1;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:12px;color:var(--muted)}
.chat-ph em{font-style:normal;font-size:3rem}

/* ─── TOAST ─── */
#toasts{position:fixed;bottom:86px;left:50%;transform:translateX(-50%);z-index:999;display:flex;flex-direction:column;gap:6px;align-items:center}
.tst{padding:9px 20px;border-radius:50px;background:rgba(28,28,35,.95);color:#fff;font-size:.86rem;font-weight:500;backdrop-filter:blur(8px);white-space:nowrap;animation:tIn .25s ease,tOut .25s ease 2.5s forwards}
@keyframes tIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes tOut{to{opacity:0}}
.spin{width:36px;height:36px;border-radius:50%;border:3px solid var(--border);border-top-color:var(--accent);animation:sp .75s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
.feed-load{width:100%;height:100dvh;scroll-snap-align:start;background:var(--s1);display:flex;align-items:center;justify-content:center}
.empty-feed{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100dvh;gap:14px;color:var(--muted)}
.empty-feed em{font-style:normal;font-size:3rem}
</style>
</head>
<body>

<!-- AUTH -->
<div id="authWrap">
  <div class="auth-brand">Mivo</div>
  <p class="auth-tagline">Tu feed. Tu vibra. 🔥</p>
  <div class="auth-tabs">
    <button class="a-tab on" id="tabL" onclick="swTab('login')">Entrar</button>
    <button class="a-tab" id="tabR" onclick="swTab('reg')">Registrarse</button>
  </div>
  <div class="a-form">
    <input class="a-inp" id="aNick" type="text" placeholder="Nombre de usuario" style="display:none">
    <input class="a-inp" id="aEmail" type="email" placeholder="Email" autocomplete="email">
    <input class="a-inp" id="aPass" type="password" placeholder="Contraseña" autocomplete="current-password">
    <button class="btn-main" onclick="doAuth()">Continuar →</button>
    <div class="divider">o</div>
    <button class="btn-google" onclick="doGoogle()">
      <svg viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.1 0 5.8 1.1 7.9 2.9l5.9-5.9C34.3 3.3 29.5 1 24 1 14.8 1 7 6.7 3.7 14.6l6.9 5.3C12.2 13.4 17.6 9.5 24 9.5z"/><path fill="#4285F4" d="M46.5 24.5c0-1.6-.1-3.1-.4-4.5H24v8.5h12.7c-.6 3-2.3 5.5-4.8 7.2l7.4 5.7c4.3-4 6.8-9.9 7.2-16.9z"/><path fill="#FBBC05" d="M10.6 28.6A14.3 14.3 0 0 1 9.5 24c0-1.6.3-3.2.7-4.6l-6.9-5.3A23 23 0 0 0 1 24c0 3.8.9 7.4 2.5 10.6l7.1-6z"/><path fill="#34A853" d="M24 47c5.5 0 10.1-1.8 13.5-4.9l-7.4-5.7c-1.9 1.3-4.2 2-6.1 2-6.4 0-11.8-4-13.5-9.4l-7.1 6C7 40.3 14.8 47 24 47z"/></svg>
      Continuar con Google
    </button>
    <p class="a-err" id="aErr"></p>
  </div>
</div>

<!-- APP -->
<div id="app">
  <div id="topNav">
    <div class="nav-logo">Mivo</div>
    <div class="nav-r">
      <button class="nav-btn" onclick="openPanel('chatPanel')">💬</button>
      <button class="nav-btn" onclick="openPanel('profPanel')">👤</button>
    </div>
  </div>
  <div id="feed"><div class="feed-load"><div class="spin"></div></div></div>
  <div id="botNav">
    <button class="bn-btn on"><span>🏠</span>Inicio</button>
    <button class="bn-plus" onclick="openUpload()">➕</button>
    <button class="bn-btn" onclick="openPanel('chatPanel')"><span>💬</span>Chat</button>
  </div>
</div>

<!-- UPLOAD MODAL -->
<div class="mbd" id="upModal" onclick="bdClose(event,'upModal')">
  <div class="msheet">
    <div class="mhandle"></div>
    <div class="mtitle">Subir contenido</div>
    <div class="utype">
      <button class="utype-btn on" id="utPhoto" onclick="setUType('photo')"><em>🖼️</em><span>Foto</span></button>
      <button class="utype-btn" id="utVideo" onclick="setUType('video')"><em>🎬</em><span>Video</span></button>
    </div>
    <div class="udrop" onclick="document.getElementById('fInput').click()">
      <em>📤</em>
      <p id="dropHint">Toca para elegir una imagen (JPG/PNG)</p>
    </div>
    <input type="file" id="fInput" style="display:none" accept="image/*" onchange="onFile(this)">
    <textarea class="ucap" id="capInput" rows="2" placeholder="Descripción (opcional)..."></textarea>
    <div class="uprog" id="upProg"><div class="uprog-bar" id="upBar"></div></div>
    <button class="btn-main" id="upBtn" onclick="submitPost()">Publicar 🔥</button>
  </div>
</div>

<!-- CHAT PANEL -->
<div class="panel" id="chatPanel">
  <div class="panel-head"><span>Mensajes</span><button class="pcl" onclick="closePanel('chatPanel')">✕</button></div>
  <div class="chat-ph"><em>💬</em><p>Chat en construcción — ¡pronto!</p></div>
</div>

<!-- PROFILE PANEL -->
<div class="panel" id="profPanel">
  <div class="prof-top">
    <div style="display:flex;align-items:center;gap:14px">
      <div class="prof-av" id="profAv">?</div>
      <div>
        <div class="prof-nick" id="profNick">—</div>
        <div class="prof-email" id="profEmail">—</div>
      </div>
    </div>
    <div style="display:flex;gap:8px;align-items:center">
      <button class="btn-out" onclick="doLogout()">Salir</button>
      <button class="pcl" onclick="closePanel('profPanel')">✕</button>
    </div>
  </div>
  <div style="padding:20px 16px;color:var(--muted);font-size:.88rem">Tus publicaciones aparecen en el feed en tiempo real.</div>
</div>

<div id="toasts"></div>

<!-- FIREBASE MODULE -->
<script type="module">
import { initializeApp }       from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword,
         signOut, onAuthStateChanged, GoogleAuthProvider, signInWithPopup, updateProfile }
                               from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getDatabase, ref, push, onValue, runTransaction, serverTimestamp, set, get }
                               from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const app  = initializeApp({
  apiKey:            "AIzaSyA9oat9dd0S9vlxkg1osH4dW3XhRDGiOiw",
  authDomain:        "charlasrf4.firebaseapp.com",
  databaseURL:       "https://charlasrf4-default-rtdb.firebaseio.com",
  projectId:         "charlasrf4",
  storageBucket:     "charlasrf4.firebasestorage.app",
  messagingSenderId: "345019626508",
  appId:             "1:345019626508:web:d099ca499acb29eac12a29"
});
const auth      = getAuth(app);
const db        = getDatabase(app);
const gProvider = new GoogleAuthProvider();

const CLD_CLOUD  = 'da0n5tg3g';
const CLD_PRESET = 'milatido_video';
const IMGBB_KEY  = '75c60bcb472ab597b1dee463438b18ba';

let CU      = null;
let curTab  = 'login';
let uType   = 'photo';
let selFile = null;

const $    = id => document.getElementById(id);
const toast = msg => {
  const t = document.createElement('div');
  t.className = 'tst'; t.textContent = msg;
  $('toasts').appendChild(t);
  setTimeout(() => t.remove(), 2800);
};
const setBar = pct => { $('upBar').style.width = pct+'%'; };

// AUTH TAB
window.swTab = tab => {
  curTab = tab;
  $('tabL').classList.toggle('on', tab==='login');
  $('tabR').classList.toggle('on', tab==='reg');
  $('aNick').style.display = tab==='reg' ? 'block' : 'none';
  $('aErr').textContent = '';
};

// EMAIL AUTH
window.doAuth = async () => {
  const email = $('aEmail').value.trim();
  const pass  = $('aPass').value;
  const nick  = $('aNick').value.trim();
  $('aErr').textContent = '';
  if (!email || !pass) { $('aErr').textContent = 'Completá todos los campos.'; return; }
  try {
    if (curTab === 'reg') {
      if (!nick) { $('aErr').textContent = 'Ingresá un nombre de usuario.'; return; }
      const c = await createUserWithEmailAndPassword(auth, email, pass);
      await updateProfile(c.user, { displayName: nick });
      await set(ref(db, `mivo_users/${c.user.uid}`), { nick, email, photo:'', createdAt: Date.now() });
    } else {
      await signInWithEmailAndPassword(auth, email, pass);
    }
  } catch(e) {
    const m = {
      'auth/email-already-in-use':'El email ya está registrado.',
      'auth/invalid-email':'Email inválido.',
      'auth/weak-password':'Contraseña mínimo 6 caracteres.',
      'auth/user-not-found':'Usuario no encontrado.',
      'auth/wrong-password':'Contraseña incorrecta.',
      'auth/invalid-credential':'Email o contraseña incorrectos.',
    };
    $('aErr').textContent = m[e.code] || e.message;
  }
};

// GOOGLE AUTH
window.doGoogle = async () => {
  $('aErr').textContent = '';
  try {
    const result = await signInWithPopup(auth, gProvider);
    const u = result.user;
    const snap = await get(ref(db, `mivo_users/${u.uid}`));
    if (!snap.exists()) {
      await set(ref(db, `mivo_users/${u.uid}`), {
        nick:      u.displayName || u.email.split('@')[0],
        email:     u.email,
        photo:     u.photoURL || '',
        createdAt: Date.now()
      });
    }
  } catch(e) {
    if (e.code !== 'auth/popup-closed-by-user')
      $('aErr').textContent = e.message;
  }
};

// LOGOUT
window.doLogout = async () => { await signOut(auth); closePanel('profPanel'); };

// AUTH STATE
onAuthStateChanged(auth, async user => {
  if (user) {
    const snap = await get(ref(db, `mivo_users/${user.uid}`));
    const data = snap.val() || {};
    CU = {
      uid:   user.uid,
      nick:  data.nick || user.displayName || user.email.split('@')[0],
      email: user.email,
      photo: data.photo || user.photoURL || ''
    };
    $('profNick').textContent  = '@' + CU.nick;
    $('profEmail').textContent = CU.email;
    const avEl = $('profAv');
    if (CU.photo) { avEl.innerHTML = `<img src="${CU.photo}" alt="">`; }
    else { avEl.textContent = CU.nick[0].toUpperCase(); }
    $('authWrap').classList.add('gone');
    $('app').classList.add('on');
    loadFeed();
  } else {
    CU = null;
    $('authWrap').classList.remove('gone');
    $('app').classList.remove('on');
  }
});

// FEED
function loadFeed() {
  onValue(ref(db, 'mivo_posts'), snap => {
    const posts = [];
    snap.forEach(c => posts.push({ id: c.key, ...c.val() }));
    posts.reverse();
    renderFeed(posts);
  });
}

function renderFeed(posts) {
  const feed = $('feed');
  feed.querySelectorAll('video').forEach(v => v.pause());
  feed.innerHTML = '';
  if (!posts.length) {
    feed.innerHTML = `<div class="empty-feed"><em>🎬</em><p>¡Sé el primero en publicar!</p></div>`;
    return;
  }
  posts.forEach(p => {
    const el = document.createElement('div');
    el.className = 'pst'; el.dataset.id = p.id;
    const initials = (p.nick||'U')[0].toUpperCase();
    const fires    = p.fires || 0;
    const fired    = p.firedBy && CU && p.firedBy[CU.uid];
    const avHTML   = p.userPhoto
      ? `<div class="av"><img src="${p.userPhoto}" alt=""></div>`
      : `<div class="av">${initials}</div>`;

    if (p.type === 'video') {
      el.innerHTML = `<video class="pst-media" src="${p.url}" loop playsinline muted></video>
                      <div class="pi" id="pi_${p.id}"><em>▶️</em></div>`;
      el.addEventListener('click', () => {
        const v = el.querySelector('video'), pi = $(`pi_${p.id}`);
        if (v.paused) v.play(); else v.pause();
        if (pi) { pi.classList.add('show'); setTimeout(()=>pi.classList.remove('show'),550); }
      });
    } else {
      el.innerHTML = `<img class="pst-media" src="${p.url}" alt="" loading="lazy">`;
    }

    el.innerHTML += `
      <div class="pst-veil"></div>
      <div class="pst-info">
        <div class="pst-user">${avHTML}@${p.nick||'usuario'}</div>
        ${p.caption?`<div class="pst-caption">${p.caption}</div>`:''}
      </div>
      <div class="pst-acts">
        <button class="act-btn${fired?' fired':''}" id="fb_${p.id}" onclick="toggleFire('${p.id}',this)">
          <div class="act-ico">🔥</div>
          <span class="act-count" id="fc_${p.id}">${fires}</span>
        </button>
      </div>`;
    feed.appendChild(el);
  });
  setupIO();
}

function setupIO() {
  const io = new IntersectionObserver(entries => {
    entries.forEach(e => {
      const v = e.target.querySelector('video');
      if (!v) return;
      if (e.isIntersecting) v.play().catch(()=>{}); else v.pause();
    });
  }, { threshold: 0.65 });
  document.querySelectorAll('.pst').forEach(p => io.observe(p));
}

// FIRE REACTION
window.toggleFire = async (pid, btn) => {
  if (!CU) { toast('Iniciá sesión primero'); return; }
  const uid = CU.uid;
  await runTransaction(ref(db, `mivo_posts/${pid}`), post => {
    if (!post) return post;
    if (!post.firedBy) post.firedBy = {};
    if (post.firedBy[uid]) {
      delete post.firedBy[uid];
      post.fires = Math.max(0,(post.fires||1)-1);
    } else {
      post.firedBy[uid] = true;
      post.fires = (post.fires||0)+1;
    }
    return post;
  });
};

// UPLOAD TYPE
window.setUType = type => {
  uType = type;
  $('utPhoto').classList.toggle('on', type==='photo');
  $('utVideo').classList.toggle('on', type==='video');
  $('fInput').accept = type==='video' ? 'video/*' : 'image/*';
  $('dropHint').textContent = type==='video'
    ? 'Toca para elegir un video (MP4/WebM, max 100MB)'
    : 'Toca para elegir una imagen (JPG/PNG, max 32MB)';
  selFile = null;
};
window.onFile = inp => { selFile = inp.files[0]||null; if(selFile) $('dropHint').textContent='✅ '+selFile.name; };

// SUBMIT POST
window.submitPost = async () => {
  if (!CU)      { toast('No estás autenticado'); return; }
  if (!selFile) { toast('Seleccioná un archivo'); return; }
  const btn = $('upBtn');
  btn.disabled=true; btn.textContent='Subiendo...';
  $('upProg').style.display='block'; setBar(10);
  const caption = $('capInput').value.trim();
  try {
    let url = uType==='photo' ? await uploadImgBB(selFile) : await uploadCloudinary(selFile);
    setBar(90);
    await push(ref(db,'mivo_posts'), {
      url, type:uType, caption,
      nick:CU.nick, uid:CU.uid, userPhoto:CU.photo||'',
      fires:0, firedBy:{}, createdAt:serverTimestamp()
    });
    setBar(100);
    toast('¡Publicado! 🔥');
    closeModal('upModal');
    resetUpload();
  } catch(e) { toast('Error: '+e.message); console.error(e); }
  finally { btn.disabled=false; btn.textContent='Publicar 🔥'; $('upProg').style.display='none'; }
};

async function uploadImgBB(file) {
  const fd = new FormData(); fd.append('image', file);
  const r = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_KEY}`,{method:'POST',body:fd});
  const j = await r.json();
  if (!j.success) throw new Error(j.error?.message||'ImgBB error');
  return j.data.url;
}
async function uploadCloudinary(file) {
  const fd = new FormData();
  fd.append('file', file); fd.append('upload_preset', CLD_PRESET);
  const r = await fetch(`https://api.cloudinary.com/v1_1/${CLD_CLOUD}/video/upload`,{method:'POST',body:fd});
  const j = await r.json();
  if (j.error) throw new Error(j.error.message);
  return j.secure_url;
}
function resetUpload() {
  selFile=null; $('capInput').value=''; $('fInput').value='';
  $('dropHint').textContent='Toca para elegir una imagen (JPG/PNG, max 32MB)';
  setUType('photo');
}

// UI HELPERS
window.openUpload  = () => { if(!CU){toast('Iniciá sesión primero');return;} $('upModal').classList.add('open'); };
window.closeModal  = id => { $(id).classList.remove('open'); resetUpload(); };
window.bdClose     = (e,id) => { if(e.target.id===id) closeModal(id); };
window.openPanel   = id => $(id).classList.add('open');
window.closePanel  = id => $(id).classList.remove('open');
</script>
</body>
</html>
